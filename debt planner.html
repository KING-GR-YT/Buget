<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Planner Pro+</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<!-- ✅ Firebase (FIXED) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#020617,#001f2f);
    color:#00f0ff;
    padding:20px;
}
.card{
    background:rgba(0,0,0,0.6);
    border:1px solid #00f0ff33;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:15px;
}
@media(min-width:768px){
    .grid{grid-template-columns:1fr 1fr;}
}
input, select{
    width:100%;
    padding:12px;
    margin:6px 0;
    border-radius:8px;
    border:1px solid #00f0ff55;
    background:#020617;
    color:#00f0ff;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00f0ff,#00ffa6);
    color:#000;
    font-weight:bold;
}
.summary{
    display:flex;
    gap:10px;
}
.summary div{
    flex:1;
    background:#020617;
    padding:12px;
    border-radius:10px;
    text-align:center;
}
table{
    width:100%;
    border-collapse:collapse;
}
th, td{
    border:1px solid #00f0ff33;
    padding:10px;
    text-align:center;
}
.alert{
    background:#3f0000;
    padding:10px;
    border-radius:10px;
    color:#ff6b6b;
}
.highlight{
    background:#003f2f;
    padding:10px;
    border-radius:10px;
}
.progress{
    height:10px;
    background:#001f2f;
    border-radius:10px;
}
.progress-bar{
    height:100%;
    background:linear-gradient(90deg,#00f0ff,#00ffa6);
}
</style>
</head>

<body>

<h2>💰 Debt Planner Pro+</h2>

<div class="grid">

<div class="card">
<input id="name" placeholder="Debt Name">
<input id="amount" type="number" placeholder="Amount">
<input id="rate" type="number" placeholder="Interest %">
<input id="emi" type="number" placeholder="EMI">
<button id="addBtn">Add Debt</button>
</div>

<div class="card summary">
<div>Total<br><b id="totalDebt">₹0</b></div>
<div>EMI<br><b id="totalEMI">₹0</b></div>
<div>Months<br><b id="months">0</b></div>
<div>Saved<br><b id="saved">₹0</b></div>
<div>Score<br><b id="score">0</b></div>
</div>

</div>

<div class="card">
<table>
<thead>
<tr><th>Name</th><th>Balance</th><th>Rate</th><th>EMI</th></tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<div class="card">
<select id="strategy">
<option value="snowball">Snowball</option>
<option value="avalanche">Avalanche</option>
</select>
<input id="extra" type="number" placeholder="Extra Payment">
<button id="calcBtn">Calculate</button>
</div>

<div class="card highlight" id="suggestion"></div>
<div class="card alert" id="alertBox"></div>

<div class="card">
<div class="progress"><div class="progress-bar" id="bar"></div></div>
</div>

<div class="card">
<h3>📅 Monthly Timeline</h3>
<table>
<thead><tr><th>Month</th><th>Balance</th></tr></thead>
<tbody id="timeline"></tbody>
</table>
</div>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  projectId: "personal-budget-1cbbe"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

let debts = [];

/* 🔐 AUTH */
document.body.style.display = "none";

auth.onAuthStateChanged(user=>{
 if(!user || user.uid !== ADMIN_UID){
  window.location.href="index.html";
 } else {
  document.body.style.display="block";
  loadData();
 }
});

/* FORMAT */
function inr(x){
 return "₹"+Math.round(x).toLocaleString("en-IN");
}

/* LOAD */
function loadData(){
 db.collection("debtPlanner").doc("main")
 .onSnapshot(doc=>{
   let d = doc.data() || {};
   debts = d.rows || [];
   render();
 });
}

/* SAVE */
function saveData(){
 db.collection("debtPlanner").doc("main").set({
   rows: debts
 },{merge:true});
}

/* ADD */
addBtn.onclick = ()=>{
 let name=nameInput.value;
 let amount=+amountInput.value;
 let rate=+rateInput.value;
 let emi=+emiInput.value;

 if(!name || !amount || !rate || !emi){
  alert("Fill all fields");
  return;
 }

 debts.push({name,amount,rate,emi});

 nameInput.value="";
 amountInput.value="";
 rateInput.value="";
 emiInput.value="";

 render();
 saveData();
};

/* RENDER */
function render(){
 let t=0,e=0;
 table.innerHTML="";

 debts.forEach(d=>{
  t+=d.amount; e+=d.emi;

  table.innerHTML+=`
  <tr>
   <td>${d.name}</td>
   <td>${inr(d.amount)}</td>
   <td>${d.rate}%</td>
   <td>${inr(d.emi)}</td>
  </tr>`;
 });

 totalDebt.innerText=inr(t);
 totalEMI.innerText=inr(e);
}

/* SIMULATE */
function simulate(data,extra){
 let copy=JSON.parse(JSON.stringify(data));
 let interest=0,months=0;

 while(copy.some(d=>d.amount>0)&&months<600){
  months++;

  copy.forEach(d=>{
   if(d.amount>0){
    let i=d.amount*(d.rate/12/100);
    interest+=i;
    d.amount+=i-d.emi;
    if(d.amount<0)d.amount=0;
   }
  });

  let t=copy.find(d=>d.amount>0);
  if(t)t.amount-=extra;
 }

 return{months,interest};
}

/* CALCULATE */
calcBtn.onclick=function(){

 let strat=strategy.value;
 let extra=+extraInput.value||0;

 let base=simulate(debts,0);

 let sorted=[...debts];
 strat==="snowball"?sorted.sort((a,b)=>a.amount-b.amount)
                  :sorted.sort((a,b)=>b.rate-a.rate);

 let improved=simulate(sorted,extra);

 months.innerText=improved.months;

 let saved=Math.max(0,base.interest-improved.interest);
 savedBox.innerText=inr(saved);

 let score=100-(improved.months>60?20:improved.months>36?10:0);
 scoreEl.innerText=score;
 bar.style.width=score+"%";

 suggestion.innerText=score>80?"🟢 Excellent":score>60?"🟡 Good":"🔴 Risk";

 alertBox.innerText=improved.months<base.months
 ?`🎉 Close ${base.months-improved.months} months early!`:"";

};

/* FIX ID REFERENCES */
const nameInput=name;
const amountInput=amount;
const rateInput=rate;
const emiInput=emi;
const savedBox=saved;
const scoreEl=score;

</script>

</body>
</html>
