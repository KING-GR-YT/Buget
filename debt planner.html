<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Planner Pro+</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
:root{
--blue:#00f7ff;
--green:#00ff9d;
--red:#ff3b3b;
--bg:#070b14;
}

body{
margin:0;
background:radial-gradient(circle at top left,#0f2027,#070b14 60%);
font-family:Inter;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* HEADER */
.header{
font-family:Orbitron;
font-size:26px;
color:var(--blue);
text-shadow:0 0 15px var(--blue);
margin-bottom:20px;
}

/* CARD */
.glass{
background:rgba(255,255,255,.05);
border:1px solid rgba(0,247,255,.3);
border-radius:14px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(0,247,255,.15);
}

/* INPUT */
input,select,button{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:1px solid var(--blue);
background:#081321;
color:white;
}

button{
background:linear-gradient(90deg,#00f0ff,#00ffa6);
color:black;
font-weight:bold;
cursor:pointer;
}

/* SUMMARY */
.summary{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
}

.stat{
flex:1;
text-align:center;
}

/* CIRCLE */
.circle{
width:90px;
height:90px;
border-radius:50%;
border:4px solid var(--blue);
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-family:Orbitron;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,.1);
text-align:center;
}

.delete{
background:red;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

/* AI BOX */
.ai{
background:#002f2f;
padding:12px;
border-radius:10px;
color:#00ffcc;
}

/* PROGRESS */
.progress{
height:10px;
background:#111;
border-radius:10px;
overflow:hidden;
}
.bar{
height:100%;
background:linear-gradient(90deg,#00f0ff,#00ffa6);
}
</style>
</head>

<body>

<div class="container">

<div class="header">💰 Debt Planner Pro+</div>

<!-- SUMMARY -->
<div class="glass summary">
<div class="stat">
<div>Score</div>
<div class="circle" id="score">0</div>
</div>

<div class="stat">
<div>Total</div>
<div id="totalDebt">₹0</div>
</div>

<div class="stat">
<div>Months</div>
<div id="months">0</div>
</div>

<div class="stat">
<div>Saved</div>
<div id="saved">₹0</div>
</div>
</div>

<!-- ADD -->
<div class="glass">
<input id="name" placeholder="Debt Name">
<input id="amount" type="number" placeholder="Amount">
<input id="rate" type="number" placeholder="Interest %">
<input id="emi" type="number" placeholder="EMI">
<button onclick="addDebt()">Add Debt</button>
</div>

<!-- TABLE -->
<div class="glass">
<table>
<thead>
<tr>
<th>Name</th>
<th>Amount</th>
<th>Rate</th>
<th>EMI</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- CALCULATE -->
<div class="glass">
<select id="strategy">
<option value="snowball">Snowball</option>
<option value="avalanche">Avalanche</option>
</select>

<input id="extra" type="number" placeholder="Extra Payment">

<button onclick="calculate()">Calculate</button>
</div>

<!-- AI -->
<div class="glass ai" id="aiBox">AI Suggestion will appear here</div>

<!-- PROGRESS -->
<div class="glass">
<div class="progress"><div class="bar" id="bar"></div></div>
</div>

</div>

<script>

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSy...",
authDomain:"personal-budget-1cbbe.firebaseapp.com",
databaseURL:"https://personal-budget-1cbbe-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* STATE */
let debts=[];

/* FORMAT */
const INR = n => "₹"+Math.round(n||0).toLocaleString("en-IN");

/* ADD */
function addDebt(){

let name=document.getElementById("name").value.trim();
let amount=parseFloat(document.getElementById("amount").value);
let rate=parseFloat(document.getElementById("rate").value);
let emi=parseFloat(document.getElementById("emi").value);

if(!name || isNaN(amount) || isNaN(rate) || isNaN(emi)){
alert("Fill all fields correctly");
return;
}

debts.push({name,amount,rate,emi});

save();
render();

/* CLEAR INPUT */
document.getElementById("name").value="";
document.getElementById("amount").value="";
document.getElementById("rate").value="";
document.getElementById("emi").value="";
}

/* DELETE */
function deleteDebt(i){
debts.splice(i,1);
save();
render();
}

/* RENDER */
function render(){
let total=0;
const table=document.getElementById("table");

table.innerHTML="";

debts.forEach((d,i)=>{
total+=d.amount;

table.innerHTML+=`
<tr>
<td>${d.name}</td>
<td>${INR(d.amount)}</td>
<td>${d.rate}%</td>
<td>${INR(d.emi)}</td>
<td><button class="delete" onclick="deleteDebt(${i})">X</button></td>
</tr>`;
});

document.getElementById("totalDebt").innerText=INR(total);
}

/* SIMULATION */
function simulate(data,extra){
let copy=JSON.parse(JSON.stringify(data));
let interest=0,months=0;

while(copy.some(d=>d.amount>0)&&months<600){
months++;

copy.forEach(d=>{
if(d.amount>0){
let r=d.rate/12/100;
let i=d.amount*r;
interest+=i;
d.amount+=i;
d.amount-=d.emi;
if(d.amount<0)d.amount=0;
}
});

let t=copy.find(d=>d.amount>0);
if(t)t.amount-=extra;
}

return {months,interest};
}

/* CALCULATE */
function calculate(){

if(debts.length===0){
alert("Add at least one debt");
return;
}

let extraVal=parseFloat(document.getElementById("extra").value)||0;
let strat=document.getElementById("strategy").value;

/* SORT */
let sorted=[...debts];
if(strat==="snowball") sorted.sort((a,b)=>a.amount-b.amount);
else sorted.sort((a,b)=>b.rate-a.rate);

/* SIMULATION */
let base=simulate(debts,0);
let improved=simulate(sorted,extraVal);

/* UI UPDATE */
document.getElementById("months").innerText=improved.months;

let savedVal=Math.max(0,base.interest-improved.interest);
document.getElementById("saved").innerText=INR(savedVal);

/* SCORE */
let score=100 - improved.months/2 + (extraVal>0?10:0);
score=Math.max(0,Math.min(100,Math.round(score)));

document.getElementById("score").innerText=score;
document.getElementById("bar").style.width=score+"%";

/* AI SUGGESTION */
let target=sorted.find(d=>d.amount>0);

document.getElementById("aiBox").innerText = target
? `💡 Focus on "${target.name}" (${target.rate}% interest) to close faster`
: "All debts cleared 🎉";

}

/* SAVE */
function save(){
db.ref("debts").set(debts);
}

/* LOAD */
db.ref("debts").on("value",snap=>{
debts=snap.val()||[];
render();
});

</script>

</body>
</html>
