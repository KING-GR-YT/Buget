<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Planner Pro+</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
:root{
--blue:#00f7ff;
--green:#00ff9d;
--red:#ff2e63;
--gold:#ffc857;
}

body{
margin:0;
background:radial-gradient(circle at top left,#0f2027,#070b14 60%);
font-family:Inter;
color:white;
}

.container{
max-width:1400px;
margin:auto;
padding:15px;
}

.header{
font-family:Orbitron;
font-size:26px;
color:var(--blue);
text-shadow:0 0 15px var(--blue);
margin-bottom:20px;
}

.glass{
background:rgba(255,255,255,.05);
border:1px solid rgba(0,247,255,.3);
backdrop-filter:blur(10px);
border-radius:16px;
padding:20px;
margin-bottom:20px;
}

.top{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:space-between;
}

.stat1{
flex:1 1 160px;
text-align:center;
}

.mini-progress{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #333;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
}

.percent{
font-family:Orbitron;
font-size:20px;
}

input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid var(--blue);
background:#081321;
color:white;
}

button{
background:linear-gradient(90deg,#00f0ff,#00ffa6);
color:black;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,.1);
text-align:center;
}

.highlight{
background:#003f2f;
padding:10px;
border-radius:10px;
white-space:pre-line;
}

.alert{
background:#3f0000;
padding:10px;
border-radius:10px;
color:#ff6b6b;
}

.progress{
height:10px;
background:#001f2f;
border-radius:10px;
}
.progress-bar{
height:100%;
background:linear-gradient(90deg,#00f0ff,#00ffa6);
}

/* SCORE COLORS */
.score-risk{border-color:#ff2e2e;box-shadow:0 0 15px #ff2e2e;}
.score-stable{border-color:#ffe600;box-shadow:0 0 15px #ffe600;}
.score-strong{border-color:#00b3ff;box-shadow:0 0 15px #00b3ff;}
.score-elite{border-color:#00ff9d;box-shadow:0 0 20px #00ff9d;}
</style>
</head>

<body>

<div class="container">

<div class="header">💰 Debt Planner Pro+</div>

<!-- SUMMARY -->
<div class="glass top">

<div class="stat1">
<span>Score</span>
<div class="mini-progress" id="scoreBox">
<div class="percent" id="score">0</div>
</div>
</div>

<div class="stat1">
<span>Total Debt</span>
<div class="mini-progress"><div class="percent" id="totalDebt">₹0</div></div>
</div>

<div class="stat1">
<span>EMI</span>
<div class="mini-progress"><div class="percent" id="totalEMI">₹0</div></div>
</div>

<div class="stat1">
<span>Months</span>
<div class="mini-progress"><div class="percent" id="months">0</div></div>
</div>

<div class="stat1">
<span>Saved</span>
<div class="mini-progress"><div class="percent" id="saved">₹0</div></div>
</div>

</div>

<!-- INPUT -->
<div class="glass">
<input id="name" placeholder="Debt Name">
<input id="amount" type="number" placeholder="Amount">
<input id="rate" type="number" placeholder="Interest %">
<input id="emi" type="number" placeholder="EMI">
<button id="addBtn">Add Debt</button>
</div>

<!-- TABLE -->
<div class="glass">
<table>
<thead>
<tr><th>Name</th><th>Balance</th><th>Rate</th><th>EMI</th></tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- CALCULATE -->
<div class="glass">
<select id="strategy">
<option value="snowball">Snowball</option>
<option value="avalanche">Avalanche</option>
</select>
<input id="extra" type="number" placeholder="Extra Payment">
<button id="calcBtn">Calculate</button>
</div>

<div class="glass highlight" id="suggestion"></div>
<div class="glass alert" id="alertBox"></div>

<div class="glass">
<div class="progress"><div class="progress-bar" id="bar"></div></div>
</div>

</div>

<script>
// FIREBASE
const firebaseConfig = {
 apiKey:"AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
 authDomain:"personal-budget-1cbbe.firebaseapp.com",
 projectId:"personal-budget-1cbbe"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_UID="7Viwom2PvuOh3l8nOGhIg8rOvj52";

let debts=[];

// AUTH
document.body.style.display="none";

auth.onAuthStateChanged(user=>{
 if(!user || user.uid!==ADMIN_UID){
  window.location.href="index.html";
 } else{
  document.body.style.display="block";
  load();
 }
});

// FORMAT
function inr(x){return "₹"+Math.round(x).toLocaleString("en-IN");}

// LOAD
function load(){
 db.collection("debtPlanner").doc("main")
 .onSnapshot(doc=>{
  let d=doc.data()||{};
  debts=d.rows||[];
  render();
 });
}

// SAVE
function save(){
 db.collection("debtPlanner").doc("main").set({rows:debts},{merge:true});
}

// ADD
addBtn.onclick=()=>{
 if(!name.value||!amount.value||!rate.value||!emi.value){
  alert("Fill all fields"); return;
 }
 debts.push({
  name:name.value,
  amount:+amount.value,
  rate:+rate.value,
  emi:+emi.value
 });
 name.value=amount.value=rate.value=emi.value="";
 render(); save();
};

// RENDER
function render(){
 let t=0,e=0;
 table.innerHTML="";
 debts.forEach(d=>{
  t+=d.amount; e+=d.emi;
  table.innerHTML+=`<tr>
  <td>${d.name}</td>
  <td>${inr(d.amount)}</td>
  <td>${d.rate}%</td>
  <td>${inr(d.emi)}</td>
  </tr>`;
 });
 totalDebt.innerText=inr(t);
 totalEMI.innerText=inr(e);
}

// SIMULATE
function simulate(data,extra){
 let c=JSON.parse(JSON.stringify(data));
 let interest=0,months=0;

 while(c.some(d=>d.amount>0)&&months<600){
  months++;
  c.forEach(d=>{
   if(d.amount>0){
    let i=d.amount*(d.rate/12/100);
    interest+=i;
    d.amount+=i-d.emi;
    if(d.amount<0)d.amount=0;
   }
  });
  let t=c.find(d=>d.amount>0);
  if(t)t.amount-=extra;
 }
 return{months,interest};
}

// AI
function aiAdvisor(months,saved){
 if(debts.length===0){
  suggestion.innerText="Add debts to get insights"; return;
 }

 let high=debts.reduce((a,b)=>a.rate>b.rate?a:b);
 let small=debts.reduce((a,b)=>a.amount<b.amount?a:b);

 let msg=`🔥 Pay ${high.name} first (${high.rate}%)\n`;
 msg+=`⚡ Close ${small.name} quickly\n`;

 if(months>60) msg+="🐢 Slow → increase EMI\n";
 if(saved>50000) msg+=`💰 Save ${inr(saved)} interest\n`;

 msg+="💡 Avalanche saves money, Snowball motivates";

 suggestion.innerText=msg;
}

// CALCULATE
calcBtn.onclick=()=>{
 let strat=strategy.value;
 let extra=+extra.value||0;

 let base=simulate(debts,0);
 let sorted=[...debts];

 strat==="snowball"?sorted.sort((a,b)=>a.amount-b.amount)
                  :sorted.sort((a,b)=>b.rate-a.rate);

 let improved=simulate(sorted,extra);

 months.innerText=improved.months;

 let saved=Math.max(0,base.interest-improved.interest);
 document.getElementById("saved").innerText=inr(saved);

 let score=100-(improved.months>60?20:improved.months>36?10:0);
 document.getElementById("score").innerText=score;

 let box=document.getElementById("scoreBox");
 box.className="mini-progress";

 if(score>=85) box.classList.add("score-elite");
 else if(score>=70) box.classList.add("score-strong");
 else if(score>=50) box.classList.add("score-stable");
 else box.classList.add("score-risk");

 bar.style.width=score+"%";

 aiAdvisor(improved.months,saved);

 alertBox.innerText=improved.months<base.months
 ?`🎉 Close ${base.months-improved.months} months early!`:"";
};
</script>

</body>
</html>
