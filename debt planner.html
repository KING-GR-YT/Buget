<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Planner Pro+</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
:root{
--blue:#00f7ff;
--green:#00ffa6;
--red:#ff3b3b;
}

body{
margin:0;
background:#050b14;
font-family:Inter;
color:white;
}

.container{
max-width:850px;
margin:auto;
padding:20px;
}

.header{
font-family:Orbitron;
font-size:26px;
color:var(--blue);
margin-bottom:20px;
}

.glass{
background:rgba(255,255,255,.04);
border:1px solid rgba(0,247,255,.2);
border-radius:12px;
padding:15px;
margin-bottom:15px;
}

input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid var(--blue);
background:#081321;
color:white;
}

button{
background:linear-gradient(90deg,#00f0ff,#00ffa6);
color:black;
font-weight:bold;
cursor:pointer;
}

.summary{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.stat{
flex:1;
text-align:center;
}

.circle{
width:70px;height:70px;
border-radius:50%;
border:3px solid var(--blue);
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-family:Orbitron;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #222;
text-align:center;
}

.delete{
background:var(--red);
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

.ai{
background:#002f2f;
padding:10px;
border-radius:8px;
color:#00ffcc;
}

.progress{
height:8px;
background:#111;
border-radius:10px;
overflow:hidden;
}
.bar{
height:100%;
background:linear-gradient(90deg,#00f0ff,#00ffa6);
}
</style>
</head>

<body>

<div class="container">

<div class="header">💰 Debt Planner Pro+</div>

<!-- SUMMARY -->
<div class="glass summary">
<div class="stat">
<div>Score</div>
<div class="circle" id="score">0</div>
</div>
<div class="stat">
<div>Total</div>
<div id="totalDebt">₹0</div>
</div>
<div class="stat">
<div>Months</div>
<div id="months">0</div>
</div>
<div class="stat">
<div>Saved</div>
<div id="saved">₹0</div>
</div>
</div>

<!-- ADD -->
<div class="glass">
<input id="name" placeholder="Debt Name">
<input id="amount" type="number" placeholder="Amount">
<input id="rate" type="number" placeholder="Interest %">
<input id="emi" type="number" placeholder="EMI">
<button onclick="addDebt()">Add Debt</button>
</div>

<!-- TABLE -->
<div class="glass">
<table>
<thead>
<tr>
<th>Name</th>
<th>Amount</th>
<th>Rate</th>
<th>EMI</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- CALCULATE -->
<div class="glass">
<select id="strategy">
<option value="snowball">Snowball (Low → High)</option>
<option value="avalanche">Avalanche (High Interest)</option>
</select>

<input id="extra" type="number" placeholder="Extra Payment">
<button onclick="calculate()">Calculate</button>
</div>

<!-- AI -->
<div class="glass ai" id="aiBox">AI Suggestion will appear here</div>

<!-- PROGRESS -->
<div class="glass">
<div class="progress"><div class="bar" id="bar"></div></div>
</div>

</div>

<script>

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
authDomain:"personal-budget-1cbbe.firebaseapp.com",
databaseURL:"https://personal-budget-1cbbe-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* STATE */
let debts=[];

/* ELEMENTS */
const nameEl=document.getElementById("name");
const amountEl=document.getElementById("amount");
const rateEl=document.getElementById("rate");
const emiEl=document.getElementById("emi");
const table=document.getElementById("table");

/* FORMAT */
const INR=n=>"₹"+Math.round(n||0).toLocaleString("en-IN");

/* ADD */
function addDebt(){
let name=nameEl.value.trim();
let amount=parseFloat(amountEl.value);
let rate=parseFloat(rateEl.value);
let emi=parseFloat(emiEl.value);

if(!name || isNaN(amount)||isNaN(rate)||isNaN(emi)){
alert("Fill all fields correctly");
return;
}

debts.push({name,amount,rate,emi});
save();
render();

nameEl.value=amountEl.value=rateEl.value=emiEl.value="";
}

/* DELETE */
function deleteDebt(i){
debts.splice(i,1);
save();
render();
}

/* RENDER */
function render(){
let total=0;
table.innerHTML="";

debts.forEach((d,i)=>{
total+=d.amount;

table.innerHTML+=`
<tr>
<td>${d.name}</td>
<td>${INR(d.amount)}</td>
<td>${d.rate}%</td>
<td>${INR(d.emi)}</td>
<td><button class="delete" onclick="deleteDebt(${i})">X</button></td>
</tr>`;
});

document.getElementById("totalDebt").innerText=INR(total);
}

/* SIMULATION (FIXED LOGIC) */
function simulate(data,extra){
let copy=JSON.parse(JSON.stringify(data));
let months=0,interest=0;

while(copy.some(d=>d.amount>0)&&months<600){
months++;

for(let i=0;i<copy.length;i++){
let d=copy[i];
if(d.amount<=0) continue;

let iVal=d.amount*(d.rate/12/100);
interest+=iVal;
d.amount+=iVal;
d.amount-=d.emi;

if(i===0) d.amount-=extra; // extra to priority debt

if(d.amount<0)d.amount=0;
}
}

return {months,interest};
}

/* CALCULATE */
function calculate(){

if(debts.length===0){
alert("Add at least one debt");
return;
}

let extra=parseFloat(document.getElementById("extra").value)||0;
let strat=document.getElementById("strategy").value;

let sorted=[...debts];

if(strat==="snowball")
sorted.sort((a,b)=>a.amount-b.amount);
else
sorted.sort((a,b)=>b.rate-a.rate);

let base=simulate(debts,0);
let improved=simulate(sorted,extra);

/* UI */
document.getElementById("months").innerText=improved.months;

let saved=Math.max(0,base.interest-improved.interest);
document.getElementById("saved").innerText=INR(saved);

/* SCORE */
let score=Math.max(0,Math.min(100,100-improved.months/2+(extra>0?10:0)));
document.getElementById("score").innerText=Math.round(score);
document.getElementById("bar").style.width=score+"%";

/* AI */
let target=sorted.find(d=>d.amount>0);

document.getElementById("aiBox").innerText =
target
? `💡 Focus on "${target.name}" (${target.rate}%). Use ${strat} strategy to close faster.`
: "🎉 All debts cleared!";
}

/* SAVE */
function save(){
db.ref("debts").set(debts);
}

/* LOAD */
db.ref("debts").on("value",snap=>{
let data=snap.val();

if(Array.isArray(data)) debts=data;
else if(data) debts=Object.values(data);
else debts=[];

render();
});

</script>

</body>
</html>
