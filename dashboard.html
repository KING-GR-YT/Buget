<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Dashboard</title>

<link rel="icon" type="image/png" sizes="32x32" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: radial-gradient(circle at top left,#0a0f1c,#050811 70%);
color:#dff;
}

/* HEADER */

.header{
text-align:center;
padding:20px;
font-size:36px;
font-weight:600;
letter-spacing:1px;
background:rgba(0,255,255,0.05);
border-bottom:1px solid rgba(0,255,255,0.3);
box-shadow:0 0 25px rgba(0,255,255,0.2);
color:#00ffff;
}

.dashboard{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
padding:30px;
}

@media(max-width:1000px){
.dashboard{grid-template-columns:1fr;}
}

.card{
background:rgba(10,15,30,0.85);
border-radius:18px;
padding:25px;
border:1px solid #ffc107;
}

.title{
text-align:center;
font-weight:600;
margin-bottom:20px;
font-size:28px;
color:#00ffff;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:10px;
border:1px solid rgba(0,255,255,0.4);
}

th,td{
padding:10px;
text-align:center;
border:1px solid rgba(0,255,255,0.25);
}

th{
background:rgba(0,255,255,0.15);
color:#00ffff;
font-weight:800;
}

.highlight-blue td{
background:rgba(0,255,255,0.18);
font-weight:700;
color:#00ffff;
}

input{
width:100%;
padding:8px 0;
border:none;
background:transparent;
color:#00ffff;
font-weight:1000;
font-size:16px;
text-align:center;
}

.net{
margin-top:15px;
padding:12px;
text-align:center;
font-weight:1000;
border-radius:10px;
background:rgba(255,193,7,0.15);
border:1px solid #ffc107;
color:#ffc107;
}

.total-box{
margin-top:15px;
padding:12px;
background:rgba(0,255,100,0.15);
border:1px solid #00ff99;
color:#00ff99;
text-align:center;
font-weight:800;
border-radius:10px;
}

.flex{display:flex;gap:25px;}
@media(max-width:1000px){.flex{flex-direction:column;}}

.left{flex:2;}
.right{flex:1;}

.home-link{
padding:6px 14px;
border-radius:8px;
text-decoration:none;
background:rgba(0,255,255,0.1);
color:#00ffff;
border:1px solid rgba(0,255,255,0.5);
float:right;
}

</style>
</head>

<body>

<div class="header">
⚡ Monthly Dashboard ⚡
<a href="main.html" class="home-link">🏠 Home</a>
</div>

<div class="dashboard">

<!-- CURRENT MONTH -->
<div class="card">

<div class="title" id="currentMonthTitle"></div>

<div class="flex">

<div class="left">

<table>
<tr>
<td>EXTRA</td>
<td><input type="number" id="febExtra"></td>
</tr>

<tr>
<td>SALARY</td>
<td><input type="number" id="febSalary" value="25000"></td>
</tr>

<tr class="highlight-blue">
<td>BANK BALANCE</td>
<td id="febBankBalance"></td>
</tr>
</table>

<br>

<table>

<tr>
<th></th>
<th>PARDEEP</th>
<th>SANDEEP</th>
<th>Total</th>
</tr>

<tr>
<td>YES BANK</td>
<td><input class="febP"></td>
<td><input class="febS"></td>
<td class="febRow"></td>
</tr>

<tr>
<td>HDFC</td>
<td><input class="febP"></td>
<td><input class="febS"></td>
<td class="febRow"></td>
</tr>

<tr>
<td>ONE CARD</td>
<td><input class="febP"></td>
<td><input class="febS"></td>
<td class="febRow"></td>
</tr>

<tr>
<td>ICICI</td>
<td><input class="febP"></td>
<td><input class="febS"></td>
<td class="febRow"></td>
</tr>

<tr class="highlight-blue">
<td>TOTAL</td>
<td id="febTotalP"></td>
<td id="febTotalS"></td>
<td id="febGrand"></td>
</tr>

</table>

<div class="net">
NET BALANCE
<span id="febNet"></span>
</div>

</div>

<div class="right">

<table>
<tr><td>EMI</td><td><input class="febExp"></td></tr>
<tr><td>House</td><td><input class="febExp"></td></tr>
<tr><td>Investment</td><td><input class="febExp"></td></tr>
<tr><td>Petrol</td><td><input class="febExp"></td></tr>
<tr><td>EM Fund</td><td><input class="febExp"></td></tr>
<tr><td>Other EXP</td><td><input class="febExp"></td></tr>
</table>

<div class="total-box">
TOTAL <span id="febExpTotal"></span>
</div>

</div>
</div>
</div>


<!-- PREVIOUS MONTH -->
<div class="card">

<div class="title" id="previousMonthTitle"></div>

<div class="flex">

<div class="left">

<table>

<tr>
<td>EXTRA</td>
<td><input type="number" id="janExtra"></td>
</tr>

<tr>
<td>SALARY</td>
<td><input type="number" id="janSalary" value="25000"></td>
</tr>

<tr class="highlight-blue">
<td>BANK BALANCE</td>
<td id="janBankBalance"></td>
</tr>

</table>

<br>

<table>

<tr>
<th></th>
<th>PARDEEP</th>
<th>SANDEEP</th>
<th>Total</th>
</tr>

<tr>
<td>YES BANK</td>
<td><input class="janP"></td>
<td><input class="janS"></td>
<td class="janRow"></td>
</tr>

<tr>
<td>HDFC</td>
<td><input class="janP"></td>
<td><input class="janS"></td>
<td class="janRow"></td>
</tr>

<tr>
<td>ONE CARD</td>
<td><input class="janP"></td>
<td><input class="janS"></td>
<td class="janRow"></td>
</tr>

<tr>
<td>ICICI</td>
<td><input class="janP"></td>
<td><input class="janS"></td>
<td class="janRow"></td>
</tr>

<tr class="highlight-blue">
<td>TOTAL</td>
<td id="janTotalP"></td>
<td id="janTotalS"></td>
<td id="janGrand"></td>
</tr>

</table>

<div class="net">
NET BALANCE
<span id="janNet"></span>
</div>

</div>

</div>
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {
apiKey:"AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
authDomain:"personal-budget-1cbbe.firebaseapp.com",
projectId:"personal-budget-1cbbe",
storageBucket:"personal-budget-1cbbe.firebasestorage.app",
messagingSenderId:"133591748262",
appId:"1:133591748262:web:2c0846f03f5f56aeb1ee67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* MONTH TITLES */

function monthName(offset){
let d=new Date();
d.setMonth(d.getMonth()+offset);
return d.toLocaleString("en-IN",{month:"long",year:"numeric"});
}

document.getElementById("currentMonthTitle").innerText=
"Current Month : "+monthName(0);

document.getElementById("previousMonthTitle").innerText=
"Previous Month : "+monthName(-1);


/* GET MONTH */

function getCurrentMonth(){
return new Date().toISOString().slice(0,7);
}

function getPreviousMonth(){
let d=new Date();
d.setMonth(d.getMonth()-1);
return d.toISOString().slice(0,7);
}


/* FIREBASE LISTENER */

const bankRef=collection(db,"bankEntries");

onSnapshot(bankRef,(snapshot)=>{

let currentMonth=getCurrentMonth();
let previousMonth=getPreviousMonth();

let currentData={};
let previousData={};

snapshot.forEach(docItem=>{

let d=docItem.data();

if(d.month===currentMonth){

if(!currentData[d.bank]) currentData[d.bank]={};

currentData[d.bank][d.person]=(currentData[d.bank][d.person]||0)+Number(d.amount);

}

if(d.month===previousMonth){

if(!previousData[d.bank]) previousData[d.bank]={};

previousData[d.bank][d.person]=(previousData[d.bank][d.person]||0)+Number(d.amount);

}

});

const banks=["YES BANK","HDFC","ONE CARD","ICICI"];

banks.forEach((bank,i)=>{

let p=currentData[bank]?.PARDEEP||0;
let s=currentData[bank]?.SANDEEP||0;

document.querySelectorAll(".febP")[i].value=p;
document.querySelectorAll(".febS")[i].value=s;

});

banks.forEach((bank,i)=>{

let p=previousData[bank]?.PARDEEP||0;
let s=previousData[bank]?.SANDEEP||0;

document.querySelectorAll(".janP")[i].value=p;
document.querySelectorAll(".janS")[i].value=s;

});

calculate("feb");
calculate("jan");

});


/* CALCULATE TOTALS */

function calculate(prefix){

let p=document.querySelectorAll("."+prefix+"P");
let s=document.querySelectorAll("."+prefix+"S");
let rows=document.querySelectorAll("."+prefix+"Row");

let tp=0;
let ts=0;

p.forEach((el,i)=>{

let pv=Number(el.value)||0;
let sv=Number(s[i].value)||0;

rows[i].innerText=pv+sv;

tp+=pv;
ts+=sv;

});

document.getElementById(prefix+"TotalP").innerText=tp;
document.getElementById(prefix+"TotalS").innerText=ts;
document.getElementById(prefix+"Grand").innerText=tp+ts;
document.getElementById(prefix+"BankBalance").innerText=tp+ts;

}

</script>

</body>
</html>
