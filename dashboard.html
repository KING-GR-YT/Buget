<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Dashboard</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0a0f1c,#050811);
    color:#fff;
}

.container{
    padding:20px;
}

h2{
    margin-top:40px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th,td{
    border:1px solid rgba(255,255,255,0.1);
    padding:10px;
    text-align:center;
}

th{
    background:#111a2b;
}

.total-box{
    margin-top:20px;
    padding:15px;
    background:#111a2b;
    border-radius:10px;
    font-size:18px;
    display:flex;
    justify-content:space-between;
}

/* MONEY INPUT DESIGN */
.money-wrap{
    position:relative;
    width:100%;
}

.money-wrap span{
    position:absolute;
    left:8px;
    top:50%;
    transform:translateY(-50%);
    color:#00ffff;
    font-weight:600;
    pointer-events:none;
}

.money-wrap input{
    width:100%;
    padding:8px 8px 8px 20px;
    background:#0f1626;
    border:1px solid rgba(255,255,255,0.1);
    color:#fff;
    border-radius:6px;
    text-align:right;
    font-size:14px;
}

.money-wrap input:focus{
    outline:none;
    border:1px solid #00ffff;
}
</style>
</head>

<body>

<div class="container">

<!-- JANUARY -->
<h2>January</h2>

<table>
<tr>
<th>Salary</th>
<th>Extra</th>
<th>Expense 1</th>
<th>Expense 2</th>
</tr>

<tr>
<td>
<div class="money-wrap">
<span>₹</span>
<input type="text" id="janSalary" class="money" value="30000">
</div>
</td>

<td>
<div class="money-wrap">
<span>₹</span>
<input type="text" id="janExtra" class="money" value="4000">
</div>
</td>

<td>
<div class="money-wrap">
<span>₹</span>
<input type="text" id="janExp1" class="money" value="5000">
</div>
</td>

<td>
<div class="money-wrap">
<span>₹</span>
<input type="text" id="janExp2" class="money" value="3000">
</div>
</td>
</tr>
</table>

<div class="total-box">
<span>Total Balance</span>
<b id="janTotal">₹ 0</b>
</div>


<!-- FEBRUARY -->
<h2>February</h2>

<table>
<tr>
<th>Salary</th>
<th>Extra</th>
<th>Expense 1</th>
<th>Expense 2</th>
</tr>

<tr>
<td>
<div class="money-wrap">
<span>₹</span>
<input type="text" id="febSalary" class="money" value="25000">
</div>
</td>

<td>
<div class="money-wrap">
<span>₹</span>
<input type="text" id="febExtra" class="money" value="5000">
</div>
</td>

<td>
<div class="money-wrap">
<span>₹</span>
<input type="text" id="febExp1" class="money" value="4000">
</div>
</td>

<td>
<div class="money-wrap">
<span>₹</span>
<input type="text" id="febExp2" class="money" value="3500">
</div>
</td>
</tr>
</table>

<div class="total-box">
<span>Total Balance</span>
<b id="febTotal">₹ 0</b>
</div>

</div>

<script>

// Format while typing
document.addEventListener("input", function(e){
    if(e.target.classList.contains("money")){
        let val = e.target.value.replace(/[^0-9]/g,"");
        if(val){
            e.target.value = Number(val).toLocaleString("en-IN");
        }else{
            e.target.value="";
        }
        calculate();
    }
});

function getNumber(id){
    let val = document.getElementById(id).value.replace(/,/g,"");
    return Number(val)||0;
}

function calculate(){

    // January
    let janTotal = 
        (getNumber("janSalary") + getNumber("janExtra")) -
        (getNumber("janExp1") + getNumber("janExp2"));

    document.getElementById("janTotal").innerText =
        "₹ " + janTotal.toLocaleString("en-IN");

    // February
    let febTotal = 
        (getNumber("febSalary") + getNumber("febExtra")) -
        (getNumber("febExp1") + getNumber("febExp2"));

    document.getElementById("febTotal").innerText =
        "₹ " + febTotal.toLocaleString("en-IN");
}

// Initial calculation
calculate();

</script>

</body>
</html>
