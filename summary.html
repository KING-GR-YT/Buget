<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Financial Health Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
margin:0;
background:#0b0f19;
font-family:Inter;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.header{
font-family:Orbitron;
font-size:28px;
color:#00e5ff;
margin-bottom:25px;
}

.card{
background:#121829;
border:1px solid #1f2a44;
border-radius:10px;
padding:20px;
margin-bottom:25px;
}

.sectionTitle{
font-family:Orbitron;
color:#00ffa6;
margin-bottom:15px;
}

.row{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.stat{
flex:1;
min-width:180px;
}

.stat span{
font-size:13px;
color:#aaa;
}

.stat b{
display:block;
margin-top:5px;
font-size:20px;
color:#00ffa6;
}

.score{
font-size:60px;
font-family:Orbitron;
text-align:center;
color:#00ffa6;
}

.grade{
text-align:center;
font-size:22px;
font-family:Orbitron;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
padding:10px;
color:#ffd166;
border-bottom:2px solid #1f2a44;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #1f2a44;
}

input{
background:#0b0f19;
border:1px solid #1f2a44;
padding:8px;
color:white;
border-radius:5px;
}

canvas{
background:#0b0f19;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">Financial Health Dashboard</div>


<!-- FINANCIAL SCORE -->

<div class="card">

<div class="sectionTitle">Financial Health Score</div>

<div class="score" id="score">0</div>

<div class="grade" id="grade">-</div>

</div>


<!-- NET WORTH -->

<div class="card">

<div class="sectionTitle">Net Worth</div>

<div class="row">

<div class="stat">
<span>Total Assets</span>
<b id="asset">₹0</b>
</div>

<div class="stat">
<span>Total Liability</span>
<b id="liability">₹0</b>
</div>

<div class="stat">
<span>Net Worth</span>
<b id="networth">₹0</b>
</div>

</div>

</div>


<!-- EMERGENCY FUND -->

<div class="card">

<div class="sectionTitle">Emergency Fund</div>

<div class="row">

<div class="stat">
<span>Target</span>
<b id="target">₹0</b>
</div>

<div class="stat">
<span>Available</span>
<b id="fund">₹0</b>
</div>

<div class="stat">
<span>Pending</span>
<b id="pending">₹0</b>
</div>

</div>

</div>


<!-- AGE + ALLOCATION -->

<div class="card">

<div class="sectionTitle">Investment Allocation</div>

<div class="row">

<div class="stat">
<span>DOB</span>
<input type="date" id="dob">
</div>

<div class="stat">
<span>Age</span>
<b id="age">0</b>
</div>

</div>

<br>

<table>

<tr>
<th>Asset</th>
<th>Current %</th>
<th>Required %</th>
<th>Status</th>
</tr>

<tr>
<td>Equity</td>
<td id="eqCur">0%</td>
<td id="eqReq">0%</td>
<td id="eqStat">-</td>
</tr>

<tr>
<td>Gold</td>
<td id="gCur">0%</td>
<td id="gReq">15%</td>
<td id="gStat">-</td>
</tr>

<tr>
<td>Debt</td>
<td id="dCur">0%</td>
<td id="dReq">0%</td>
<td id="dStat">-</td>
</tr>

</table>

</div>


<!-- NET WORTH GROWTH -->

<div class="card">

<div class="sectionTitle">Net Worth Growth</div>

<canvas id="chart" width="900" height="300"></canvas>

</div>


</div>


<script>

const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  projectId: "personal-budget-1cbbe",
  storageBucket: "personal-budget-1cbbe.appspot.com",
  messagingSenderId: "133591748262",
  appId: "1:133591748262:web:2c0846f03f5f56aeb1ee67"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.firestore();

/* PAGE SECURITY */

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

document.body.style.display="block";

auth.onAuthStateChanged(function(user){

if(!user || user.uid !== ADMIN_UID){
window.location.href="index.html";
}else{
document.body.style.display="block";
}

});
  
/* FORMAT INR */

function INR(n){
return new Intl.NumberFormat('en-IN',{
style:'currency',
currency:'INR'
}).format(n||0)
}


/* AGE CALCULATION */

function calcAge(d){

let b=new Date(d)
let t=new Date()

let age=t.getFullYear()-b.getFullYear()

let m=t.getMonth()-b.getMonth()

if(m<0 || (m===0 && t.getDate()<b.getDate())) age--

return age
}


/* ALLOCATION TABLE */

function getAllocation(age){

if(age<=30) return {e:75,d:15,g:10}
if(age<=35) return {e:70,d:20,g:10}
if(age<=40) return {e:65,d:25,g:10}
if(age<=50) return {e:60,d:30,g:10}
return {e:50,d:40,g:10}

}


/* STATUS CHECK */

function status(c,r){

if(Math.abs(c-r)<=5) return "Balanced"
if(c>r) return "Over"
return "Under"

}


/* DOB SAVE */

document.getElementById("dob").addEventListener("change",function(){

let dob=this.value

db.collection("portfolio").doc("main").update({
  dob: dob
})

updateAllocation(dob)

})


/* UPDATE ALLOCATION */

function updateAllocation(dob){

if(!dob) return

let age=calcAge(dob)

document.getElementById("age").innerText=age

let r=getAllocation(age)

document.getElementById("eqReq").innerText=r.e+"%"
document.getElementById("gReq").innerText=r.g+"%"
document.getElementById("dReq").innerText=r.d+"%"

}



/* FIREBASE PORTFOLIO SYNC */

db.collection("portfolio")
.doc("main")
.onSnapshot((doc)=>{

let d = doc.data() || {}

let rows = d.rows || []

let equity=0
let gold=0
let debt=0

let invested=0
let current=0


rows.forEach(r=>{

invested += Number(r.invested)||0
current += Number(r.current)||0

if(r.category==="Equity") equity+=Number(r.current)||0
if(r.category==="Gold") gold+=Number(r.current)||0
if(r.category==="Debt") debt+=Number(r.current)||0

})


/* LOAD DOB */

if(d.dob){

document.getElementById("dob").value=d.dob
updateAllocation(d.dob)

}


/* FINANCIAL VALUES */

let emergency = Number(d.emergency)||0
let loan = Number(d.loan)||0
let target = Number(d.target)||0

let networth = current + emergency - loan



/* NET WORTH UI */

document.getElementById("asset").innerText = INR(current + emergency)
document.getElementById("liability").innerText = INR(loan)
document.getElementById("networth").innerText = INR(networth)



/* EMERGENCY FUND */

document.getElementById("target").innerText = INR(target)
document.getElementById("fund").innerText = INR(emergency)
document.getElementById("pending").innerText = INR(target-emergency)



/* CURRENT % */

let eqP = current ? (equity/current)*100 : 0
let gP = current ? (gold/current)*100 : 0
let dP = current ? (debt/current)*100 : 0

document.getElementById("eqCur").innerText = eqP.toFixed(1)+"%"
document.getElementById("gCur").innerText = gP.toFixed(1)+"%"
document.getElementById("dCur").innerText = dP.toFixed(1)+"%"



/* REQUIRED */

let eqReq=parseFloat(document.getElementById("eqReq").innerText)||0
let gReq=parseFloat(document.getElementById("gReq").innerText)||0
let dReq=parseFloat(document.getElementById("dReq").innerText)||0



/* STATUS */

document.getElementById("eqStat").innerText=status(eqP,eqReq)
document.getElementById("gStat").innerText=status(gP,gReq)
document.getElementById("dStat").innerText=status(dP,dReq)



/* FINANCIAL HEALTH SCORE */

let score=0

if(networth>0) score+=25
if(emergency>=target) score+=25
if(eqP>=50) score+=20
if(gP>=10) score+=15
if(dP<=30) score+=15

document.getElementById("score").innerText=score



/* GRADE */

let grade="Risk"

if(score>=90) grade="Elite"
else if(score>=75) grade="Strong"
else if(score>=60) grade="Stable"
else if(score>=40) grade="Weak"

document.getElementById("grade").innerText=grade


})

</script>

</body>
</html>
