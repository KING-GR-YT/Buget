<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construction System</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  projectId: "personal-budget-1cbbe"
};

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

document.body.style.display = "none";

onAuthStateChanged(auth, (user) => {
  if (!user || user.uid !== ADMIN_UID) {
    window.location.href = "index.html";
  } else {
    document.body.style.display = "block";
    startApp();
  }
});

const today = new Date().toISOString().split('T')[0];

function format(n){ return Number(n||0).toLocaleString('en-IN'); }

window.showTab = function(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ================= MATERIAL =================
window.addMaterial = async function(){
  let data = {
    date: m_date.value,
    party: m_party.value,
    name: m_name.value,
    bill: m_bill.value,
    qty:+m_qty.value||0,
    rate:+m_rate.value||0,
    gst:+m_gst.value||0
  };

  data.amount = data.qty * data.rate + (data.qty * data.rate * data.gst / 100);

  await addDoc(collection(db,"materials"),data);
  loadMaterial();
}

window.deleteMaterial = async function(id){
  await deleteDoc(doc(db,"materials",id));
  loadMaterial();
}

async function loadMaterial(){
  const snap = await getDocs(collection(db,"materials"));
  m_list.innerHTML='';
  let total=0;

  let filter = m_filter.value.toLowerCase();

  snap.forEach(d=>{
    let x=d.data();
    if(filter && !x.name.toLowerCase().includes(filter)) return;

    total+=x.amount;

    m_list.innerHTML+=`
    <tr>
      <td>${x.date}</td>
      <td>${x.party}</td>
      <td>${x.name}</td>
      <td>${x.bill}</td>
      <td>${format(x.qty)}</td>
      <td>${format(x.rate)}</td>
      <td>${x.gst}%</td>
      <td>₹${format(x.amount)}</td>
      <td><button onclick="deleteMaterial('${d.id}')">X</button></td>
    </tr>`;
  });

  m_total.innerText="₹"+format(total);
}

// ================= ACCOUNT =================
window.addAccount = async function(){
  await addDoc(collection(db,"accounts"),{
    date:a_date.value,
    party:a_party.value,
    type:a_type.value,
    amount:+a_amount.value||0
  });

  loadAccount();
  loadSummary();
}

window.deleteAccount = async function(id){
  await deleteDoc(doc(db,"accounts",id));
  loadAccount();
  loadSummary();
}

async function loadAccount(){
  const snap = await getDocs(collection(db,"accounts"));
  a_list.innerHTML='';

  snap.forEach(d=>{
    let x=d.data();

    a_list.innerHTML+=`
    <tr>
      <td>${x.date}</td>
      <td>${x.party}</td>
      <td>${x.type}</td>
      <td>₹${format(x.amount)}</td>
      <td><button onclick="deleteAccount('${d.id}')">X</button></td>
    </tr>`;
  });
}

// ================= PARTY LEDGER =================
async function loadSummary(){
  const snap = await getDocs(collection(db,"accounts"));
  let data = [];

  snap.forEach(d=>{
    data.push({...d.data()});
  });

  data.sort((a,b)=> new Date(a.date) - new Date(b.date));

  let balanceMap = {};
  s_list.innerHTML='';

  data.forEach(x=>{
    if(!balanceMap[x.party]) balanceMap[x.party]=0;

    if(x.type === 'received'){
      balanceMap[x.party]+=x.amount;
    } else {
      balanceMap[x.party]-=x.amount;
    }

    s_list.innerHTML += `
    <div style="border:1px solid #ccc;margin:5px;padding:8px;">
      <b>${x.party}</b> | ${x.date}<br>
      ${x.type.toUpperCase()} : ₹${format(x.amount)}<br>
      <b>Balance: ₹${format(balanceMap[x.party])}</b>
    </div>`;
  });
}

// ================= EXPORT EXCEL =================
window.exportExcel = async function(){
  const snap = await getDocs(collection(db,"materials"));
  let rows = [];

  rows.push(["Date","Party","Material","Bill","Qty","Rate","GST","Amount"]);

  snap.forEach(d=>{
    let x=d.data();
    rows.push([x.date,x.party,x.name,x.bill,x.qty,x.rate,x.gst,x.amount]);
  });

  let csv = "data:text/csv;charset=utf-8,";
  rows.forEach(r=>{ csv += r.join(",") + "\n"; });

  const link = document.createElement("a");
  link.href = encodeURI(csv);
  link.download = "material_data.csv";
  document.body.appendChild(link);
  link.click();
}

// INIT
window.onload=()=>{
  m_date.value=today;
  a_date.value=today;
  loadMaterial();
  loadAccount();
  loadSummary();
}
</script>

<style>
body {font-family:Arial;padding:10px;}
.tabs{display:flex;}
.tabs button{flex:1;padding:10px;}
.tab{display:none;}
.active{display:block;}

input,select,button{width:100%;padding:8px;margin:5px 0;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:6px;text-align:center;}
.total{background:#dff0d8;}
</style>
</head>

<body>

<h2>🏗 Construction System</h2>

<div class="tabs">
<button onclick="showTab('material')">🧱 Material</button>
<button onclick="showTab('account')">💰 Account</button>
<button onclick="showTab('summary')">📒 Ledger</button>
</div>

<!-- MATERIAL -->
<div id="material" class="tab active">
<input type="date" id="m_date">
<input type="text" id="m_party" placeholder="Party">
<input type="text" id="m_name" placeholder="Material">
<input type="text" id="m_bill" placeholder="Bill No">
<input type="number" id="m_qty" placeholder="Qty">
<input type="number" id="m_rate" placeholder="Rate">
<input type="number" id="m_gst" placeholder="GST">
<input type="text" id="m_filter" placeholder="Filter" oninput="loadMaterial()">

<button onclick="addMaterial()">Add</button>
<button onclick="exportExcel()">⬇ Export Excel</button>

<table>
<thead>
<tr>
<th>Date</th><th>Party</th><th>Material</th><th>Bill</th>
<th>Qty</th><th>Rate</th><th>GST</th><th>Amount</th><th>X</th>
</tr>
</thead>
<tbody id="m_list"></tbody>
<tfoot>
<tr class="total">
<td colspan="7">TOTAL</td>
<td id="m_total">0</td>
<td></td>
</tr>
</tfoot>
</table>
</div>

<!-- ACCOUNT -->
<div id="account" class="tab">
<input type="date" id="a_date">
<input type="text" id="a_party" placeholder="Party">
<select id="a_type">
<option value="paid">Paid</option>
<option value="received">Received</option>
</select>
<input type="number" id="a_amount" placeholder="Amount">

<button onclick="addAccount()">Add</button>

<table>
<thead>
<tr>
<th>Date</th><th>Party</th><th>Type</th><th>Amount</th><th>X</th>
</tr>
</thead>
<tbody id="a_list"></tbody>
</table>
</div>

<!-- LEDGER -->
<div id="summary" class="tab">
<div id="s_list"></div>
</div>

</body>
</html>
