<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construction Final System</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  projectId: "personal-budget-1cbbe"
};

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

document.body.style.display = "none";

onAuthStateChanged(auth, (user) => {
  if (!user || user.uid !== ADMIN_UID) {
    window.location.href = "index.html";
  } else {
    document.body.style.display = "block";
    startApp();
  }
});

const today = new Date().toISOString().split('T')[0];

function format(n){ return Number(n||0).toLocaleString('en-IN'); }

window.showTab = function(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// MATERIAL
window.addMaterial = async function(){
  let data = {
    date: m_date.value,
    party: m_party.value,
    name: m_name.value,
    bill: m_bill.value,
    qty:+m_qty.value||0,
    rate:+m_rate.value||0,
    gst:+m_gst.value||0
  };

  data.amount = data.qty * data.rate + (data.qty * data.rate * data.gst / 100);

  await addDoc(collection(db,"materials"),data);
  loadMaterial();
  loadDashboard();
}

window.deleteMaterial = async function(id){
  await deleteDoc(doc(db,"materials",id));
  loadMaterial();
}

async function loadMaterial(){
  const snap = await getDocs(collection(db,"materials"));
  m_list.innerHTML='';
  let total=0;

  let filter = m_filter.value.toLowerCase();

  snap.forEach(d=>{
    let x=d.data();
    if(filter && !x.name.toLowerCase().includes(filter)) return;

    total+=x.amount;

    m_list.innerHTML+=`
    <tr>
      <td>${x.date}</td>
      <td>${x.party}</td>
      <td>${x.name}</td>
      <td>${x.bill}</td>
      <td>${format(x.qty)}</td>
      <td>${format(x.rate)}</td>
      <td>${x.gst}%</td>
      <td>₹${format(x.amount)}</td>
      <td><button onclick="deleteMaterial('${d.id}')">X</button></td>
    </tr>`;
  });

  m_total.innerText="₹"+format(total);
}

// ACCOUNT
window.addAccount = async function(){
  await addDoc(collection(db,"accounts"),{
    date:a_date.value,
    party:a_party.value,
    type:a_type.value,
    amount:+a_amount.value||0
  });

  loadAccount();
  loadSummary();
  loadDashboard();
}

window.deleteAccount = async function(id){
  await deleteDoc(doc(db,"accounts",id));
  loadAccount();
}

async function loadAccount(){
  const snap = await getDocs(collection(db,"accounts"));
  a_list.innerHTML='';

  snap.forEach(d=>{
    let x=d.data();

    a_list.innerHTML+=`
    <tr>
      <td>${x.date}</td>
      <td>${x.party}</td>
      <td>${x.type}</td>
      <td>₹${format(x.amount)}</td>
      <td><button onclick="deleteAccount('${d.id}')">X</button></td>
    </tr>`;
  });
}

// SUMMARY
async function loadSummary(){
  const snap = await getDocs(collection(db,"accounts"));
  let sum={};

  snap.forEach(d=>{
    let x=d.data();
    if(!sum[x.party]) sum[x.party]={p:0,r:0};
    x.type==='paid'? sum[x.party].p+=x.amount : sum[x.party].r+=x.amount;
  });

  s_list.innerHTML='';

  for(let k in sum){
    let bal=sum[k].r - sum[k].p;

    s_list.innerHTML += `
    <div style="border:1px solid #ccc;padding:10px;margin-top:10px;">
      <b>${k}</b><br>
      Paid: ₹${format(sum[k].p)}<br>
      Received: ₹${format(sum[k].r)}<br>
      Balance: ₹${format(bal)}
    </div>`;
  }
}

// DASHBOARD
async function loadDashboard(){
  let mat=0, paid=0, recv=0;

  const mSnap = await getDocs(collection(db,"materials"));
  mSnap.forEach(d=> mat+=d.data().amount);

  const aSnap = await getDocs(collection(db,"accounts"));
  aSnap.forEach(d=>{
    let x=d.data();
    x.type==='paid'? paid+=x.amount : recv+=x.amount;
  });

  d_mat.innerText=format(mat);
  d_paid.innerText=format(paid);
  d_recv.innerText=format(recv);
  d_bal.innerText=format(recv-paid);
}

window.onload=()=>{
  m_date.value=today;
  a_date.value=today;
  loadMaterial();
  loadAccount();
  loadSummary();
  loadDashboard();
}
</script>

<style>
body {font-family:Arial;padding:10px;}
.tabs{display:flex;}
.tabs button{flex:1;padding:10px;}
.tab{display:none;}
.active{display:block;}

input,select,button{width:100%;padding:8px;margin:5px 0;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:6px;text-align:center;}
.total{background:#dff0d8;}
</style>
</head>

<body>

<h2>🏗 Construction Final System</h2>

<div class="tabs">
<button onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('material')">Material</button>
<button onclick="showTab('account')">Account</button>
<button onclick="showTab('summary')">Summary</button>
</div>

<div id="dashboard" class="tab active">
<h3>Total Material: ₹<span id="d_mat">0</span></h3>
<h3>Paid: ₹<span id="d_paid">0</span></h3>
<h3>Received: ₹<span id="d_recv">0</span></h3>
<h2>Balance: ₹<span id="d_bal">0</span></h2>
</div>

<div id="material" class="tab">
<input type="date" id="m_date">
<input type="text" id="m_party" placeholder="Party">
<input type="text" id="m_name" placeholder="Material">
<input type="text" id="m_bill" placeholder="Bill No">
<input type="number" id="m_qty" placeholder="Qty">
<input type="number" id="m_rate" placeholder="Rate">
<input type="number" id="m_gst" placeholder="GST">
<input type="text" id="m_filter" placeholder="Filter" oninput="loadMaterial()">
<button onclick="addMaterial()">Add</button>

<table>
<thead>
<tr>
<th>Date</th><th>Party</th><th>Material</th><th>Bill</th>
<th>Qty</th><th>Rate</th><th>GST</th><th>Amount</th><th>X</th>
</tr>
</thead>
<tbody id="m_list"></tbody>
<tfoot>
<tr class="total">
<td colspan="7">TOTAL</td>
<td id="m_total">0</td>
<td></td>
</tr>
</tfoot>
</table>
</div>

<div id="account" class="tab">
<input type="date" id="a_date">
<input type="text" id="a_party" placeholder="Party">
<select id="a_type">
<option value="paid">Paid</option>
<option value="received">Received</option>
</select>
<input type="number" id="a_amount" placeholder="Amount">
<button onclick="addAccount()">Add</button>

<table>
<thead>
<tr>
<th>Date</th><th>Party</th><th>Type</th><th>Amount</th><th>X</th>
</tr>
</thead>
<tbody id="a_list"></tbody>
</table>
</div>

<div id="summary" class="tab">
<div id="s_list"></div>
</div>

</body>
</html>
