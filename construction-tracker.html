<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construction System</title>
<link rel="icon" type="image/png" sizes="32x32" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>

body{
    margin:0;
    padding:15px;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#00152b,#000814);
    color:#fff;
}

h2{
    text-align:center;
    font-size:40px;
    margin-bottom:20px;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tabs button{
    flex:1;
}

.tab{
    display:none;
}

.active{
    display:block;
}

input{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    background:#10263f;
    color:#fff;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:none;
    border-radius:10px;
    background:#00e5ff;
    color:#00152b;
    font-weight:700;
    cursor:pointer;
}

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
    background:#071a2f;
}

th,td{
    padding:12px;
    border:1px solid rgba(255,255,255,0.1);
    text-align:center;
}

th{
    background:#0c315d;
}

.card{
    background:#071a2f;
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;
}

.horizontal-form{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
}

.total{
    background:#0c315d;
    font-weight:700;
}

.positive-balance{
    color:#4dff88;
    font-weight:700;
}

.negative-balance{
    color:#ff4d4d;
    font-weight:700;
}

.zero-balance{
    color:#00e5ff;
    font-weight:700;
}
/* HOME BUTTON */
.home-link{
    padding:6px 10px;
    border-radius:6px;
    text-decoration:none;
    background:#1f2937;
    color:#22c55e;
    border:1px solid #374151;
    float:right;
    font-size: 20px;
}

.home-link:hover{
    background:#22c55e;
    color:#022c22;
}
</style>

</head>

<body>

<h2>🏗 Construction System
<a href="main.html" class="home-link">🏠 Home</a>
</h2>

<div class="tabs">
    <button onclick="showTab('material')">🧱 Material</button>
    <button onclick="showTab('account')">💰 Payment</button>
    <button onclick="showTab('summary')">📒 Ledger</button>
</div>

<!-- MATERIAL -->

<div id="material" class="tab active">

<div class="card">

<div class="horizontal-form">

<input type="date" id="m_date">

<input type="text" id="m_party" placeholder="Party">

<input type="text" id="m_name" placeholder="Material" list="materialList">

<datalist id="materialList">

<option value="Cement">
<option value="Sand">
<option value="Aggregate">
<option value="Bricks">
<option value="Steel">
<option value="TMT Bar">
<option value="Binding Wire">
<option value="Concrete">
<option value="Fly Ash Bricks">
<option value="Stone Dust">
<option value="Tiles">
<option value="Marble">
<option value="Granite">
<option value="POP">
<option value="Wall Putty">
<option value="Paint">
<option value="Primer">
<option value="Waterproofing">
<option value="Pipes">
<option value="PVC Pipe">
<option value="CPVC Pipe">
<option value="Electrical Wire">
<option value="Switch">
<option value="MCB">
<option value="Door">
<option value="Window">
<option value="Glass">
<option value="Wood">
<option value="Plywood">
<option value="Hardware">
<option value="Nails">
<option value="Screws">
<option value="Tank">
<option value="Bathroom Fitting">
<option value="Kitchen Sink">
<option value="Tap">
<option value="Solar Panel">
<option value="Other EXP">
</datalist>

<input type="text" id="m_bill" placeholder="Bill No">

<input type="number" id="m_qty" placeholder="Qty">

<input type="number" id="m_rate" placeholder="Rate">

<input type="number" id="m_gst" placeholder="GST %">

</div>
    
<div class="tabs">
    
<button onclick="addMaterial()">Add Material</button>
<button onclick="exportExcel()">⬇ Export Excel</button>  
    
</div>

<input 
type="text"
id="material_filter"
placeholder="🔍 Filter Material"
style="margin-bottom:10px;"
>
    
</div>
    
<div class="table-container">

<table>

<thead>
<tr>
<th>Date</th>
<th>Party</th>
<th>Material</th>
<th>Bill</th>
<th>Qty</th>
<th>Rate</th>
<th>GST %</th>
<th>Amount</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="m_list"></tbody>

<tfoot>

<tr class="total">

<td colspan="4">TOTAL</td>

<td id="m_qty_total">0</td>

<td colspan="2"></td>

<td id="m_total">₹0</td>

<td></td>

</tr>

</tfoot>

</table>

</div>

</div>

<!-- PAYMENT -->

<div id="account" class="tab">

<div class="card">

<div class="horizontal-form">

<input type="date" id="a_date">

<input type="text" id="a_party" placeholder="Party">

<input type="number" id="a_amount" placeholder="Paid Amount">

</div>

<button onclick="addAccount()">Add Payment</button>

</div>

<div class="table-container">

<table>

<thead>
<tr>
<th>Date</th>
<th>Party</th>
<th>Amount</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="a_list"></tbody>

</table>

</div>

</div>

<!-- LEDGER -->

<div id="summary" class="tab">

<div class="card">

<h3>Party Ledger</h3>

<div id="s_list"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  projectId: "personal-budget-1cbbe"
};

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

document.body.style.display = "none";

onAuthStateChanged(auth, (user) => {
  if (!user || user.uid !== ADMIN_UID) {
    window.location.href = "index.html";
  } else {
    document.body.style.display = "block";
    startApp();
  }
});

const today = new Date().toISOString().split('T')[0];

function format(n){
    return Number(n || 0).toLocaleString('en-IN');
}

window.showTab = function(id){

    document.querySelectorAll('.tab')
    .forEach(t=>t.classList.remove('active'));

    document.getElementById(id)
    .classList.add('active');
}

// ================= MATERIAL =================

window.addMaterial = async function(){

    let data = {

        date:m_date.value,
        party:m_party.value,
        name:m_name.value,
        bill:m_bill.value,
        qty:+m_qty.value || 0,
        rate:+m_rate.value || 0,
        gst:+m_gst.value || 0

    };

    data.amount =
    data.qty * data.rate +
    (data.qty * data.rate * data.gst / 100);

    await addDoc(collection(db,"materials"),data);

    m_party.value="";
    m_name.value="";
    m_bill.value="";
    m_qty.value="";
    m_rate.value="";
    m_gst.value="";

    loadMaterial();
    loadSummary();
}

window.deleteMaterial = async function(id){

    await deleteDoc(doc(db,"materials",id));

    loadMaterial();
    loadSummary();
}

async function loadMaterial(){

    const snap =
    await getDocs(collection(db,"materials"));

    const mList =
    document.getElementById("m_list");

    const mTotal =
    document.getElementById("m_total");

    const qtyTotalElement =
    document.getElementById("m_qty_total");

    const filterInput =
    document.getElementById("material_filter");

    let filter = "";

    if(filterInput){

        filter =
        filterInput.value
        .toLowerCase()
        .trim();
    }

    mList.innerHTML = '';

    let total = 0;
    let qtyTotal = 0;

    snap.forEach(d=>{

        let x = d.data();

        let materialName =
        String(x.name || "")
        .toLowerCase();

        // FILTER
        if(filter !== ""){

            if(!materialName.includes(filter)){
                return;
            }
        }

        total += Number(x.amount || 0);

        qtyTotal += Number(x.qty || 0);

        mList.innerHTML += `

        <tr>

            <td>${x.date}</td>

            <td>${x.party}</td>

            <td>${x.name}</td>

            <td>${x.bill}</td>

            <td>${format(x.qty)}</td>

            <td>${format(x.rate)}</td>

            <td>${x.gst}%</td>

            <td>₹${format(x.amount)}</td>

            <td>
                <button onclick="deleteMaterial('${d.id}')">
                X
                </button>
            </td>

        </tr>
        `;
    });

    mTotal.innerText =
    "₹" + format(total);

    qtyTotalElement.innerText =
    format(qtyTotal);
}

// ================= PAYMENT =================

window.addAccount = async function(){

    await addDoc(collection(db,"accounts"),{

        date:a_date.value,
        party:a_party.value,
        amount:+a_amount.value || 0

    });

    a_party.value="";
    a_amount.value="";

    loadAccount();
    loadSummary();
}

window.deleteAccount = async function(id){

    await deleteDoc(doc(db,"accounts",id));

    loadAccount();
    loadSummary();
}

async function loadAccount(){

    const snap = await getDocs(collection(db,"accounts"));

    a_list.innerHTML='';

    snap.forEach(d=>{

        let x=d.data();

        a_list.innerHTML += `

        <tr>

        <td>${x.date}</td>

        <td>${x.party}</td>

        <td>₹${format(x.amount)}</td>

        <td>
        <button onclick="deleteAccount('${d.id}')">
        X
        </button>
        </td>

        </tr>
        `;
    });
}

// ================= LEDGER =================

async function loadSummary(){

    const materialSnap =
    await getDocs(collection(db,"materials"));

    const accountSnap =
    await getDocs(collection(db,"accounts"));

    let ledger = {};

    // MATERIAL

    materialSnap.forEach(d=>{

        let x = d.data();

        if(!ledger[x.party]){

            ledger[x.party] = {

                material:0,
                paid:0

            };
        }

        ledger[x.party].material +=
        Number(x.amount || 0);

    });

    // PAYMENT

    accountSnap.forEach(d=>{

        let x = d.data();

        if(!ledger[x.party]){

            ledger[x.party] = {

                material:0,
                paid:0

            };
        }

        ledger[x.party].paid +=
        Number(x.amount || 0);

    });

    // TOTALS

    let totalMaterial = 0;
    let totalPaid = 0;
    let totalBalance = 0;

    // UI

    s_list.innerHTML = `

    <div class="table-container">

    <table>

    <thead>

    <tr>

    <th>Party</th>

    <th>Material Amount</th>

    <th>Paid Amount</th>

    <th>Pending Balance</th>

    </tr>

    </thead>

    <tbody id="ledger_body"></tbody>

    <tfoot>

    <tr class="total">

    <td>TOTAL</td>

    <td id="total_material">₹0</td>

    <td id="total_paid">₹0</td>

    <td id="total_balance">₹0</td>

    </tr>

    </tfoot>

    </table>

    </div>
    `;

    const body =
    document.getElementById("ledger_body");

    for(let party in ledger){

        let material =
        ledger[party].material;

        let paid =
        ledger[party].paid;

        let balance =
        paid - material;

        totalMaterial += material;
        totalPaid += paid;
        totalBalance += balance;

        let balanceClass =
        "zero-balance";

        if(balance > 0){

            balanceClass =
            "positive-balance";
        }

        if(balance < 0){

            balanceClass =
            "negative-balance";
        }

        body.innerHTML += `

        <tr>

        <td>${party}</td>

        <td style="color:#ffd54f;font-weight:700;">
        ₹${format(material)}
        </td>

        <td style="color:#4dff88;font-weight:700;">
        ₹${format(paid)}
        </td>

        <td class="${balanceClass}">
        ₹${format(balance)}
        </td>

        </tr>
        `;
    }

    // SHOW TOTALS

    document.getElementById("total_material")
    .innerText =
    "₹" + format(totalMaterial);

    document.getElementById("total_paid")
    .innerText =
    "₹" + format(totalPaid);

    document.getElementById("total_balance")
    .innerText =
    "₹" + format(totalBalance);
}
// ================= EXPORT =================

window.exportExcel = async function(){

  const snap = await getDocs(collection(db,"materials"));

  let rows = [];

  rows.push([
    "Date",
    "Party",
    "Material",
    "Bill",
    "Qty",
    "Rate",
    "GST",
    "Amount"
  ]);

  snap.forEach(d=>{

    let x = d.data();

    rows.push([
      x.date,
      x.party,
      x.name,
      x.bill,
      x.qty,
      x.rate,
      x.gst,
      x.amount
    ]);
  });

  let csv = "data:text/csv;charset=utf-8,";

  rows.forEach(r=>{
    csv += r.join(",") + "\n";
  });

  const link = document.createElement("a");

  link.href = encodeURI(csv);

  link.download = "material_data.csv";

  document.body.appendChild(link);

  link.click();
}

// ================= INIT =================

function startApp(){

    m_date.value = today;
    a_date.value = today;

    loadMaterial();
    loadAccount();
    loadSummary();

    document
    .getElementById("material_filter")
    .addEventListener("input", loadMaterial);
}

  
</script>

</body>
</html>
