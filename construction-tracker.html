<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construction System</title>
<link rel="icon" type="image/png" sizes="32x32" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>

body{
    margin:0;
    padding:15px;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#00152b,#000814);
    color:#fff;
}

h2{
    text-align:center;
    font-size:40px;
    margin-bottom:20px;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tabs button{
    flex:1;
}

.tab{
    display:none;
}

.active{
    display:block;
}

input{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    background:#10263f;
    color:#fff;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:none;
    border-radius:10px;
    background:#00e5ff;
    color:#00152b;
    font-weight:700;
    cursor:pointer;
}

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
    background:#071a2f;
}

th,td{
    padding:12px;
    border:1px solid rgba(255,255,255,0.1);
    text-align:center;
}

th{
    background:#0c315d;
}

.card{
    background:#071a2f;
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;
}

.horizontal-form{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
}

.total{
    background:#0c315d;
    font-weight:700;
}

.positive-balance{
    color:#4dff88;
    font-weight:700;
}

.negative-balance{
    color:#ff4d4d;
    font-weight:700;
}

.zero-balance{
    color:#00e5ff;
    font-weight:700;
}

</style>

</head>

<body>

<h2>🏗 Construction System</h2>

<div class="tabs">
    <button onclick="showTab('material')">🧱 Material</button>
    <button onclick="showTab('account')">💰 Payment</button>
    <button onclick="showTab('summary')">📒 Ledger</button>
</div>

<!-- MATERIAL -->

<div id="material" class="tab active">

<div class="card">

<div class="horizontal-form">

<input type="date" id="m_date">

<input type="text" id="m_party" placeholder="Party">

<input type="text" id="m_name" placeholder="Material">

<input type="text" id="m_bill" placeholder="Bill No">

<input type="number" id="m_qty" placeholder="Qty">

<input type="number" id="m_rate" placeholder="Rate">

<input type="number" id="m_gst" placeholder="GST %">

</div>

<button onclick="addMaterial()">Add Material</button>

</div>

<div class="table-container">

<table>

<thead>
<tr>
<th>Date</th>
<th>Party</th>
<th>Material</th>
<th>Bill</th>
<th>Qty</th>
<th>Rate</th>
<th>GST</th>
<th>Amount</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="m_list"></tbody>

<tfoot>
<tr class="total">
<td colspan="7">TOTAL</td>
<td id="m_total">₹0</td>
<td></td>
</tr>
</tfoot>

</table>

</div>

</div>

<!-- PAYMENT -->

<div id="account" class="tab">

<div class="card">

<div class="horizontal-form">

<input type="date" id="a_date">

<input type="text" id="a_party" placeholder="Party">

<input type="number" id="a_amount" placeholder="Paid Amount">

</div>

<button onclick="addAccount()">Add Payment</button>

</div>

<div class="table-container">

<table>

<thead>
<tr>
<th>Date</th>
<th>Party</th>
<th>Amount</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="a_list"></tbody>

</table>

</div>

</div>

<!-- LEDGER -->

<div id="summary" class="tab">

<div class="card">

<h3>Party Ledger</h3>

<div id="s_list"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  projectId: "personal-budget-1cbbe"
};

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

document.body.style.display = "none";

onAuthStateChanged(auth, (user) => {
  if (!user || user.uid !== ADMIN_UID) {
    window.location.href = "index.html";
  } else {
    document.body.style.display = "block";
    startApp();
  }
});

const today = new Date().toISOString().split('T')[0];

m_date.value = today;
a_date.value = today;

function format(n){
    return Number(n || 0).toLocaleString('en-IN');
}

window.showTab = function(id){

    document.querySelectorAll('.tab')
    .forEach(t=>t.classList.remove('active'));

    document.getElementById(id)
    .classList.add('active');
}

// ================= MATERIAL =================

window.addMaterial = async function(){

    let data = {

        date:m_date.value,
        party:m_party.value,
        name:m_name.value,
        bill:m_bill.value,
        qty:+m_qty.value || 0,
        rate:+m_rate.value || 0,
        gst:+m_gst.value || 0

    };

    data.amount =
    data.qty * data.rate +
    (data.qty * data.rate * data.gst / 100);

    await addDoc(collection(db,"materials"),data);

    m_party.value="";
    m_name.value="";
    m_bill.value="";
    m_qty.value="";
    m_rate.value="";
    m_gst.value="";

    loadMaterial();
    loadSummary();
}

window.deleteMaterial = async function(id){

    await deleteDoc(doc(db,"materials",id));

    loadMaterial();
    loadSummary();
}

async function loadMaterial(){

    const snap = await getDocs(collection(db,"materials"));

    m_list.innerHTML='';

    let total=0;

    snap.forEach(d=>{

        let x=d.data();

        total += x.amount;

        m_list.innerHTML += `

        <tr>

        <td>${x.date}</td>

        <td>${x.party}</td>

        <td>${x.name}</td>

        <td>${x.bill}</td>

        <td>${format(x.qty)}</td>

        <td>${format(x.rate)}</td>

        <td>${x.gst}%</td>

        <td>₹${format(x.amount)}</td>

        <td>
        <button onclick="deleteMaterial('${d.id}')">
        X
        </button>
        </td>

        </tr>
        `;
    });

    m_total.innerText = "₹"+format(total);
}

// ================= PAYMENT =================

window.addAccount = async function(){

    await addDoc(collection(db,"accounts"),{

        date:a_date.value,
        party:a_party.value,
        amount:+a_amount.value || 0

    });

    a_party.value="";
    a_amount.value="";

    loadAccount();
    loadSummary();
}

window.deleteAccount = async function(id){

    await deleteDoc(doc(db,"accounts",id));

    loadAccount();
    loadSummary();
}

async function loadAccount(){

    const snap = await getDocs(collection(db,"accounts"));

    a_list.innerHTML='';

    snap.forEach(d=>{

        let x=d.data();

        a_list.innerHTML += `

        <tr>

        <td>${x.date}</td>

        <td>${x.party}</td>

        <td>₹${format(x.amount)}</td>

        <td>
        <button onclick="deleteAccount('${d.id}')">
        X
        </button>
        </td>

        </tr>
        `;
    });
}

// ================= LEDGER =================

async function loadSummary(){

    const materialSnap =
    await getDocs(collection(db,"materials"));

    const accountSnap =
    await getDocs(collection(db,"accounts"));

    let ledger = {};

    // MATERIAL

    materialSnap.forEach(d=>{

        let x=d.data();

        if(!ledger[x.party]){

            ledger[x.party]={

                material:0,
                paid:0

            };
        }

        ledger[x.party].material += Number(x.amount || 0);

    });

    // PAYMENT

    accountSnap.forEach(d=>{

        let x=d.data();

        if(!ledger[x.party]){

            ledger[x.party]={

                material:0,
                paid:0

            };
        }

        ledger[x.party].paid += Number(x.amount || 0);

    });

    // UI

    s_list.innerHTML = `

    <div class="table-container">

    <table>

    <thead>

    <tr>

    <th>Party</th>

    <th>Material Amount</th>

    <th>Paid Amount</th>

    <th>Pending Balance</th>

    </tr>

    </thead>

    <tbody id="ledger_body"></tbody>

    </table>

    </div>
    `;

    const body =
    document.getElementById("ledger_body");

    for(let party in ledger){

        let material =
        ledger[party].material;

        let paid =
        ledger[party].paid;

        let balance =
        paid - material;

        let balanceClass =
        "zero-balance";

        if(balance > 0){

            balanceClass =
            "positive-balance";
        }

        if(balance < 0){

            balanceClass =
            "negative-balance";
        }

        body.innerHTML += `

        <tr>

        <td>${party}</td>

        <td style="color:#ffd54f;font-weight:700;">
        ₹${format(material)}
        </td>

        <td style="color:#4dff88;font-weight:700;">
        ₹${format(paid)}
        </td>

        <td class="${balanceClass}">
        ₹${format(balance)}
        </td>

        </tr>
        `;
    }
}

// ================= INIT =================

loadMaterial();
loadAccount();
loadSummary();

</script>

</body>
</html>
