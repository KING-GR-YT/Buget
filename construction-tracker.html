<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construction System</title>
<style>
body{
    margin:0;
    padding:15px;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#00152b,#000814);
    color:#fff;
}

h2{
    text-align:center;
    font-size:42px;
    margin-bottom:20px;
    color:#ffffff;
    font-weight:700;
}

.tabs{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.tabs button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.06);
    color:#00e5ff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    border:1px solid rgba(0,229,255,0.2);
    transition:0.3s;
}

.tabs button:hover{
    background:#00e5ff;
    color:#00152b;
    box-shadow:0 0 15px #00e5ff;
}

.tab{
    display:none;
}

.active{
    display:block;
}

input,
select{
    width:100%;
    padding:14px;
    margin:6px 0;
    border-radius:10px;
    border:1px solid rgba(0,229,255,0.25);
    background:rgba(255,255,255,0.04);
    color:#fff;
    box-sizing:border-box;
    outline:none;
    font-size:15px;
}

input::placeholder{
    color:#b5c7d8;
}

button{
    width:100%;
    padding:14px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00bcd4,#00e5ff);
    color:#00152b;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 18px rgba(0,229,255,0.5);
}

.delete{
    background:linear-gradient(90deg,#ff4d4d,#ff0000);
    color:#fff;
}

.table-container{
    width:100%;
    overflow-x:auto;
    margin-top:15px;
    border-radius:16px;
}

table{
    width:100%;
    min-width:1000px;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:16px;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(12px);
}

th{
    background:#0b2c57;
    color:#fff;
    padding:16px;
    font-size:15px;
    border:1px solid rgba(255,255,255,0.08);
}

td{
    padding:14px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.05);
    color:#eaf6ff;
    font-size:14px;
}

tr:nth-child(even){
    background:rgba(255,255,255,0.03);
}

tr:hover{
    background:rgba(0,229,255,0.08);
}

.total{
    background:#0f3c74 !important;
    color:#00e5ff;
    font-weight:700;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,229,255,0.12);
    border-radius:18px;
    padding:18px;
    margin-bottom:18px;
    backdrop-filter:blur(12px);
    box-shadow:0 4px 20px rgba(0,0,0,0.25);
}

.summary-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.summary-box{
    background:linear-gradient(145deg,#032041,#00152b);
    padding:20px;
    border-radius:18px;
    border:1px solid rgba(0,229,255,0.12);
    box-shadow:0 0 18px rgba(0,229,255,0.08);
}

.summary-box h3{
    margin:0 0 10px;
    color:#00e5ff;
    font-size:16px;
}

.summary-box p{
    margin:0;
    font-size:24px;
    font-weight:700;
}

.horizontal-form{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:12px;
    margin-bottom:15px;
}

.section-title{
    font-size:24px;
    margin:15px 0;
    color:#00e5ff;
    font-weight:700;
}

/* ================= LEDGER TABLE ================= */

.ledger-table-container{
    margin-top:10px;
}

.ledger-table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:18px;
    background:rgba(255,255,255,0.03);
}

.ledger-table th{
    background:#0d2f5c;
    padding:18px;
    font-size:18px;
    border:1px solid rgba(255,255,255,0.08);
}

.ledger-table td{
    padding:18px;
    font-size:17px;
    border:1px solid rgba(255,255,255,0.05);
    text-align:center;
}

.ledger-table tr:nth-child(even){
    background:rgba(255,255,255,0.03);
}

.ledger-table tr:hover{
    background:rgba(0,229,255,0.08);
}

.positive-balance{
    color:#4dff88;
    font-weight:700;
    font-size:20px;
}

.negative-balance{
    color:#ff4d4d;
    font-weight:700;
    font-size:20px;
}

.zero-balance{
    color:#00e5ff;
    font-weight:700;
    font-size:20px;
}

.ledger-note{
    margin-top:20px;
    display:flex;
    gap:40px;
    flex-wrap:wrap;
    align-items:center;
    font-size:18px;
}

.positive-dot,
.negative-dot,
.zero-dot{
    width:16px;
    height:16px;
    border-radius:50%;
    display:inline-block;
    margin-right:10px;
}

.positive-dot{
    background:#4dff88;
}

.negative-dot{
    background:#ff4d4d;
}

.zero-dot{
    background:#00e5ff;
}
    
@media(max-width:768px){

    body{
        padding:10px;
    }

    h2{
        font-size:28px;
    }

    .tabs{
        flex-direction:column;
    }

    .horizontal-form{
        grid-template-columns:1fr;
    }

    table{
        min-width:850px;
    }

    th,td{
        font-size:13px;
        padding:10px;
    }
}
</style>
</head>
<body>

<h2>🏗 Construction System</h2>

<div class="tabs">
<button onclick="showTab('material')">🧱 Material</button>
<button onclick="showTab('account')">💰 Account</button>
<button onclick="showTab('summary')">📒 Ledger</button>
</div>

<!-- MATERIAL -->
<div id="material" class="tab active">

<div class="card">

<div class="horizontal-form">
<input type="date" id="m_date">
<input type="text" id="m_party" placeholder="Party">
<input type="text" id="m_name" placeholder="Material">
<input type="text" id="m_bill" placeholder="Bill No">
<input type="number" id="m_qty" placeholder="Qty">
<input type="number" id="m_rate" placeholder="Rate">
<input type="number" id="m_gst" placeholder="GST">
</div>

<div class="horizontal-form">
<button onclick="addMaterial()">Add Material</button>
<button onclick="exportExcel()">⬇ Export Excel</button>
</div>

</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Date</th>
<th>Party</th>
<th>Material</th>
<th>Bill</th>
<th>Qty</th>
<th>Rate</th>
<th>GST</th>
<th>Amount</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="m_list"></tbody>

<tfoot>
<tr class="total">
<td colspan="7">TOTAL</td>
<td id="m_total">₹0</td>
<td></td>
</tr>
</tfoot>

</table>
</div>

</div>

<!-- ACCOUNT -->
<div id="account" class="tab">

<div class="card">

<div class="horizontal-form">
<input type="date" id="a_date">

<input type="text" id="a_party" placeholder="Party">

<select id="a_type">
<option value="paid">Paid</option>
<option value="received">Received</option>
</select>

<input type="number" id="a_amount" placeholder="Amount">

<button onclick="addAccount()">Add Entry</button>
</div>

</div>

<div class="table-container">
<table>

<thead>
<tr>
<th>Date</th>
<th>Party</th>
<th>Type</th>
<th>Amount</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="a_list"></tbody>

</table>
</div>

</div>

<!-- LEDGER -->
<div id="summary" class="tab">

<div class="card">
<h3 class="section-title">Party Ledger</h3>
<div id="s_list"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  projectId: "personal-budget-1cbbe"
};

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

document.body.style.display = "none";

onAuthStateChanged(auth, (user) => {
  if (!user || user.uid !== ADMIN_UID) {
    window.location.href = "index.html";
  } else {
    document.body.style.display = "block";
    startApp();
  }
});

const today = new Date().toISOString().split('T')[0];

function format(n){
  return Number(n || 0).toLocaleString('en-IN');
}

window.showTab = function(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ================= MATERIAL =================

window.addMaterial = async function(){

  let data = {
    date: m_date.value,
    party: m_party.value,
    name: m_name.value,
    bill: m_bill.value,
    qty:+m_qty.value || 0,
    rate:+m_rate.value || 0,
    gst:+m_gst.value || 0
  };

  data.amount =
    data.qty * data.rate +
    (data.qty * data.rate * data.gst / 100);

  await addDoc(collection(db,"materials"),data);

  // CLEAR FIELDS
  m_party.value = "";
  m_name.value = "";
  m_bill.value = "";
  m_qty.value = "";
  m_rate.value = "";
  m_gst.value = "";

  loadMaterial();
}

window.deleteMaterial = async function(id){
  await deleteDoc(doc(db,"materials",id));
  loadMaterial();
}

async function loadMaterial(){

  const snap = await getDocs(collection(db,"materials"));

  m_list.innerHTML = '';

  let total = 0;

  snap.forEach(d=>{

    let x = d.data();

    total += x.amount;

    m_list.innerHTML += `
    <tr>
      <td>${x.date}</td>
      <td>${x.party}</td>
      <td>${x.name}</td>
      <td>${x.bill}</td>
      <td>${format(x.qty)}</td>
      <td>${format(x.rate)}</td>
      <td>${x.gst}%</td>
      <td>₹${format(x.amount)}</td>
      <td>
        <button onclick="deleteMaterial('${d.id}')">X</button>
      </td>
    </tr>`;
  });

  m_total.innerText = "₹" + format(total);
}

// ================= ACCOUNT =================

window.addAccount = async function(){

  await addDoc(collection(db,"accounts"),{
    date:a_date.value,
    party:a_party.value,
    type:a_type.value,
    amount:+a_amount.value || 0
  });

  // CLEAR FIELDS
  a_party.value = "";
  a_amount.value = "";
  a_type.value = "paid";

  loadAccount();
  loadSummary();
}

window.deleteAccount = async function(id){

  await deleteDoc(doc(db,"accounts",id));

  loadAccount();
  loadSummary();
}

async function loadAccount(){

  const snap = await getDocs(collection(db,"accounts"));

  a_list.innerHTML = '';

  snap.forEach(d=>{

    let x = d.data();

    a_list.innerHTML += `
    <tr>
      <td>${x.date}</td>
      <td>${x.party}</td>
      <td>${x.type}</td>
      <td>₹${format(x.amount)}</td>
      <td>
        <button onclick="deleteAccount('${d.id}')">X</button>
      </td>
    </tr>`;
  });
}

// ================= LEDGER =================

async function loadSummary(){

  const snap = await getDocs(collection(db,"accounts"));

  let ledger = {};

  snap.forEach(d=>{

    let x = d.data();

    if(!ledger[x.party]){
      ledger[x.party] = {
        paid:0,
        received:0
      };
    }

    if(x.type === "paid"){
      ledger[x.party].paid += x.amount;
    }else{
      ledger[x.party].received += x.amount;
    }
  });

  s_list.innerHTML = `

  <div class="ledger-table-container">

    <table class="ledger-table">

      <thead>
        <tr>
          <th>👤 Party Name</th>
          <th style="color:#ff5c5c;">⬇ Amount Paid</th>
          <th style="color:#4dff88;">⬆ Amount Received</th>
          <th>⚖ Balance</th>
        </tr>
      </thead>

      <tbody id="ledger_body"></tbody>

    </table>

  </div>
  `;

  const body = document.getElementById("ledger_body");

  for(let party in ledger){

    let paid = ledger[party].paid;
    let received = ledger[party].received;

    let balance = received - paid;

    let balanceClass = "zero-balance";

    if(balance > 0){
      balanceClass = "positive-balance";
    }

    if(balance < 0){
      balanceClass = "negative-balance";
    }

    body.innerHTML += `
      <tr>

        <td>${party}</td>

        <td style="color:#ff5c5c;font-weight:700;">
          ₹${format(paid)}
        </td>

        <td style="color:#4dff88;font-weight:700;">
          ₹${format(received)}
        </td>

        <td class="${balanceClass}">
          ₹${format(balance)}
        </td>

      </tr>
    `;
  }
}

// ================= EXPORT =================

window.exportExcel = async function(){

  const snap = await getDocs(collection(db,"materials"));

  let rows = [];

  rows.push([
    "Date",
    "Party",
    "Material",
    "Bill",
    "Qty",
    "Rate",
    "GST",
    "Amount"
  ]);

  snap.forEach(d=>{

    let x = d.data();

    rows.push([
      x.date,
      x.party,
      x.name,
      x.bill,
      x.qty,
      x.rate,
      x.gst,
      x.amount
    ]);
  });

  let csv = "data:text/csv;charset=utf-8,";

  rows.forEach(r=>{
    csv += r.join(",") + "\n";
  });

  const link = document.createElement("a");

  link.href = encodeURI(csv);

  link.download = "material_data.csv";

  document.body.appendChild(link);

  link.click();
}

// ================= INIT =================

function startApp(){

  m_date.value = today;
  a_date.value = today;

  loadMaterial();
  loadAccount();
  loadSummary();
}

</script>

</body>
</html>
