<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Planner Pro+</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<!-- ✅ FIXED FIREBASE VERSION -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#020617,#001f2f);
    color:#00f0ff;
    padding:20px;
}

/* CARD */
.card{
    background:rgba(0,0,0,0.6);
    border:1px solid #00f0ff33;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 0 20px #00f0ff22;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:15px;
}
@media(min-width:768px){
    .grid{grid-template-columns:1fr 1fr;}
}

/* INPUT */
input, select{
    width:100%;
    padding:12px;
    margin:6px 0;
    border-radius:8px;
    border:1px solid #00f0ff55;
    background:#020617;
    color:#00f0ff;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00f0ff,#00ffa6);
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

/* SUMMARY */
.summary{
    display:flex;
    gap:10px;
}
.summary div{
    flex:1;
    background:#020617;
    padding:12px;
    border-radius:10px;
    text-align:center;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}
th, td{
    border:1px solid #00f0ff33;
    padding:10px;
    text-align:center;
}

/* ALERT */
.alert{
    background:#3f0000;
    padding:10px;
    border-radius:10px;
    color:#ff6b6b;
}

.highlight{
    background:#003f2f;
    padding:10px;
    border-radius:10px;
}

.progress{
    height:10px;
    background:#001f2f;
    border-radius:10px;
}
.progress-bar{
    height:100%;
    background:linear-gradient(90deg,#00f0ff,#00ffa6);
}
</style>
</head>

<body>

<h2>💰 Debt Planner Pro+</h2>

<div class="grid">

<div class="card">
<input id="name" placeholder="Debt Name">
<input id="amount" type="number" placeholder="Amount">
<input id="rate" type="number" placeholder="Interest %">
<input id="emi" type="number" placeholder="EMI">
<button id="addBtn">Add Debt</button>
</div>

<div class="card summary">
<div>Total<br><b id="totalDebt">₹0</b></div>
<div>EMI<br><b id="totalEMI">₹0</b></div>
<div>Months<br><b id="months">0</b></div>
<div>Saved<br><b id="saved">₹0</b></div>
<div>Score<br><b id="score">0</b></div>
</div>

</div>

<div class="card">
<table>
<thead>
<tr><th>Name</th><th>Balance</th><th>Rate</th><th>EMI</th></tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<div class="card">
<select id="strategy">
<option value="snowball">Snowball</option>
<option value="avalanche">Avalanche</option>
</select>
<input id="extra" type="number" placeholder="Extra Payment">
<button onclick="calculate()">Calculate</button>
</div>

<div class="card highlight" id="suggestion"></div>
<div class="card alert" id="alertBox"></div>

<div class="card">
<div class="progress"><div class="progress-bar" id="bar"></div></div>
</div>

<div class="card">
<h3>📅 Monthly Timeline</h3>
<table>
<thead><tr><th>Month</th><th>Balance</th></tr></thead>
<tbody id="timeline"></tbody>
</table>
</div>

<script>
// 🔥 FIREBASE CONFIG (PUT YOURS)
const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  databaseURL: "https://personal-budget-1cbbe-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "personal-budget-1cbbe",
  storageBucket: "personal-budget-1cbbe.appspot.com",
  messagingSenderId: "133591748262",
  appId: "1:133591748262:web:2c0846f03f5f56aeb1ee67"
};

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";


firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let debts = [];

// FORMAT
function inr(x){
 return "₹"+Math.round(x).toLocaleString("en-IN");
}

// ADD BUTTON FIX
document.getElementById("addBtn").addEventListener("click", function(){

 let name = document.getElementById("name").value;
 let amount = +document.getElementById("amount").value;
 let rate = +document.getElementById("rate").value;
 let emi = +document.getElementById("emi").value;

 if(!name || !amount || !rate || !emi){
  alert("Fill all fields");
  return;
 }

 debts.push({name, amount, rate, emi});

 render();
 saveData(); // ✅ AUTO SAVE
});

// RENDER
function render(){
 let t=0,e=0;
 table.innerHTML="";

 debts.forEach(d=>{
  t+=d.amount; e+=d.emi;

  table.innerHTML += `
  <tr>
   <td>${d.name}</td>
   <td>${inr(d.amount)}</td>
   <td>${d.rate}%</td>
   <td>${inr(d.emi)}</td>
  </tr>`;
 });

 totalDebt.innerText=inr(t);
 totalEMI.innerText=inr(e);
}

// SIMULATE
function simulate(data, extra){
 let copy = JSON.parse(JSON.stringify(data));
 let interest=0, months=0;

 while(copy.some(d=>d.amount>0) && months<600){
  months++;

  copy.forEach(d=>{
   if(d.amount>0){
    let r=d.rate/12/100;
    let i=d.amount*r;
    interest+=i;
    d.amount += i;
    d.amount -= d.emi;

    if(d.amount < 0) d.amount = 0;
   }
  });

  let t = copy.find(d=>d.amount>0);
  if(t) t.amount -= extra;
 }

 return {months, interest};
}

// SCORE
function calculateScore(debts, months, extra){
 let score=100;

 debts.forEach(d=>{
  if(d.rate>18) score-=15;
  else if(d.rate>12) score-=8;
 });

 if(months>60) score-=20;
 else if(months>36) score-=10;

 if(extra>0) score+=10;

 return Math.max(0,Math.min(100,score));
}

// TIMELINE
function timelineData(debts, extra, strat){
 let data = JSON.parse(JSON.stringify(debts));

 if(strat==="snowball") data.sort((a,b)=>a.amount-b.amount);
 else data.sort((a,b)=>b.rate-a.rate);

 let arr=[];

 for(let m=1;m<=60;m++){
  let total=0;

  data.forEach(d=>{
   if(d.amount>0){
    let r=d.rate/12/100;
    d.amount += d.amount*r;
    d.amount -= d.emi;
    if(d.amount<0) d.amount=0;
    total+=d.amount;
   }
  });

  let t=data.find(d=>d.amount>0);
  if(t) t.amount -= extra;

  arr.push({m,total});

  if(total<=0) break;
 }

 return arr;
}

// CALCULATE
function calculate(){

 let strat=strategy.value;
 let extra=+extra.value||0;

 let base=simulate(debts,0);

 let sorted=[...debts];
 if(strat==="snowball") sorted.sort((a,b)=>a.amount-b.amount);
 else sorted.sort((a,b)=>b.rate-a.rate);

 let improved=simulate(sorted,extra);

 months.innerText=improved.months;

 let saved=Math.max(0,base.interest-improved.interest);
 savedEl.innerText=inr(saved);

 let score=calculateScore(debts,improved.months,extra);
 scoreEl.innerText=score;

 bar.style.width=score+"%";

 suggestion.innerText = score>80 ? "🟢 Excellent" :
                         score>60 ? "🟡 Good" :
                         "🔴 Risk";

 let alertMsg="";
 if(improved.months<base.months){
  alertMsg += `🎉 Close ${base.months-improved.months} months early! `;
 }

 let high=debts.find(d=>d.rate>15);
 if(high) alertMsg += `⚠️ High interest: ${high.name}`;

 alertBox.innerText=alertMsg;

 // timeline
 let tdata=timelineData(debts,extra,strat);
 let html="";
 tdata.forEach(t=>{
  html+=`<tr><td>${t.m}</td><td>${inr(t.total)}</td></tr>`;
 });

 timeline.innerHTML=html;
}

// SAVE AUTO
function saveData(){
 db.ref("debts").set(debts);
}

// AUTO LOAD
db.ref("debts").on("value",snap=>{
 debts=snap.val()||[];
 render();
});

// FIX ELEMENTS
const savedEl = document.getElementById("saved");
const scoreEl = document.getElementById("score");

</script>

</body>
</html>
