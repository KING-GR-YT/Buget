<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Loan Dashboard</title>
<link rel="icon" type="image/png" sizes="32x32" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">
<style>
body { margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0a0f1c,#050811);color:#fff;}
.header{padding:20px;text-align:center;font-size:24px;font-weight:bold;color:#00f0ff;}
.form-box{max-width:1400px;margin:20px auto;background:#0c1225;padding:25px;border-radius:18px;align-items: center;border:1px solid #1e2a4a;display:flex;flex-wrap:wrap;gap:20px;}
.form-box input{flex:1;min-width:150px;padding:10px;border-radius:8px;border:1px solid #1e2a4a;background:#11162a;color:#fff;}
.form-box button{flex:0 0 110px;padding:10px;border:none;border-radius:8px;background:#00f0ff;color:#000;font-weight:bold;cursor:pointer;}
.summary-wrapper{max-width:1450px;margin:20px auto;display:flex;gap:20px;flex-wrap:wrap;}
.summary-card{flex:1;min-width:350px;background:#0c1225;padding:20px;border-radius:16px;border:1px solid #1e2a4a;}
.summary-card h2{margin:0 0 15px 0;color:#00f0ff;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.summary-item{background:#11162a;padding:10px;border-radius:10px;}
.summary-item small{color:#7fa8ff;}
.summary-item b{display:block;margin-top:5px;color:#00f0ff;}
.loan-data-view{max-width:1450px;margin:20px auto;}
.loan-data-item{background:#0c1225;padding:18px;border-radius:16px;margin-bottom:15px;border:1px solid #1e2a4a;display:flex;flex-wrap:wrap;align-items:center;gap:20px;}
.loan-data-item h3{flex:0 0 120px;color:#00f0ff;}
.loan-field{min-width:120px;text-align:center;}
.loan-field span{display:block;font-size:15px;color:#7fa8ff;}
.loan-field b{font-size:15px;color:#e8faff;cursor:pointer;}
.status{padding:0px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.status.ACTIVE{background:#002b36;color:#32cd32;}
.status.CLOSED{background:#062e16;color:#00ff99;}
.action-icons{margin-left:auto;display:flex;gap:10px;}
.icon-btn{cursor:pointer;padding:6px 10px;border-radius:8px;background:#11162a;border:1px solid #1e2a4a;}
.icon-btn:hover{background:#00f0ff;color:#000;}
.home-link{padding:8px 14px;border-radius:8px;text-decoration:none;background:rgba(0,255,255,0.15);color:#00ffff;border:1px solid rgba(0,255,255,0.4);float:right;}
</style>
</head>
<body>

<div class="header">🚀 Loan Summary
  <a href="main.html" class="home-link">🏠 Home</a>
</div>

<div class="form-box">
  <h3>➕ Add New Loan</h3>
  <input type="text" id="loanName" placeholder="Loan Name" />
  <input type="number" id="loanAmount" placeholder="Amount" />
  <input type="number" id="loanInterest" placeholder="Interest %" />
  <input type="number" id="loanTenure" placeholder="Tenure (Months)" />
  <input type="date" id="loanStart" />
  <button id="saveBtn">Save</button>
</div>

<div class="summary-wrapper">
  <div class="summary-card">
    <h2>🟢 Active Loans</h2>
    <div class="summary-grid" id="activeGrid"></div>
  </div>

  <div class="summary-card">
    <h2>🔵 Closed Loans</h2>
    <div class="summary-grid" id="closedGrid"></div>
  </div>
</div>

<div class="loan-data-view" id="loanDataView"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, query, orderBy, setDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  projectId: "personal-budget-1cbbe",
  storageBucket: "personal-budget-1cbbe.firebasestorage.app",
  messagingSenderId: "133591748262",
  appId: "1:133591748262:web:2c0846f03f5f56aeb1ee67"
};

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* AUTH */
document.body.style.display = "none";
onAuthStateChanged(auth, (user) => {
  if (!user || user.uid !== ADMIN_UID) {
    window.location.href = "index.html";
  } else {
    document.body.style.display = "block";
  }
});

/* COLLECTION */
const loanCollection = collection(db, "loans");
const loanQuery = query(loanCollection, orderBy("createdAt","desc"));

let loans = [];

const loanDataView = document.getElementById("loanDataView");
const activeGrid = document.getElementById("activeGrid");
const closedGrid = document.getElementById("closedGrid");

/* EMI */
function calculateEMI(p, r, months) {
  const m = r / 12 / 100;
  return (p * m * Math.pow(1 + m, months)) /
         (Math.pow(1 + m, months) - 1);
}

/* LOAD */
onSnapshot(loanQuery, (snapshot) => {
  loans = [];
  snapshot.forEach((docSnap) => {
    const d = docSnap.data();
    d.id = docSnap.id;
    loans.push(d);
  });
  renderLoans();
});

/* SAVE */
document.getElementById("saveBtn").addEventListener("click", async () => {
  const name = loanName.value.trim();
  const amount = parseFloat(loanAmount.value);
  const interest = parseFloat(loanInterest.value);
  const tenure = parseFloat(loanTenure.value);
  const startDate = loanStart.value;

  if (!name || !amount || !interest || !tenure || !startDate) {
    alert("Fill all fields");
    return;
  }

  const emi = calculateEMI(amount, interest, tenure);

  await addDoc(loanCollection, {
    name, amount, interest, tenure, startDate, emi,
    principalPaid: 0,
    interestPaid: 0,
    closedOn: null,
    createdAt: new Date()
  });

  loanName.value = loanAmount.value = loanInterest.value = loanTenure.value = loanStart.value = "";
});

/* DELETE */
window.deleteLoan = async (id) => {
  if (confirm("Delete this loan?")) {
    await deleteDoc(doc(db,"loans",id));
  }
};

/* RENDER */
function renderLoans() {

  loanDataView.innerHTML = "";

  let active={count:0,loan:0,emi:0,balance:0,principal:0,interest:0,total:0};
  let closed={count:0,loan:0,principal:0,interest:0,total:0};

  loans.forEach((d)=>{

    d.amount=Number(d.amount)||0;
    d.principalPaid=Number(d.principalPaid)||0;
    d.interestPaid=Number(d.interestPaid)||0;

    const totalPaid=d.principalPaid+d.interestPaid;
    const balance = Math.max(0, d.amount - d.principalPaid);
    const isClosed = d.closedOn || balance===0;

    if(isClosed){
      closed.count++; closed.loan+=d.amount;
    }else{
      active.count++; active.loan+=d.amount;
      active.balance+=balance;
    }

  });

  /* SUMMARY */
  activeGrid.innerHTML=`<div class="summary-item"><small>Total Balance</small><b>₹${active.balance.toLocaleString()}</b></div>`;
  closedGrid.innerHTML=`<div class="summary-item"><small>Closed Loan</small><b>₹${closed.loan.toLocaleString()}</b></div>`;

  /* 🔥 AUTO SYNC */
  setDoc(
    doc(db, "financeSummary", "main"),
    {
      loan: active.balance
    },
    { merge: true }
  );
}

</script>
</body>
</html>
