<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  onSnapshot, 
  deleteDoc, 
  doc, 
  updateDoc, 
  query, 
  orderBy 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  projectId: "personal-budget-1cbbe",
  storageBucket: "personal-budget-1cbbe.firebasestorage.app",
  messagingSenderId: "133591748262",
  appId: "1:133591748262:web:2c0846f03f5f56aeb1ee67"
};

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52"; // 🔐 YOUR UID


/* 🔐 INITIALIZE */
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* 🔐 PAGE PROTECTION */
document.body.style.display = "none";

onAuthStateChanged(auth, (user) => {
  if (!user || user.uid !== ADMIN_UID) {
    window.location.href = "index.html";
  } else {
    document.body.style.display = "block";
    startApp(); // ✅ load loans only after auth verified
  }
});


/* ================= START APP AFTER LOGIN ================= */
function startApp() {

  const loanRef = collection(db, "loans");
  let loans = [];

  const loanDataView = document.getElementById("loanDataView");
  const activeGrid = document.getElementById("activeGrid");
  const closedGrid = document.getElementById("closedGrid");

  function calculateEMI(p, r, months) {
    const m = r / 12 / 100;
    return (p * m * Math.pow(1 + m, months)) /
           (Math.pow(1 + m, months) - 1);
  }

  /* ================= ADD LOAN ================= */
  document.getElementById("saveBtn").addEventListener("click", async () => {

    const name = loanName.value.trim();
    const amount = parseFloat(loanAmount.value);
    const interest = parseFloat(loanInterest.value);
    const tenure = parseFloat(loanTenure.value);
    const startDate = loanStart.value;

    if (!name || !amount || !interest || !tenure || !startDate) {
      alert("Fill all fields");
      return;
    }

    const emi = calculateEMI(amount, interest, tenure);

    await addDoc(loanRef, {
      name,
      amount,
      interest,
      tenure,
      startDate,
      emi,
      principalPaid: 0,
      interestPaid: 0,
      created: new Date()
    });

    loanName.value = loanAmount.value =
    loanInterest.value = loanTenure.value = loanStart.value = "";
  });


  /* ================= REALTIME ================= */
  const q = query(loanRef, orderBy("created", "desc"));

  onSnapshot(q, (snapshot) => {
    loans = [];
    snapshot.forEach(docSnap => {
      loans.push({ id: docSnap.id, ...docSnap.data() });
    });
    renderLoans();
  });


  /* ================= DELETE ================= */
  window.deleteLoan = async (id) => {
    if (confirm("Delete this loan?")) {
      await deleteDoc(doc(db, "loans", id));
    }
  };

  /* ================= EDIT ================= */
  window.editPrincipal = async (id) => {
    const loan = loans.find(l => l.id === id);
    const val = prompt("Edit Principal Paid:", loan.principalPaid || 0);
    if (!val || isNaN(val)) return;
    await updateDoc(doc(db, "loans", id), {
      principalPaid: parseFloat(val)
    });
  };

  window.editInterest = async (id) => {
    const loan = loans.find(l => l.id === id);
    const val = prompt("Edit Interest Paid:", loan.interestPaid || 0);
    if (!val || isNaN(val)) return;
    await updateDoc(doc(db, "loans", id), {
      interestPaid: parseFloat(val)
    });
  };

  window.editEMI = async (id) => {
    const loan = loans.find(l => l.id === id);
    const val = prompt("Edit EMI:", loan.emi);
    if (!val || isNaN(val)) return;
    await updateDoc(doc(db, "loans", id), {
      emi: parseFloat(val)
    });
  };


  /* ================= RENDER ================= */
  function renderLoans() {

    loanDataView.innerHTML = "";
    let active = {count:0,loan:0,emi:0,balance:0};
    let closed = {count:0,loan:0,total:0};

    loans.forEach(d => {

      const totalPaid = (d.principalPaid||0) + (d.interestPaid||0);
      const balance = Math.max(0, d.amount - totalPaid);
      const percentPaid = Math.round(((d.principalPaid||0)/d.amount)*100) || 0;
      const isClosed = balance === 0;

      if(isClosed){
        closed.count++;
        closed.loan += d.amount;
        closed.total += totalPaid;
      } else {
        active.count++;
        active.loan += d.amount;
        active.emi += d.emi;
        active.balance += balance;
      }

      loanDataView.innerHTML += `
      <div class="loan-data-item">
        <h3>${d.name}</h3>
        <div class="loan-field"><span>% Paid</span><b>${percentPaid}%</b></div>
        <div class="loan-field"><span>Loan</span><b>₹${d.amount.toLocaleString()}</b></div>
        <div class="loan-field"><span>EMI</span><b onclick="editEMI('${d.id}')">₹${d.emi.toFixed(0)}</b></div>
        <div class="loan-field"><span>Balance</span><b>₹${balance.toLocaleString()}</b></div>
        <div class="loan-field"><span>Status</span><b class="status ${isClosed?'CLOSED':'ACTIVE'}">${isClosed?'CLOSED':'ACTIVE'}</b></div>
        <div class="action-icons">
          <div class="icon-btn" onclick="deleteLoan('${d.id}')">🗑</div>
        </div>
      </div>`;
    });

    activeGrid.innerHTML = `
    <div class="summary-item"><small>Loans</small><b>${active.count}</b></div>
    <div class="summary-item"><small>Total EMI</small><b>₹${active.emi.toFixed(0)}</b></div>
    <div class="summary-item"><small>Total Balance</small><b>₹${active.balance.toLocaleString()}</b></div>`;

    closedGrid.innerHTML = `
    <div class="summary-item"><small>Loans</small><b>${closed.count}</b></div>
    <div class="summary-item"><small>Total Paid</small><b>₹${closed.total.toLocaleString()}</b></div>`;
  }

}

</script>
