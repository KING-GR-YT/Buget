<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Dashboard</title>
<link rel="icon" type="image/png" sizes="32x32" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:Orbitron;
background:linear-gradient(135deg,#0a0f1c,#050811);
color:#e6ffff;
padding:25px;
}
h1{
font-size:24px;
margin-bottom:35px;
color:#00ffff;
text-shadow:0 0 20px rgba(0,255,255,0.8);
}
.home-link{
float:right;
padding:4px;
border-radius:8px;
text-decoration:none;
background:rgba(0,255,255,0.12);
border:1px solid rgba(0,255,255,0.4);
color:#00ffff;
}
.container{display:grid;gap:30px;}
.section{
background:rgba(15,25,45,0.9);
padding:24px;
border-radius:22px;
box-shadow:0 0 30px rgba(0,255,255,0.15);
border:1px solid rgba(0,255,255,0.25);
}
.section h2{text-align:center;color:#00ffff;}
table{width:100%;border-collapse:collapse;font-size:22px;}
th,td{padding:12px;text-align:center;}
th{background:rgba(0,255,255,0.12);color:#00ffff;}
tr{border-bottom:1px solid rgba(0,255,255,0.12);}
input{
background:transparent;border:none;outline:none;
width:90px;color:#00ffff;text-align:center;
font-weight:600;font-size:20px;
}
.good{color:#00ff9d;font-weight:600;}
.bad{color:#ff5c5c;font-weight:600;}
.greenbox{background:rgba(0,255,120,0.08);color:#00ff9d;}
.redbox{background:rgba(255,60,60,0.08);color:#ff5c5c;}
</style>
</head>

<body>

<h1>Salary Dashboard
<a href="main.html" class="home-link">🏠 Home</a>
</h1>

<div class="container">

<div class="section">
<h2>Salary Overview</h2>

<table>

<tr>
<th>Particular</th>
<th>Amount</th>
<th>Planned %</th>
<th>Actual %</th>
<th>Status</th>
</tr>

<tr>
<td>Salary</td>
<td>₹ <input type="number" id="salary"></td>
<td>-</td>
<td id="salaryPercent">100%</td>
<td></td>
</tr>

<tr>
<td>EMI</td>
<td>₹ <input type="number" id="emi"></td>
<td id="emiPlan"></td>
<td id="emiPercent"></td>
<td id="emiStatus"></td>
</tr>

<tr>
<td>Rent</td>
<td>₹ <input type="number" id="rent"></td>
<td id="rentPlan"></td>
<td id="rentPercent"></td>
<td id="rentStatus"></td>
</tr>

<tr>
<td>Petrol</td>
<td>₹ <input type="number" id="petrol"></td>
<td id="petrolPlan"></td>
<td id="petrolPercent"></td>
<td id="petrolStatus"></td>
</tr>

<tr>
<td>Other EXP</td>
<td>₹ <input type="number" id="other"></td>
<td id="otherPlan"></td>
<td id="otherPercent"></td>
<td id="otherStatus"></td>
</tr>

<tr class="greenbox">
<td>Total EXP</td>
<td id="totalExp"></td>
<td>-</td>
<td id="totalPercent"></td>
<td id="totalStatus"></td>
</tr>

<tr class="redbox">
<td>Balance</td>
<td id="balance"></td>
<td>-</td>
<td id="balancePercent"></td>
<td id="balanceStatus"></td>
</tr>

</table>
</div>

</div>

<script>

/* 🔧 FIXED PLANNED VALUES (CHANGE HERE ONLY) */
const plans = {
emi:30,
rent:25,
petrol:10,
other:10
};

function calculate(){

let salaryVal=parseFloat(salary.value)||0;
let emiVal=parseFloat(emi.value)||0;
let rentVal=parseFloat(rent.value)||0;
let petrolVal=parseFloat(petrol.value)||0;
let otherVal=parseFloat(other.value)||0;

if(salaryVal===0)return;

/* Show planned */
emiPlan.innerHTML=plans.emi+"%";
rentPlan.innerHTML=plans.rent+"%";
petrolPlan.innerHTML=plans.petrol+"%";
otherPlan.innerHTML=plans.other+"%";

/* Actual % */
let emiP=(emiVal/salaryVal)*100;
let rentP=(rentVal/salaryVal)*100;
let petrolP=(petrolVal/salaryVal)*100;
let otherP=(otherVal/salaryVal)*100;

emiPercent.innerHTML=emiP.toFixed(2)+"%";
rentPercent.innerHTML=rentP.toFixed(2)+"%";
petrolPercent.innerHTML=petrolP.toFixed(2)+"%";
otherPercent.innerHTML=otherP.toFixed(2)+"%";

/* Compare */
emiStatus.innerHTML=emiP>plans.emi?"Bad":"Good";
emiStatus.className=emiP>plans.emi?"bad":"good";

rentStatus.innerHTML=rentP>plans.rent?"Bad":"Good";
rentStatus.className=rentP>plans.rent?"bad":"good";

petrolStatus.innerHTML=petrolP>plans.petrol?"Bad":"Good";
petrolStatus.className=petrolP>plans.petrol?"Bad":"good";

otherStatus.innerHTML=otherP>plans.other?"Bad":"Good";
otherStatus.className=otherP>plans.other?"bad":"good";

/* Total */
let total=emiVal+rentVal+petrolVal+otherVal;
totalExp.innerHTML="₹ "+total.toFixed(2);

let totalP=(total/salaryVal)*100;
totalPercent.innerHTML=totalP.toFixed(2)+"%";
totalStatus.innerHTML=totalP>80?"Bad":"Good";
totalStatus.className=totalP>80?"bad":"good";

/* Balance */
let balanceVal=salaryVal-total;
let balanceP=(balanceVal/salaryVal)*100;

balance.innerHTML="₹ "+balanceVal.toFixed(2);
balancePercent.innerHTML=balanceP.toFixed(2)+"%";
balanceStatus.innerHTML=balanceP>20?"Good":"Bad";
balanceStatus.className=balanceP>20?"good":"bad";

}

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",calculate);
});

</script>

</body>
</html>
