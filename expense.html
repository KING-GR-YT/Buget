<!DOCTYPE html>
<html>
<head>
<title>Expense Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#001f1f,#000814);
    color:white;
}

/* ---------- GLASS CARD ---------- */
.glass-card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    border:1px solid rgba(0,255,255,0.2);
    border-radius:15px;
    padding:20px;
    margin:15px;
}

/* ---------- FORM LAYOUT ---------- */
.form-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
}

.form-row input,
.form-row select,
.form-row button{
    flex:1;
    min-width:120px;
}

input,select{
    padding:10px;
    border-radius:8px;
    border:none;
    width:100%;
    box-sizing:border-box;
}

button{
    background:#00ffff;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    width:100%;
}

button:hover{
    background:#00dddd;
}

/* ---------- TOTAL CARDS ---------- */
.total-container{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin:15px;
}

.total-card{
    background:linear-gradient(145deg,#063c3c,#022f2f);
    padding:18px;
    border-radius:14px;
    flex:1;
    min-width:220px;
}

/* ---------- BANK SECTIONS ---------- */
#bankSections{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin:15px;
}

.bank-section{
    flex:1;
    min-width:320px;
    padding:15px;
    border-radius:15px;
    background:rgba(0,255,255,0.08);
    border:1px solid rgba(0,255,255,0.2);
}

.bank-title{
    font-size:18px;
    margin-bottom:10px;
    color:#00ffff;
}

/* ---------- TABLE ---------- */
.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
    font-size:14px;
}

th{
    background:rgba(0,255,255,0.2);
}

/* ---------- MOBILE CARD VIEW ---------- */
.mobile-card{
    display:none;
}

.entry-card{
    background:rgba(0,255,255,0.08);
    border:1px solid rgba(0,255,255,0.2);
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
}

.entry-card div{
    margin:4px 0;
    font-size:14px;
}

.entry-card .amount{
    font-size:16px;
    font-weight:bold;
    color:#00ffff;
}

.entry-card button{
    margin-top:8px;
}

/* ---------- HOME BUTTON ---------- */
.home-link{
    padding:4px 8px;
    border-radius:4px;
    text-decoration:none;
    background:rgba(0,255,255,0.15);
    color:#00ffff;
    border:1px solid rgba(0,255,255,0.4);
    transition:0.3s ease;
    font-weight:500;
    float:right;
}

.home-link:hover{
    background:#00ffff;
    color:#001f1f;
    box-shadow:0 0 10px #00ffff;
}

/* ---------- MOBILE FIX ---------- */
@media(max-width:768px){

    .form-row{
        flex-direction:column;
    }

    .total-container{
        flex-direction:column;
    }

    #bankSections{
        flex-direction:column;
    }

    table{
        display:none;
    }

    .mobile-card{
        display:block;
    }

    .home-link{
        float:none;
        display:inline-block;
        margin-top:10px;
    }
}
</style>
</head>
<body>

<div class="glass-card">
<h2>🔥 Bank Dashboard 
<a href="main.html" class="home-link">🏠 Home</a>
</h2>

<div class="form-row">
    <input type="month" id="month">

    <select id="bank">
        <option>YES BANK</option>
        <option>HDFC</option>
        <option>ONE CARD</option>
        <option>ICICI</option>
    </select>

    <input type="number" id="amount" placeholder="Amount">

    <select id="person">
        <option>PARDEEP</option>
        <option>SANDEEP</option>
    </select>

    <button id="addBtn">Add Entry</button>

    <select id="monthFilter"></select>
</div>
</div>

<div id="totals"></div>
<div id="bankSections"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  projectId: "personal-budget-1cbbe",
  storageBucket: "personal-budget-1cbbe.firebasestorage.app",
  messagingSenderId: "133591748262",
  appId: "1:133591748262:web:2c0846f03f5f56aeb1ee67"
};

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const bankCollection = collection(db, "bankEntries");

let data = [];

document.body.style.display = "none";

onAuthStateChanged(auth, (user) => {
    if (!user || user.uid !== ADMIN_UID) {
        window.location.href = "index.html";
    } else {
        document.body.style.display = "block";
        startApp();
    }
});

function startApp(){
    document.getElementById("addBtn").addEventListener("click", addEntry);
    document.getElementById("monthFilter").addEventListener("change", renderAll);

    onSnapshot(bankCollection,(snapshot)=>{
        data=[];
        snapshot.forEach(docItem=>{
            data.push({id:docItem.id,...docItem.data()});
        });
        populateMonthFilter();
        renderAll();
    });

    setCurrentMonthInput();
}

function setCurrentMonthInput(){
    document.getElementById("month").value = new Date().toISOString().slice(0,7);
}

async function addEntry(){

    const monthValue = document.getElementById("month").value;
    const bankValue = document.getElementById("bank").value;
    const amountValue = parseFloat(document.getElementById("amount").value);
    const personValue = document.getElementById("person").value;

    if(!monthValue || isNaN(amountValue)){
        alert("Enter Month & Valid Amount");
        return;
    }

    await addDoc(bankCollection,{
        month: monthValue,
        bank: bankValue,
        amount: amountValue,
        person: personValue,
        createdAt: new Date()
    });

    document.getElementById("amount").value = "";
}

window.deleteEntry = async function(id){
    await deleteDoc(doc(db,"bankEntries",id));
}

function populateMonthFilter(){

    const filter = document.getElementById("monthFilter");
    const currentMonth = new Date().toISOString().slice(0,7);

    // Get unique months from data
    const months = [...new Set(data.map(item => item.month))];

    // If current month not in list, add it
    if(!months.includes(currentMonth)){
        months.push(currentMonth);
    }

    // Sort newest first
    months.sort().reverse();

    // Build dropdown
    filter.innerHTML = `<option value="all">All Months</option>`;

    months.forEach(month=>{
        filter.innerHTML += `<option value="${month}">${month}</option>`;
    });

    // ✅ AUTO SELECT CURRENT MONTH
    filter.value = currentMonth;

    // If current month not found (edge case)
    if(filter.value !== currentMonth){
        filter.value = "all";
    }
}

function renderAll(){

    const selectedMonth = document.getElementById("monthFilter").value;

    let filteredData = selectedMonth === "all"
        ? data
        : data.filter(item => item.month === selectedMonth);

    filteredData.sort((a,b)=>{
        const dateA = a.createdAt?.seconds 
            ? new Date(a.createdAt.seconds * 1000)
            : new Date(a.createdAt);

        const dateB = b.createdAt?.seconds 
            ? new Date(b.createdAt.seconds * 1000)
            : new Date(b.createdAt);

        return dateB - dateA;
    });

    renderTotals(filteredData);
    renderBankSections(filteredData);
}

function renderTotals(filteredData){

    let bankTotals = {};

    filteredData.forEach(item=>{
        bankTotals[item.bank] = (bankTotals[item.bank] || 0) + item.amount;
    });

    let output = `<div class='total-container'>`;

    for(let bank in bankTotals){
        output += `<div class="total-card">
        <b>${bank} - TOTAL</b><br>
        ₹ ${bankTotals[bank].toFixed(2)}
        </div>`;
    }

    output += `</div>`;
    totals.innerHTML = output;
}

function renderBankSections(filteredData){

    bankSections.innerHTML = "";

    const banks = [...new Set(filteredData.map(item => item.bank))];

    banks.forEach(bank => {

        let section = `
        <div class="bank-section">
        <div class="bank-title">${bank}</div>

        <div class="table-wrapper">
        <table>
        <thead>
        <tr>
        <th>Month</th>
        <th>Amount</th>
        <th>Person</th>
        <th>Action</th>
        </tr>
        </thead>
        <tbody>`;

        filteredData
        .filter(item => item.bank === bank)
        .forEach(item=>{
            section += `
            <tr>
                <td>${item.month}</td>
                <td>₹ ${item.amount.toFixed(2)}</td>
                <td>${item.person}</td>
                <td><button onclick="deleteEntry('${item.id}')">Delete</button></td>
            </tr>`;
        });

        section += `</tbody></table></div>`;

        section += `<div class="mobile-card">`;

        filteredData
        .filter(item => item.bank === bank)
        .forEach(item=>{
            section += `
            <div class="entry-card">
                <div><b>Month:</b> ${item.month}</div>
                <div class="amount">₹ ${item.amount.toFixed(2)}</div>
                <div><b>Person:</b> ${item.person}</div>
                <button onclick="deleteEntry('${item.id}')">Delete</button>
            </div>`;
        });

        section += `</div></div>`;

        bankSections.innerHTML += section;
    });
}

</script>
</body>
</html>
