<!DOCTYPE html>
<html>
<head>
<title>Expense Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#001f1f,#000814);
    color:white;
}

.glass-card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    border:1px solid rgba(0,255,255,0.2);
    border-radius:15px;
    padding:20px;
    margin:20px;
}

input,select{
    padding:8px;
    margin:5px;
    border-radius:8px;
    border:none;
}

button{
    background:#00ffff;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#00dddd;
}

.bank-section{
    margin:20px;
    padding:20px;
    border-radius:15px;
    background:rgba(0,255,255,0.08);
    border:1px solid rgba(0,255,255,0.2);
}

.bank-title{
    font-size:18px;
    margin-bottom:10px;
    color:#00ffff;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
    background:rgba(0,255,255,0.2);
}

.total-container{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    margin:20px;
}

.total-card{
    background:linear-gradient(145deg,#063c3c,#022f2f);
    padding:18px;
    border-radius:14px;
    min-width:230px;
}

@media(max-width:600px){
    .total-container{
        flex-direction:column;
    }
}
</style>
</head>
<body>

<div class="glass-card">
<h2>🔥 Bank Dashboard
    <a href="main.html" class="home-link">🏠 Home</a>
</h2>

<input type="month" id="month">

<select id="bank">
<option>YES BANK</option>
<option>HDFC</option>
<option>ONE CARD</option>
<option>ICICI</option>
</select>

<input type="number" id="amount" placeholder="Amount">

<select id="person">
<option>PARDEEP</option>
<option>SANDEEP</option>
</select>

<button id="addBtn">Add Entry</button>

<select id="monthFilter"></select>
</div>

<div id="totals"></div>
<div id="bankSections"></div>

<script type="module">

/* 🔥 FIREBASE IMPORTS */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 YOUR CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  projectId: "personal-budget-1cbbe",
  storageBucket: "personal-budget-1cbbe.firebasestorage.app",
  messagingSenderId: "133591748262",
  appId: "1:133591748262:web:2c0846f03f5f56aeb1ee67"
};

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

/* INIT */
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const bankCollection = collection(db, "bankEntries");

let data = [];

/* 🔐 PAGE PROTECTION */
document.body.style.display = "none";

onAuthStateChanged(auth, (user) => {
    if (!user || user.uid !== ADMIN_UID) {
        window.location.href = "index.html";
    } else {
        document.body.style.display = "block";
        startApp();
    }
});

function startApp(){

    document.getElementById("addBtn").addEventListener("click", addEntry);
    document.getElementById("monthFilter").addEventListener("change", renderAll);

    const q = query(bankCollection, orderBy("createdAt","desc"));

    onSnapshot(q,(snapshot)=>{
        data=[];
        snapshot.forEach(docItem=>{
            data.push({id:docItem.id,...docItem.data()});
        });
        populateMonthFilter();
        renderAll();
    });

    setCurrentMonthInput();
}

/* AUTO SET CURRENT MONTH INPUT */
function setCurrentMonthInput(){
    const currentMonth = new Date().toISOString().slice(0,7);
    document.getElementById("month").value = currentMonth;
}

/* ADD ENTRY */
async function addEntry(){

    const month = document.getElementById("month").value;
    const bank = document.getElementById("bank").value;
    const amount = parseFloat(document.getElementById("amount").value);
    const person = document.getElementById("person").value;

    if(!month || isNaN(amount)){
        alert("Enter Month & Valid Amount");
        return;
    }

    await addDoc(bankCollection,{
        month,
        bank,
        amount,
        person,
        createdAt: new Date()
    });

    document.getElementById("amount").value="";
}

/* DELETE */
window.deleteEntry = async function(id){
    await deleteDoc(doc(db,"bankEntries",id));
}

/* MONTH FILTER */
function populateMonthFilter(){

    const filter = document.getElementById("monthFilter");
    const months = [...new Set(data.map(item => item.month))];
    const currentMonth = new Date().toISOString().slice(0,7);

    if(!months.includes(currentMonth)){
        months.push(currentMonth);
    }

    months.sort().reverse();

    filter.innerHTML = `<option value="all">All Months</option>`;
    months.forEach(month=>{
        filter.innerHTML += `<option value="${month}">${month}</option>`;
    });

    filter.value = currentMonth;
}

/* MAIN RENDER */
function renderAll(){

    const selectedMonth = document.getElementById("monthFilter").value;

    let filteredData = selectedMonth === "all"
        ? data
        : data.filter(item => item.month === selectedMonth);

    renderTotals(filteredData);
    renderBankSections(filteredData);
}

/* TOTALS */
function renderTotals(filteredData){

    let bankPersonTotals = {};
    let bankTotals = {};

    filteredData.forEach(item=>{
        const amount = Number(item.amount) || 0;
        const bpKey = item.bank + " - " + item.person;
        bankPersonTotals[bpKey] = (bankPersonTotals[bpKey] || 0) + amount;
        bankTotals[item.bank] = (bankTotals[item.bank] || 0) + amount;
    });

    const div = document.getElementById("totals");
    let output = `<div class='total-container'>`;

    for(let bank in bankTotals){
        output += `<div class="total-card">
            <b>${bank} - TOTAL</b><br>
            ₹ ${bankTotals[bank].toFixed(2)}<hr>`;

        for(let key in bankPersonTotals){
            if(key.startsWith(bank + " -")){
                const person = key.split(" - ")[1];
                output += `${person} : ₹ ${bankPersonTotals[key].toFixed(2)}<br>`;
            }
        }

        output += `</div>`;
    }

    output += `</div>`;
    div.innerHTML = output;
}

/* BANK SECTIONS */
function renderBankSections(filteredData){

    const container = document.getElementById("bankSections");
    container.innerHTML = "";

    const banks = [...new Set(filteredData.map(item => item.bank))];

    banks.forEach(bank => {

        let section = `<div class="bank-section">
        <div class="bank-title">${bank}</div>
        <table>
        <thead>
        <tr>
        <th>Month</th>
        <th>Amount</th>
        <th>Person</th>
        <th>Action</th>
        </tr>
        </thead>
        <tbody>`;

        filteredData
        .filter(item => item.bank === bank)
        .forEach(item=>{
            section += `
            <tr>
                <td>${item.month}</td>
                <td>₹ ${item.amount.toFixed(2)}</td>
                <td>${item.person}</td>
                <td><button onclick="deleteEntry('${item.id}')">Delete</button></td>
            </tr>`;
        });

        section += `</tbody></table></div>`;
        container.innerHTML += section;
    });
}

</script>
</body>
</html>
