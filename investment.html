<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Investment Dashboard</title>

<link rel="icon" type="image/png" sizes="32x32" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

:root{
--blue:#00f7ff;
--green:#00ff9d;
--red:#ff2e63;
--gold:#ffc857;
}

body{
margin:0;
background:radial-gradient(circle at top left,#0f2027,#070b14 60%);
font-family:Inter;
color:white;
}

.container{
max-width:1800px;
margin:auto;
padding:30px;
}

.header{
font-family:Orbitron;
font-size:30px;
color:var(--blue);
text-shadow:0 0 15px var(--blue);
margin-bottom:25px;
}

.glass{
background:rgba(255,255,255,.05);
border:1px solid rgba(0,247,255,.3);
backdrop-filter:blur(15px);
border-radius:16px;
padding:25px;
margin-bottom:30px;
box-shadow:0 0 25px rgba(0,247,255,.25);
}

.top{
display:flex;
flex-wrap:wrap;
justify-content:space-between;
gap:22px;
}

.stat1{
flex:1 1 200px;
min-width:180px;
text-align:center;
}

.stat1 span{
font-family:Orbitron;
color:var(--green);
font-size:18px;
}

.mini-progress{
width:140px;
height:140px;
border-radius:50%;
border:5px solid #333;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
}

.percent{
font-size:24px;
font-family:Orbitron;
}

.stat{
display:flex;
flex-direction:column;
gap:5px;
min-width:150px;
text-align:center;
}

.stat span{
font-size:16px;
color:var(--green);
}

.stat b{
font-family:Orbitron;
font-size:18px;
color:Chartreuse;
}

input,select,button{
background:#081321;
border:1px solid var(--blue);
border-radius:8px;
color:white;
padding:10px;
font-family:Orbitron;
}

table{
width:100%;
border-collapse:collapse;
}

th{
color:var(--gold);
padding:12px;
border-bottom:2px solid var(--blue);
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.1);
}

.positive{color:var(--green);}
.negative{color:var(--red);}

.home-link{
float:right;
text-decoration:none;
color:#00ffff;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
⚡ Investment Dashboard
<a href="main.html" class="home-link">🏠 Home</a>
</div>

<!-- SUMMARY -->

<div class="glass top">

<div class="stat1">
<span>Net Worth %</span>
<div class="mini-progress"><div class="percent" id="pFund">0%</div></div>
</div>

<div class="stat1">
<span>Equity %</span>
<div class="mini-progress"><div class="percent" id="pEquity">0%</div></div>
</div>

<div class="stat1">
<span>Gold %</span>
<div class="mini-progress"><div class="percent" id="pGold">0%</div></div>
</div>

<div class="stat1">
<span>Debt %</span>
<div class="mini-progress"><div class="percent" id="pDebt">0%</div></div>
</div>

<div class="stat1">
<span>Growth %</span>
<div class="mini-progress"><div class="percent" id="pGrowth">0%</div></div>
</div>

</div>

<!-- SUMMARY 2 -->

<div class="glass top">

<div class="stat">
<span>XIRR %</span>
<b id="xirr">0%</b>
</div>

<div class="stat">
<span>Current Net Worth</span>
<b id="networth">₹0</b>
</div>

<div class="stat">
<span>Current Fund</span>
<b id="currentFundValue">₹0</b>
</div>

<div class="stat">
<span>Pending Loan</span>
<b data-id="loan">₹0</b>
</div>

<div class="stat">
<span>Emergency Fund</span>
<b data-id="emergencyFund">₹0</b>
</div>

<div class="stat">
<span>Health Insurance</span>
<select id="healthInsuranceStatus">
<option value="no">NO</option>
<option value="yes">YES</option>
</select>
</div>

<div class="stat">
<span>Target Fund</span>
<b data-id="targetFund">₹0</b>
</div>

</div>

<!-- ADD INVESTMENT -->

<div class="glass">

<h3 style="font-family:Orbitron;color:var(--green)">➕ Add Investment</h3>

<input id="invName" placeholder="Investment Name">
<select id="category">
<option value="Equity">Equity</option>
<option value="Gold">Gold</option>
<option value="Debt">Debt</option>
</select>

<input id="invInvested" type="number" placeholder="Invested Amount">
<input id="invCurrent" type="number" placeholder="Current Value">

<button onclick="addInvestment()">Add Investment</button>

</div>

<!-- TABLE -->

<div class="glass">

<table>

<thead>
<tr>
<th>Investment</th>
<th>Alloc %</th>
<th>Category</th>
<th>Invested</th>
<th>Current</th>
<th>Profit</th>
<th>XIRR %</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

<tfoot>
<tr>
<th>Total</th>
<th id="totalAlloc"></th>
<th></th>
<th id="totalInvested"></th>
<th id="totalCurrent"></th>
<th id="totalProfit"></th>
<th></th>
<th></th>
</tr>
</tfoot>

</table>

</div>

</div>

<script>

/* FIREBASE */

const firebaseConfig = {
apiKey:"AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
authDomain:"personal-budget-1cbbe.firebaseapp.com",
projectId:"personal-budget-1cbbe",
};

firebase.initializeApp(firebaseConfig);

const firestore=firebase.firestore();

/* ELEMENTS */

const invName=document.getElementById("invName");
const invInvested=document.getElementById("invInvested");
const invCurrent=document.getElementById("invCurrent");
const category=document.getElementById("category");

const tbody=document.getElementById("tbody");

const totalInvested=document.getElementById("totalInvested");
const totalCurrent=document.getElementById("totalCurrent");
const totalProfit=document.getElementById("totalProfit");
const totalAlloc=document.getElementById("totalAlloc");

let data=[];

/* UTILS */

const INR=n=>new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR'}).format(n||0);

/* LOAD */

firestore.collection("portfolio").doc("main").onSnapshot(doc=>{

if(!doc.exists)return;

const d=doc.data();

data=d.rows||[];

render();

});

/* SAVE */

function save(){

firestore.collection("portfolio").doc("main").set({

rows:data

});

}

/* ADD */

function addInvestment(){

if(!invName.value.trim()){

alert("Enter Investment Name");
return;

}

data.push({

name:invName.value,
category:category.value,
invested:Number(invInvested.value)||0,
current:Number(invCurrent.value)||0,
alloc:0,
xirr:0

});

invName.value="";
invInvested.value="";
invCurrent.value="";

render();
save();

}

/* DELETE */

function deleteRow(i){

data.splice(i,1);

render();
save();

}

/* RENDER */

function render(){

tbody.innerHTML="";

let totalI=0;
let totalC=0;

data.forEach((r,i)=>{

totalI+=r.invested;
totalC+=r.current;

});

data.forEach((r,i)=>{

r.alloc=((r.invested/totalI)*100||0).toFixed(1);

let profit=r.current-r.invested;

tbody.innerHTML+=`

<tr>

<td>${r.name}</td>
<td>${r.alloc}%</td>
<td>${r.category}</td>
<td>${INR(r.invested)}</td>
<td>${INR(r.current)}</td>
<td class="${profit>=0?'positive':'negative'}">${INR(profit)}</td>
<td>${r.xirr}%</td>
<td><button onclick="deleteRow(${i})">🗑</button></td>

</tr>

`;

});

totalAlloc.innerText="100%";
totalInvested.innerText=INR(totalI);
totalCurrent.innerText=INR(totalC);
totalProfit.innerText=INR(totalC-totalI);

document.getElementById("pGrowth").innerText=((totalC-totalI)/totalI*100||0).toFixed(1)+"%";

}

</script>

</body>
</html>
