<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Investment Dashboard</title>

<link rel="icon" type="image/png" sizes="32x32" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */

:root{
--blue:#00f7ff;
--green:#00ff9d;
--red:#ff2e63;
--gold:#ffc857;
}

/* ================= BASE ================= */

body{
margin:0;
background:radial-gradient(circle at top left,#0f2027,#070b14 60%);
font-family:Inter;
color:white;
}

/* ================= LAYOUT ================= */

.container{
max-width:1400px;
margin:auto;
padding:14px;
}

.header{
font-family:Orbitron;
font-size:30px;
color:var(--blue);
text-shadow:0 0 15px var(--blue);
margin-bottom:25px;
}

.glass{
background:rgba(255,255,255,.05);
border:1px solid rgba(0,247,255,.3);
backdrop-filter:blur(15px);
border-radius:16px;
padding:25px;
margin-bottom:30px;
box-shadow:0 0 25px rgba(0,247,255,.25);
}

/* ================= FLEX SUMMARY ================= */

.top{
display:flex;
flex-wrap:wrap;
justify-content:space-between;
align-items:center;
gap:12px;
}

.stat1{
flex:1 1 200px;
min-width:180px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
gap:12px;
}

.stat1 span{
font-size:20px;
color:var(--green);
font-family:Orbitron;
text-shadow:0 0 14px rgba(0,179,255,.7);
}

/* ================= PROGRESS CIRCLE ================= */

.mini-progress{
width:150px;
height:150px;
border:5px solid #3a3a3a;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
transition:.35s;
}

.percent{
font-size:30px;
font-weight:600;
}

.low{border-color:#ff3b3b;color:#ff3b3b;}
.medium{border-color:#ffb300;color:#ffb300;}
.high{border-color:#00ff9d;color:#00ff9d;}

/* ================= SECOND STATS ================= */

.stat{
display:flex;
flex-direction:column;
gap:5px;
min-width:150px;
}

.stat span{
font-size:20px;
color:var(--green);
text-align:center;
}

.stat b{
font-family:Orbitron;
font-size:20px;
text-align:center;
color:chartreuse;
}

.positive{color:var(--green);}
.negative{color:var(--red);}

/* ================= INPUT ================= */

input,button,select{
background:#081321;
border:1px solid var(--blue);
border-radius:8px;
color:white;
padding:10px;
font-family:Orbitron;
}

/* ================= TABLE ================= */

table{
width:100%;
border-collapse:collapse;
}

th{
color:var(--gold);
padding:12px;
border-bottom:2px solid var(--blue);
}

td{
text-align:center;
padding:10px;
border-bottom:1px solid rgba(255,255,255,.1);
}

/* ================= HOME BUTTON ================= */

.home-link{
padding:8px 14px;
border-radius:8px;
text-decoration:none;
background:rgba(0,255,255,0.15);
color:#00ffff;
border:1px solid rgba(0,255,255,0.4);
float:right;
}

</style>
</head>

<body>

<div class="container">

<!-- ================= HEADER ================= -->

<div class="header">
⚡ Investment Dashboard
<a href="main.html" class="home-link">🏠 Home</a>
</div>

<!-- ================= SUMMARY ================= -->

<div class="glass top">

<div class="stat1">
<span>Financial Score</span>
<div class="mini-progress">
<div class="percent" id="healthScore">0</div>
</div>
</div>

<div class="stat1">
<span>Net Worth %</span>
<div class="mini-progress">
<div class="percent" id="pFund">0%</div>
</div>
</div>

<div class="stat1">
<span>Equity %</span>
<div class="mini-progress">
<div class="percent" id="pEquity">0%</div>
</div>
</div>

<div class="stat1">
<span>Gold %</span>
<div class="mini-progress">
<div class="percent" id="pGold">0%</div>
</div>
</div>

<div class="stat1">
<span>Debt %</span>
<div class="mini-progress">
<div class="percent" id="pDebt">0%</div>
</div>
</div>

<div class="stat1">
<span>Growth %</span>
<div class="mini-progress">
<div class="percent" id="pGrowth">0%</div>
</div>
</div>

</div>

<!-- ================= PORTFOLIO STATS ================= -->

<div class="glass top">

<div class="stat">
<span>XIRR %</span>
<b id="xirr">0%</b>
</div>

<div class="stat">
<span>Current Net Worth</span>
<b id="networth">₹0</b>
</div>

<div class="stat">
<span>Current Fund</span>
<b id="currentFundValue">₹0</b>
</div>

<div class="stat">
<span>Pending Loan</span>
<b data-id="loan">₹0</b>
</div>

<div class="stat">
<span>Emergency Fund</span>
<b data-id="emergencyFund">₹0</b>
</div>

<div class="stat">
<span>Target Fund</span>
<b class="editable" data-id="targetFund">₹0</b>
</div>

</div>

<!-- ================= ADD INVESTMENT ================= -->

<div class="glass">

<h3 style="font-family:Orbitron;color:var(--green)">➕ Add Investment</h3>

<input id="invName" placeholder="Investment Name">

<select id="category">
<option value="Equity">Equity</option>
<option value="Gold">Gold</option>
<option value="Debt">Debt</option>
</select>

<input id="invInvested" type="number" placeholder="Invested Amount">
<input id="invCurrent" type="number" placeholder="Current Value">

<button onclick="addInvestment()">Add Investment</button>

</div>

<!-- ================= TABLE ================= -->

<div class="glass">

<table>

<thead>

<tr>
<th>Investment</th>
<th>Alloc %</th>
<th>Category</th>
<th>Invested</th>
<th>Current</th>
<th>Profit</th>
<th>XIRR %</th>
<th>Delete</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

<tfoot>

<tr>
<th>Total</th>
<th id="totalAlloc"></th>
<th></th>
<th id="totalInvested"></th>
<th id="totalCurrent"></th>
<th id="totalProfit"></th>
<th></th>
<th></th>
</tr>

</tfoot>

</table>

</div>

</div>

<!-- ================= FIREBASE ================= -->

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

/* ================= FIREBASE CONFIG ================= */

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  databaseURL: "https://personal-budget-1cbbe-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "personal-budget-1cbbe",
  storageBucket: "personal-budget-1cbbe.appspot.com",
  messagingSenderId: "133591748262",
  appId: "1:133591748262:web:2c0846f03f5f56aeb1ee67"
};

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const firestore = firebase.firestore();

/* 🔐 PAGE PROTECTION */

document.body.style.display = "none";

auth.onAuthStateChanged(function(user){
  if(!user || user.uid !== ADMIN_UID){
    window.location.href = "index.html";
  } else {
    document.body.style.display = "block";
  }
});

/* ================= UTILS ================= */

const INR=n=>new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR'}).format(n||0);
const NUM=v=>Number(String(v).replace(/[^0-9.-]+/g,''))||0;

/* ================= STATE ================= */

let data=[];

/* ================= ADD ================= */

function addInvestment(){

if(!invName.value) return alert("Enter name");

data.push({
name:invName.value,
category:category.value,
invested:+invInvested.value||0,
current:+invCurrent.value||0,
xirr:0
});

invName.value="";
invInvested.value="";
invCurrent.value="";

render();
}

/* ================= DELETE ================= */

function deleteRow(i){

data.splice(i,1);

render();

}

/* ================= RENDER ================= */

function render(){

tbody.innerHTML="";

let totalI=0;
let totalC=0;

data.forEach((r,i)=>{

totalI+=r.invested;
totalC+=r.current;

let profit=r.current-r.invested;

tbody.innerHTML+=`

<tr>

<td>${r.name}</td>

<td>${((r.invested/totalI)*100||0).toFixed(1)}%</td>

<td>${r.category}</td>

<td>${INR(r.invested)}</td>

<td>${INR(r.current)}</td>

<td class="${profit>=0?'positive':'negative'}">${INR(profit)}</td>

<td>${r.xirr}%</td>

<td><button onclick="deleteRow(${i})">🗑</button></td>

</tr>

`;

});

totalInvested.innerText=INR(totalI);
totalCurrent.innerText=INR(totalC);
totalProfit.innerText=INR(totalC-totalI);

}

</script>

</body>
</html>
