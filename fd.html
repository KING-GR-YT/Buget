<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FD Dashboard</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#02121c,#000814);
    color:#00f7ff;
}

.header{
    padding:20px;
    font-size:26px;
    font-weight:bold;
    text-shadow:0 0 10px #00f7ff;
}

.card{
    background:rgba(0,255,255,0.05);
    border:1px solid rgba(0,255,255,0.2);
    border-radius:15px;
    padding:20px;
    margin:20px;
    box-shadow:0 0 20px rgba(0,255,255,0.2);
    backdrop-filter:blur(10px);
}

.summary-row{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:20px;
}

.summary-box{
    flex:1;
    min-width:200px;
    text-align:center;
}

.summary-box h3{
    margin:0;
    font-size:14px;
    opacity:0.7;
}

.summary-box p{
    margin:5px 0 0;
    font-size:20px;
    font-weight:bold;
    color:#00ff88;
}

.add-section{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    align-items:center;
}

input, select{
    background:transparent;
    border:1px solid rgba(0,255,255,0.3);
    color:#00f7ff;
    padding:8px;
    border-radius:8px;
    text-align:center;
}

input:focus, select:focus{
    outline:none;
    box-shadow:0 0 8px #00f7ff;
}

button{
    background:transparent;
    border:1px solid #00f7ff;
    color:#00f7ff;
    padding:8px 15px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#00f7ff;
    color:#000;
}

.delete-btn{
    border:1px solid #ff4d4d;
    color:#ff4d4d;
}

.delete-btn:hover{
    background:#ff4d4d;
    color:#000;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    border-bottom:2px solid #00f7ff;
    padding:10px;
}

td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid rgba(0,255,255,0.1);
}

.active{ color:#00ff88; font-weight:bold; }
.matured{ color:#ff4d4d; font-weight:bold; }

@media(max-width:900px){
    .add-section{flex-direction:column;}
}
</style>
</head>
<body>

<div class="header">⚡ FD Dashboard</div>

<!-- SUMMARY -->
<div class="card">
<div class="summary-row">
    <div class="summary-box">
        <h3>Total Invested</h3>
        <p id="totalInvested">₹ 0.00</p>
    </div>
    <div class="summary-box">
        <h3>Total Interest Till Date</h3>
        <p id="totalInterest">₹ 0.00</p>
    </div>
    <div class="summary-box">
        <h3>Total Maturity Value</h3>
        <p id="totalMaturity">₹ 0.00</p>
    </div>
</div>
</div>

<!-- ADD FD -->
<div class="card">
<div class="add-section">
    <input type="text" id="name" placeholder="FD Name">
    <input type="number" id="rate" placeholder="Interest %" step="0.01">
    <input type="number" id="amount" placeholder="Amount">
    <input type="date" id="startDate">
    <input type="number" id="days" placeholder="Days">
    <select id="compounding"> 
        <option value="4" selected>Quarterly</option>
    </select>
    <button onclick="addFD()">Add FD</button>
</div>

<table id="fdTable">
<thead>
<tr>
<th>Name</th>
<th>Rate %</th>
<th>Invested</th>
<th>Start Date</th>
<th>Maturity Date</th>
<th>Days Remaining</th>
<th>Status</th>
<th>Interest</th>
<th>Maturity Value</th>
<th>Delete</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>

function format(num){
    return "₹ " + num.toLocaleString("en-IN",{minimumFractionDigits:2});
}

function formatDate(date){
    return date.toISOString().split('T')[0];
}

function addFD(){

    let name=document.getElementById("name").value.trim();
    let rate=parseFloat(document.getElementById("rate").value);
    let amount=parseFloat(document.getElementById("amount").value);
    let startValue=document.getElementById("startDate").value;
    let days=parseInt(document.getElementById("days").value);
    let comp=parseInt(document.getElementById("compounding").value);

    if(!name || !rate || !amount || !startValue || !days){
        alert("Please fill all fields");
        return;
    }

    let start=new Date(startValue);
    let maturity=new Date(start);
    maturity.setDate(maturity.getDate()+days);

    let today=new Date();
    let calcDate=today<maturity?today:maturity;

    let passedDays=Math.floor((today-start)/(1000*60*60*24));
    let remainingDays=Math.max(days-passedDays,0);

    let yearFrac=(calcDate-start)/(365*24*60*60*1000);
    let r=rate/100;

    let interest=Math.round(amount*Math.pow((1+r/comp),(comp*yearFrac))-amount);
    let totalYears=days/365;
    let maturityValue=Math.round(amount*Math.pow((1+r/comp),(comp*totalYears)));

    let status=today>=maturity?"Matured":"Active";

    let table=document.querySelector("#fdTable tbody");
    let row=table.insertRow();

    row.innerHTML=`
    <td>${name}</td>
    <td>${rate}%</td>
    <td>${format(amount)}</td>
    <td>${formatDate(start)}</td>
    <td>${formatDate(maturity)}</td>
    <td>${remainingDays}</td>
    <td class="${status==="Active"?"active":"matured"}">${status}</td>
    <td style="color:#00ff88">${format(interest)}</td>
    <td>${format(maturityValue)}</td>
    <td><button class="delete-btn" onclick="deleteRow(this)">🗑</button></td>
    `;

    calculateSummary();
    clearInputs();
}

function deleteRow(btn){
    if(confirm("Delete this FD?")){
        btn.closest("tr").remove();
        calculateSummary();
    }
}

function clearInputs(){
    document.querySelectorAll(".add-section input").forEach(i=>i.value="");
}

function calculateSummary(){

    let rows=document.querySelectorAll("#fdTable tbody tr");
    let totalInvested=0;
    let totalInterest=0;

    rows.forEach(row=>{
        totalInvested+=parseFloat(row.cells[2].innerText.replace(/[^0-9.-]+/g,""));
        totalInterest+=parseFloat(row.cells[8].innerText.replace(/[^0-9.-]+/g,""));
    });

    // 🔥 Summary Maturity = Invested + Interest
    let totalMaturity = totalInvested + totalInterest;

    document.getElementById("totalInvested").innerText=format(totalInvested);
    document.getElementById("totalInterest").innerText=format(totalInterest);
    document.getElementById("totalMaturity").innerText=format(totalMaturity);
}

</script>

</body>
</html>
