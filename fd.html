
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FD Dashboard</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#02121c,#000814);
    color:#00f7ff;
}

/* HEADER */

.header{
    padding:20px;
    font-size:26px;
    font-weight:bold;
    text-shadow:0 0 10px #00f7ff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

/* CARDS */

.card{
    background:rgba(0,255,255,0.05);
    border:1px solid rgba(0,255,255,0.2);
    border-radius:15px;
    padding:20px;
    margin:20px;
    box-shadow:0 0 20px rgba(0,255,255,0.2);
    backdrop-filter:blur(10px);
}

/* INPUT CARD TITLE */

.card-title{
    margin-bottom:15px;
    font-size:18px;
}

/* SUMMARY */

.summary-row{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:20px;
}

.summary-box{
    flex:1;
    min-width:180px;
    text-align:center;
}

.summary-box h3{
    margin:0;
    font-size:14px;
    opacity:0.7;
}

.summary-box p{
    margin:5px 0 0;
    font-size:20px;
    font-weight:bold;
    color:#00ff88;
}

/* INPUT SECTION */

.add-section{
    display:flex;
    flex-wrap:wrap;
    gap:25px;
    align-items:center;
}

input, select{
    background:transparent;
    border:1px solid rgba(0,255,255,0.3);
    color:#00f7ff;
    padding:10px;
    border-radius:8px;
    text-align:center;
    min-width:130px;
}

input:focus, select:focus{
    outline:none;
    box-shadow:0 0 8px #00f7ff;
}

button{
    background:transparent;
    border:1px solid #00f7ff;
    color:#00f7ff;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#00f7ff;
    color:#000;
}

/* DELETE BUTTON */

.delete-btn{
    border:1px solid #ff4d4d;
    color:#ff4d4d;
}

.delete-btn:hover{
    background:#ff4d4d;
    color:#000;
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    min-width:900px;
}

th{
    border-bottom:2px solid #00f7ff;
    padding:10px;
}

td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid rgba(0,255,255,0.1);
}

.active{ color:#00ff88; font-weight:bold; }
.matured{ color:#ff4d4d; font-weight:bold; }

/* TABLE SCROLL */

.card{
    overflow-x:auto;
}

/* HOME BUTTON */

.home-link{
    padding:6px 10px;
    border-radius:8px;
    text-decoration:none;
    background:rgba(0,255,255,0.15);
    color:#00ffff;
    border:1px solid rgba(0,255,255,0.4);
    transition:0.3s ease;
}

.home-link:hover{
    background:#00ffff;
    color:#001f1f;
}

/* MOBILE */

@media(max-width:768px){

.header{
    font-size:20px;
}

.card{
    margin:10px;
    padding:15px;
}

.summary-row{
    flex-direction:column;
}

.summary-box{
    min-width:100%;
}

.add-section{
    flex-direction:column;
}

input,button{
    width:100%;
}

table{
    font-size:13px;
}

}
  
</style>
</head>
<body>

<div class="header">⚡ FD Dashboard
    <a href="main.html" class="home-link">🏠 Home</a>
</div>

<div class="card">
<div class="summary-row">
    <div class="summary-box">
        <h3>Total Invested</h3>
        <p id="totalInvested">₹ 0.00</p>
    </div>
    <div class="summary-box">
        <h3>Total Interest Till Date</h3>
        <p id="totalInterest">₹ 0.00</p>
    </div>
    <div class="summary-box">
        <h3>Total Maturity Value</h3>
        <p id="totalMaturity">₹ 0.00</p>
    </div>
</div>
</div>

<div class="card input-card">
<div class="add-section">
    <h3 class="card-title">➕ Add New FD</h3>
    <input type="text" id="name" placeholder="FD Name">
    <input type="number" id="rate" placeholder="Interest %" step="0.01">
    <input type="number" id="amount" placeholder="Amount">
    <input type="date" id="startDate">
    <input type="number" id="days" placeholder="Days">
  
    <button onclick="addFD()">Add FD</button>
</div>
</div>

<div class="card">
<table id="fdTable">
<thead>
<tr>
<th>Name</th>
<th>Rate %</th>
<th>Invested</th>
<th>Start Date</th>
<th>Maturity Date</th>
<th>Days Remaining</th>
<th>Status</th>
<th>Interest</th>
<th>Maturity Value</th>
<th>Delete</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, setDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  projectId: "personal-budget-1cbbe",
  storageBucket: "personal-budget-1cbbe.firebasestorage.app",
  messagingSenderId: "133591748262",
  appId: "1:133591748262:web:2c0846f03f5f56aeb1ee67"
};

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const fdCollection = collection(db, "fds");

let latestSnapshot = null;

document.body.style.display = "none";

onAuthStateChanged(auth, (user) => {
    if (!user || user.uid !== ADMIN_UID) {
        window.location.href = "index.html";
    } else {
        document.body.style.display = "block";
    }
});

function format(num){
    return "₹ " + num.toLocaleString("en-IN",{minimumFractionDigits:2});
}
function formatDate(date){
    return date.toISOString().split('T')[0];
}
function clearInputs(){
    document.querySelectorAll(".add-section input").forEach(i=>i.value="");
}

window.addFD = async function(){

    let name = document.getElementById("name").value.trim();
    let rate = parseFloat(document.getElementById("rate").value);
    let amount = parseFloat(document.getElementById("amount").value);
    let startDate = document.getElementById("startDate").value;
    let days = parseInt(document.getElementById("days").value);
    let comp = 4;

    if(!name || isNaN(rate) || isNaN(amount) || !startDate || isNaN(days)){
        alert("Please fill all fields correctly");
        return;
    }

    try{
        await addDoc(fdCollection,{
            name,
            rate,
            amount,
            startDate,
            days,
            compounding: comp
        });

        clearInputs();
    }catch(error){
        console.error("Error adding FD:", error);
        alert("Error adding FD. Check console.");
    }
};

window.deleteFD = async function(id){
    if(confirm("Delete this FD?")){
        await deleteDoc(doc(db,"fds",id));
    }
};

function renderData(snapshot){

    latestSnapshot = snapshot;

    const table = document.querySelector("#fdTable tbody");
    table.innerHTML = "";

    let fdList = [];

    snapshot.forEach(docSnap => {

        const data = docSnap.data();
        const id = docSnap.id;

        let start = new Date(data.startDate);
        let maturity = new Date(start);
        maturity.setDate(maturity.getDate() + data.days);

        let today = new Date();
        let calcDate = today < maturity ? today : maturity;

        let passedDays = Math.floor((today - start)/(1000*60*60*24));
        let remainingDays = Math.max(data.days - passedDays,0);

        let yearFrac = (calcDate - start)/(365*24*60*60*1000);
        let r = data.rate/100;

        let interest = Math.round(
            data.amount * Math.pow((1+r/data.compounding),(data.compounding*yearFrac)) - data.amount
        );

        let totalYears = data.days/365;
        let maturityValue = Math.round(
            data.amount * Math.pow((1+r/data.compounding),(data.compounding*totalYears))
        );

        let status = today>=maturity ? "Matured" : "Active";

        fdList.push({
            id,
            data,
            maturity,
            remainingDays,
            interest,
            maturityValue,
            status
        });

    });

    /* SORT BY REMAINING DAYS (LOWEST FIRST) */
    fdList.sort((a,b)=>a.remainingDays - b.remainingDays);

    /* RENDER TABLE */

    fdList.forEach(item => {

        let row = table.insertRow();

        row.innerHTML = `
        <td>${item.data.name}</td>
        <td>${item.data.rate}%</td>
        <td>${format(item.data.amount)}</td>
        <td>${item.data.startDate}</td>
        <td>${formatDate(item.maturity)}</td>
        <td>${item.remainingDays}</td>
        <td class="${item.status==="Active"?"active":"matured"}">${item.status}</td>
        <td style="color:#00ff88">${format(item.interest)}</td>
        <td>${format(item.maturityValue)}</td>
        <td><button class="delete-btn" onclick="deleteFD('${item.id}')">🗑</button></td>
        `;

    });

    calculateSummary();
}

const totalInvestedEl = document.getElementById("totalInvested");
const totalInterestEl = document.getElementById("totalInterest");
const totalMaturityEl = document.getElementById("totalMaturity");

function calculateSummary(){

    let rows=document.querySelectorAll("#fdTable tbody tr");
    let totalInvested=0;
    let totalInterest=0;

    rows.forEach(row=>{
        totalInvested+=parseFloat(row.cells[2].innerText.replace(/[^0-9.-]+/g,""));
        totalInterest+=parseFloat(row.cells[7].innerText.replace(/[^0-9.-]+/g,""));
    });

    let totalMaturity = totalInvested + totalInterest;

    totalInvestedEl.innerText=format(totalInvested);
    totalInterestEl.innerText=format(totalInterest);
    totalMaturityEl.innerText=format(totalMaturity);

    /* 🔥 SAVE FD TOTAL TO FIRESTORE */

    setDoc(
        doc(db,"financeSummary","main"),
        {
            fdInvested: totalInvested,
            fdInterest: totalInterest
        },
        { merge:true }
    );
}

onSnapshot(fdCollection,(snapshot)=>{
    renderData(snapshot);
});

/* AUTO REFRESH INTEREST EVERY 60 SECONDS (NO DUPLICATE LISTENER) */
setInterval(()=>{
    if(latestSnapshot){
        renderData(latestSnapshot);
    }
},60000);

</script>

</body>
</html>
