<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FD Dashboard</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0a0f1c,#050811);
    color:#fff;
}

/* HEADER */
.header{
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* SUMMARY */
.summary{
    display:flex;
    justify-content:space-around;
    padding:15px;
    flex-wrap:wrap;
}

.card{
    background:#111827;
    padding:15px;
    border-radius:12px;
    width:30%;
    min-width:120px;
    text-align:center;
    margin:5px;
}

.card h3{
    margin:5px 0;
    font-size:14px;
    color:#9ca3af;
}

.card p{
    margin:0;
    font-size:18px;
    font-weight:bold;
}

/* FORM */
.form{
    padding:15px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

.form input{
    padding:8px;
    border-radius:8px;
    border:none;
    width:120px;
    text-align:center;
    font-weight:bold;
}

.form button{
    padding:8px 15px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th,td{
    padding:8px;
    text-align:center;
    font-size:13px;
}

th{
    background:#1f2937;
}

tr:nth-child(even){
    background:#111827;
}

/* STATUS COLORS */
.active{
    color:#10b981;
    font-weight:bold;
}

.matured{
    color:#ef4444;
    font-weight:bold;
}

/* MOBILE */
@media(max-width:768px){
    .card{
        width:45%;
    }
}
</style>
</head>
<body>

<div class="header">FD Dashboard</div>

<div class="summary">
    <div class="card">
        <h3>Total Invested</h3>
        <p id="totalInvest">₹ 0</p>
    </div>
    <div class="card">
        <h3>Total Interest</h3>
        <p id="totalInterest">₹ 0</p>
    </div>
    <div class="card">
        <h3>Total Value</h3>
        <p id="totalValue">₹ 0</p>
    </div>
</div>

<div class="form">
    <input type="text" id="name" placeholder="FD Name">
    <input type="number" id="amount" placeholder="Amount">
    <input type="number" id="rate" placeholder="Rate %">
    <input type="date" id="startDate">
    <input type="number" id="days" placeholder="Days">
    <button onclick="addFD()">Add FD</button>
</div>

<table id="fdTable">
<thead>
<tr>
<th>Name</th>
<th>Rate</th>
<th>Amount</th>
<th>Start</th>
<th>Total Days</th>
<th>Days Passed</th>
<th>Status</th>
<th>Interest</th>
<th>Maturity Value</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
getFirestore, collection, addDoc, onSnapshot, query, orderBy 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { 
getAuth, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  projectId: "personal-budget-1cbbe",
  storageBucket: "personal-budget-1cbbe.firebasestorage.app",
  messagingSenderId: "133591748262",
  appId: "1:133591748262:web:2c0846f03f5f56aeb1ee67"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* 🔐 ADMIN UID */
const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

/* 🔐 PAGE PROTECTION */
onAuthStateChanged(auth,(user)=>{
    if(!user){
        window.location.href="index.html";
    }
    else if(user.uid !== ADMIN_UID){
        alert("Unauthorized");
        window.location.href="index.html";
    }
    else{
        loadFDs();
    }
});

/* 🔢 Format */
function format(num){
    return "₹ " + Math.round(num).toLocaleString("en-IN");
}

/* 📈 Live Calculation */
function calculateFD(data){

    const amount=data.amount;
    const rate=data.rate/100;
    const start=new Date(data.startDate);
    const today=new Date();

    const daysPassed=Math.floor((today-start)/(1000*60*60*24));
    const effectiveDays=Math.min(daysPassed,data.days);

    const years=effectiveDays/365;
    const comp=4;

    const maturity=amount*Math.pow((1+rate/comp),(comp*years));
    const interest=maturity-amount;

    return{
        daysPassed:effectiveDays,
        interest:Math.round(interest),
        maturity:Math.round(maturity),
        status: daysPassed>=data.days ? "Matured":"Active"
    };
}

/* ➕ Add FD */
window.addFD=async function(){

    const user=auth.currentUser;

    await addDoc(collection(db,"users",user.uid,"fds"),{
        name:document.getElementById("name").value,
        amount:parseFloat(document.getElementById("amount").value),
        rate:parseFloat(document.getElementById("rate").value),
        startDate:document.getElementById("startDate").value,
        days:parseInt(document.getElementById("days").value),
        createdAt:new Date()
    });
}

/* 📡 Real-time Load */
function loadFDs(){

    const user=auth.currentUser;

    const q=query(
        collection(db,"users",user.uid,"fds"),
        orderBy("createdAt","desc")
    );

    onSnapshot(q,(snapshot)=>{

        let tbody=document.querySelector("#fdTable tbody");
        tbody.innerHTML="";

        let totalInvest=0;
        let totalInterest=0;
        let totalValue=0;

        snapshot.forEach(docSnap=>{

            const data=docSnap.data();
            const live=calculateFD(data);

            totalInvest+=data.amount;
            totalInterest+=live.interest;
            totalValue+=live.maturity;

            let row=tbody.insertRow();

            row.innerHTML=`
            <td>${data.name}</td>
            <td>${data.rate}%</td>
            <td>${format(data.amount)}</td>
            <td>${data.startDate}</td>
            <td>${data.days}</td>
            <td>${live.daysPassed}</td>
            <td class="${live.status==='Active'?'active':'matured'}">
                ${live.status}
            </td>
            <td>${format(live.interest)}</td>
            <td>${format(live.maturity)}</td>
            `;
        });

        document.getElementById("totalInvest").innerText=format(totalInvest);
        document.getElementById("totalInterest").innerText=format(totalInterest);
        document.getElementById("totalValue").innerText=format(totalValue);
    });
}

</script>

</body>
</html>
