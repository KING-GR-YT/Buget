<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FD Dashboard</title>

<style>

/* ===== GLOBAL ===== */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(180deg,#00141c,#000c12);
    color:#00f7ff;
}

/* ===== HEADER ===== */
.header{
    padding:20px 30px;
    font-size:22px;
    font-weight:bold;
    color:#00f7ff;
    text-shadow:0 0 10px #00f7ff;
    display:flex;
    align-items:center;
    gap:10px;
}

/* ===== CARD ===== */
.container{
    margin:20px;
    padding:20px;
    border-radius:15px;
    border:1px solid rgba(0,255,255,0.3);
    background:rgba(0,255,255,0.03);
    box-shadow:0 0 20px rgba(0,255,255,0.15);
}

/* ===== SUMMARY ===== */
.summary-row{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:20px;
}

.summary-box{
    flex:1;
    text-align:center;
}

.summary-box h3{
    font-size:13px;
    font-weight:500;
    opacity:0.8;
    margin-bottom:5px;
}

.summary-box p{
    font-size:18px;
    font-weight:bold;
    color:#00ff88;
}

/* ===== INPUT ROW ===== */
.input-row{
    margin-top:15px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    align-items:center;
}

input{
    background:transparent;
    border:1px solid rgba(0,255,255,0.4);
    border-radius:8px;
    padding:8px 10px;
    color:#00f7ff;
    text-align:center;
    font-weight:500;
    transition:0.3s;
    min-width:120px;
}

input:focus{
    outline:none;
    box-shadow:0 0 10px #00f7ff;
}

button{
    background:transparent;
    border:1px solid #00f7ff;
    border-radius:8px;
    padding:8px 18px;
    color:#00f7ff;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00f7ff;
    color:#000;
    box-shadow:0 0 15px #00f7ff;
}

/* ===== TABLE ===== */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    border-bottom:2px solid #00f7ff;
    padding:12px;
    font-size:13px;
    font-weight:600;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid rgba(0,255,255,0.1);
    font-size:13px;
}

/* ===== STATUS ===== */
.active{
    color:#00ff88;
    font-weight:bold;
}

.matured{
    color:#ff4d4d;
    font-weight:bold;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

    .summary-row{
        flex-direction:column;
        gap:10px;
    }

    .input-row{
        flex-direction:column;
        align-items:stretch;
    }

    input{
        width:100%;
    }
}

</style>
</head>
<body>

<div class="header">⚡ FD Dashboard</div>

<!-- SUMMARY -->
<div class="container">
    <div class="summary-row">
        <div class="summary-box">
            <h3>Total Invested</h3>
            <p id="totalInvest">₹ 0</p>
        </div>
        <div class="summary-box">
            <h3>Total Interest Till Date</h3>
            <p id="totalInterest">₹ 0</p>
        </div>
        <div class="summary-box">
            <h3>Total Maturity Value</h3>
            <p id="totalValue">₹ 0</p>
        </div>
    </div>
</div>

<!-- INPUT + TABLE -->
<div class="container">

    <div class="input-row">
        <input type="text" id="name" placeholder="FD Name">
        <input type="number" id="rate" placeholder="Interest %">
        <input type="number" id="amount" placeholder="Amount">
        <input type="date" id="startDate">
        <input type="number" id="days" placeholder="Days">
        <button onclick="addFD()">Add FD</button>
    </div>

    <table id="fdTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Rate %</th>
                <th>Invested</th>
                <th>Start Date</th>
                <th>Days</th>
                <th>Days Passed</th>
                <th>Status</th>
                <th>Interest</th>
                <th>Maturity Value</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<script type="module">


import { getFirestore, collection, addDoc, onSnapshot, query, orderBy }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { auth } from "./auth.js";

const db = getFirestore();

/* 🔐 ADMIN UID */
const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

/* 🔐 PAGE PROTECTION */
onAuthStateChanged(auth,(user)=>{
    if(!user){
        window.location.href="index.html";
    }
    else if(user.uid !== ADMIN_UID){
        alert("Unauthorized Access");
        window.location.href="index.html";
    }
    else{
        loadFDs();
    }
});

/* FORMAT */
function format(num){
    return "₹ " + Math.round(num).toLocaleString("en-IN");
}

/* LIVE CALCULATION */
function calculateFD(data){

    const amount=data.amount;
    const rate=data.rate/100;
    const start=new Date(data.startDate);
    const today=new Date();

    const daysPassed=Math.floor((today-start)/(1000*60*60*24));
    const effectiveDays=Math.min(daysPassed,data.days);

    const years=effectiveDays/365;
    const comp=4;

    const maturity=amount*Math.pow((1+rate/comp),(comp*years));
    const interest=maturity-amount;

    return{
        daysPassed:effectiveDays,
        interest:Math.round(interest),
        maturity:Math.round(maturity),
        status: daysPassed>=data.days ? "Matured":"Active"
    };
}

/* ADD FD */
window.addFD=async function(){

    const user=auth.currentUser;

    await addDoc(collection(db,"users",user.uid,"fds"),{
        name:document.getElementById("name").value,
        rate:parseFloat(document.getElementById("rate").value),
        amount:parseFloat(document.getElementById("amount").value),
        startDate:document.getElementById("startDate").value,
        days:parseInt(document.getElementById("days").value),
        createdAt:new Date()
    });
}

/* LOAD REAL-TIME */
function loadFDs(){

    const user=auth.currentUser;

    const q=query(
        collection(db,"users",user.uid,"fds"),
        orderBy("createdAt","desc")
    );

    onSnapshot(q,(snapshot)=>{

        const tbody=document.querySelector("#fdTable tbody");
        tbody.innerHTML="";

        let totalInvest=0;
        let totalInterest=0;
        let totalValue=0;

        snapshot.forEach(docSnap=>{

            const data=docSnap.data();
            const live=calculateFD(data);

            totalInvest+=data.amount;
            totalInterest+=live.interest;
            totalValue+=live.maturity;

            let row=tbody.insertRow();

            row.innerHTML=`
            <td>${data.name}</td>
            <td>${data.rate}%</td>
            <td>${format(data.amount)}</td>
            <td>${data.startDate}</td>
            <td>${data.days}</td>
            <td>${live.daysPassed}</td>
            <td class="${live.status==='Active'?'active':'matured'}">
                ${live.status}
            </td>
            <td>${format(live.interest)}</td>
            <td>${format(live.maturity)}</td>
            `;
        });

        document.getElementById("totalInvest").innerText=format(totalInvest);
        document.getElementById("totalInterest").innerText=format(totalInterest);
        document.getElementById("totalValue").innerText=format(totalValue);

    });
}

</script>

</body>
</html>
