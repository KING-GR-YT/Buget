<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Control Center</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#000000,#001f1f,#000000);
    color:#00ffff;
}

/* GLASS CARD */
.glass-container{
    position:relative;
    backdrop-filter:blur(15px);
    background:rgba(0, 255, 255, 0.08);
    border:1px solid rgba(0,255,255,0.3);
    padding:50px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,255,255,0.2);
    text-align:center;
    width:90%;
    max-width:1000px;
}

/* SIGN OUT BUTTON */
.signout-btn{
    position:absolute;
    top:20px;
    right:20px;
    padding:8px 18px;
    font-size:13px;
    font-weight:bold;
    border-radius:8px;
    background:rgba(255,0,0,0.15);
    border:1px solid rgba(255,0,0,0.5);
    color:#ff4d4d;
    cursor:pointer;
    transition:0.3s ease;
}

.signout-btn:hover{
    background:#ff4d4d;
    color:#000;
    box-shadow:0 0 15px #ff4d4d;
}

/* TITLE */
h1{
    margin-bottom:40px;
    letter-spacing:3px;
    font-weight:bold;
}

/* BUTTON GRID */
.nav-container{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:30px;
}

/* GLASS BUTTON */
.nav-btn{
    text-decoration:none;
    padding:18px;
    font-weight:bold;
    letter-spacing:1px;
    border-radius:12px;
    background:rgba(0,255,255,0.15);
    border:1px solid rgba(0,255,255,0.4);
    color:#00ffff;
    transition:0.3s ease;
    backdrop-filter:blur(10px);
}

.nav-btn:hover{
    background:#00ffff;
    color:#000;
    box-shadow:0 0 25px #00ffff;
    transform:translateY(-5px);
}

/* RESPONSIVE */
@media(max-width:900px){
    .nav-container{
        grid-template-columns:repeat(2, 1fr);
    }
}

@media(max-width:600px){
    .nav-container{
        grid-template-columns:1fr;
    }

    .glass-container{
        padding:30px;
    }

    h1{
        font-size:20px;
    }

    .signout-btn{
        top:10px;
        right:10px;
        padding:6px 12px;
        font-size:11px;
    }
}

</style>
</head>

<body>


<div class="glass-container">

<button class="signout-btn" id="logoutBtn">Sign Out</button>

<h1>FINANCE CONTROL CENTER</h1>

<div class="nav-container">
    <a href="expense.html" class="nav-btn">Expense Tracker</a>
    <a href="dashboard.html" class="nav-btn">Monthly Dashboard</a>
    <a href="salary.html" class="nav-btn">Salary Overview</a>
    <a href="investment.html" class="nav-btn">Investment</a>
    <a href="retirement.html" class="nav-btn">Retirement</a>
    <a href="loans.html" class="nav-btn">Loans</a>
</div>

</div>

<script type="module">
import { protectPage, logout } from "./auth.js";

/* Protect page */
protectPage();

/* Logout button */
document.getElementById("logoutBtn").addEventListener("click", async () => {
    await logout();
});
</script>


</body>
</html>
