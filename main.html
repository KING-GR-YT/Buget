<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Control Center</title>
<link rel="preload" as="image" href="background.jpeg">
<link rel="icon" type="image/png" sizes="32x32" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">
<style>

*{
    box-sizing:border-box;
}

#matrix-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
    overflow:hidden;
    color:#00ffff;
}
    
/* GLASS CARD */
.glass-container{
    position:relative;
    backdrop-filter:blur(15px);
    background:rgba(0, 255, 255, 0.08);
    border:1px solid rgba(0,255,255,0.3);
    padding:50px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,255,255,0.2);
    text-align:center;
    width:90%;
    max-width:1000px;
}

/* SIGN OUT BUTTON */
.signout-btn{
    position:absolute;
    top:20px;
    right:20px;
    padding:8px 18px;
    font-size:13px;
    font-weight:bold;
    border-radius:8px;
    background:rgba(255,0,0,0.15);
    border:1px solid rgba(255,0,0,0.5);
    color:#ff4d4d;
    cursor:pointer;
    transition:0.3s ease;
}

.signout-btn:hover{
    background:#ff4d4d;
    color:#000;
    box-shadow:0 0 15px #ff4d4d;
}

/* TITLE */
h1{
    margin-bottom:40px;
    letter-spacing:3px;
    font-weight:bold;
}

/* BUTTON GRID */
.nav-container{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:30px;
}

/* GLASS BUTTON */
.nav-btn{
    text-decoration:none;
    padding:18px;
    font-weight:bold;
    letter-spacing:1px;
    border-radius:12px;
    background:rgba(0,255,255,0.15);
    border:1px solid rgba(0,255,255,0.4);
    color:#00ffff;
    transition:0.3s ease;
    backdrop-filter:blur(10px);
}

.nav-btn:hover{
    background:#00ffff;
    color:#000;
    box-shadow:0 0 25px #00ffff;
    transform:translateY(-5px);
}

/* RESPONSIVE */
@media(max-width:900px){
    .nav-container{
        grid-template-columns:repeat(2, 1fr);
    }
}

@media(max-width:600px){
    .nav-container{
        grid-template-columns:1fr;
    }

    .glass-container{
        padding:30px;
    }

    h1{
        font-size:20px;
    }

    .signout-btn{
        top:10px;
        right:10px;
        padding:6px 12px;
        font-size:11px;
    }
}

</style>
</head>

<body>

<canvas id="matrix-bg"></canvas>

<div class="glass-container">

<button class="signout-btn" id="logoutBtn">Sign Out</button>

<h1>FINANCE CONTROL CENTER</h1>

<div class="nav-container">
    <a href="expense.html" class="nav-btn">Expense Dashboard</a>
    <a href="dashboard.html" class="nav-btn">Monthly Dashboard</a>
    <a href="investment.html" class="nav-btn">Investment Dashboard</a>
    <a href="salary.html" class="nav-btn">Salary Dashboard</a>
    <a href="loans.html" class="nav-btn">Loans Dashboard</a>
    <a href="fd.html" class="nav-btn">FD Dashboard</a>
    <a href="land record.html" class="nav-btn">Land Dashboard</a>
    <a href="xirr.html" class="nav-btn">XIRR Dashboard</a>
    
    
</div>

</div>

<script type="module">
import { protectPage, logout } from "./auth.js";

/* Protect page */
protectPage();

/* Logout button */
document.getElementById("logoutBtn").addEventListener("click", async () => {
    await logout();
});
</script>

    
<script>

const canvas = document.getElementById("matrix-bg");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ$#@%&";
const matrix = letters.split("");

const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];

for(let x = 0; x < columns; x++)
drops[x] = 1;

function draw(){

ctx.fillStyle = "rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#00ff41";
ctx.font = fontSize + "px monospace";

for(let i = 0; i < drops.length; i++){

const text = matrix[Math.floor(Math.random()*matrix.length)];

ctx.fillText(text, i*fontSize, drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
drops[i] = 0;

drops[i]++;

}

}

setInterval(draw,35);

window.addEventListener("resize",()=>{
canvas.height = window.innerHeight;
canvas.width = window.innerWidth;
});

</script>

</body>
</html>
