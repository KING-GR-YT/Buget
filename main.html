<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Control Center</title>

<link rel="icon" type="image/png" sizes="32x32" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:black;
overflow:hidden;
color:#00ffff;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

/* BACKGROUND CANVAS */

#hacker-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* GLASS CARD */

.glass-container{

position:relative;

background:rgba(0,255,255,0.05);
backdrop-filter:blur(15px);

border:1px solid rgba(0,255,255,0.3);

padding:50px;
border-radius:20px;

box-shadow:
0 0 40px rgba(0,255,255,0.2),
0 0 80px rgba(0,255,255,0.1);

text-align:center;
width:90%;
max-width:1000px;

animation:glowPulse 4s infinite alternate;

}

/* CYBER GLOW ANIMATION */

@keyframes glowPulse{

from{
box-shadow:
0 0 20px rgba(0,255,255,0.2),
0 0 60px rgba(0,255,255,0.1);
}

to{
box-shadow:
0 0 40px rgba(0,255,255,0.4),
0 0 120px rgba(0,255,255,0.2);
}

}

/* TITLE */

h1{
letter-spacing:4px;
margin-bottom:40px;
font-weight:bold;
text-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff;
}

/* SIGNOUT */

.signout-btn{

position:absolute;
top:20px;
right:20px;

padding:8px 18px;
font-size:13px;
font-weight:bold;

border-radius:8px;

background:rgba(255,0,0,0.1);
border:1px solid rgba(255,0,0,0.5);

color:#ff4d4d;
cursor:pointer;

transition:0.3s;

}

.signout-btn:hover{

background:#ff4d4d;
color:black;

box-shadow:0 0 15px #ff4d4d;

}

/* BUTTON GRID */

.nav-container{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;

}

/* CYBER BUTTON */

.nav-btn{

text-decoration:none;

padding:18px;

font-weight:bold;
letter-spacing:1px;

border-radius:12px;

background:rgba(0,255,255,0.15);
border:1px solid rgba(0,255,255,0.4);

color:#00ffff;

transition:.3s;

backdrop-filter:blur(10px);

}

.nav-btn:hover{

background:#00ffff;
color:black;

box-shadow:
0 0 20px #00ffff,
0 0 40px #00ffff;

transform:translateY(-6px);

}

/* RESPONSIVE */

/* ================= RESPONSIVE MOBILE UI ================= */

@media(max-width:900px){

body{
padding:20px;
overflow:auto;
align-items:flex-start;
}

.glass-container{

width:100%;
max-width:100%;
padding:30px 20px;

border-radius:18px;

margin-top:20px;
margin-bottom:20px;

}

.nav-container{

grid-template-columns:repeat(2,1fr);

gap:18px;

}

h1{

font-size:28px;
line-height:1.4;

letter-spacing:2px;

margin-top:30px;
margin-bottom:30px;

}

.nav-btn{

padding:18px 14px;

font-size:15px;

border-radius:14px;

}

.signout-btn{

top:15px;
right:15px;

padding:10px 16px;

font-size:12px;

}

}

/* ================= MOBILE ================= */

@media(max-width:600px){

body{

padding:12px;

overflow:auto;

display:block;

}

.glass-container{

padding:22px 16px;

border-radius:16px;

margin-top:10px;
margin-bottom:20px;

backdrop-filter:blur(12px);

}

.nav-container{

grid-template-columns:1fr;

gap:14px;

}

h1{

font-size:22px;

letter-spacing:1px;

line-height:1.5;

margin-top:50px;
margin-bottom:25px;

}

.nav-btn{

width:100%;

padding:16px;

font-size:15px;

border-radius:12px;

}

.signout-btn{

position:absolute;

top:12px;
right:12px;

padding:8px 14px;

font-size:11px;

border-radius:8px;

}

}

/* ================= SMALL MOBILE ================= */

@media(max-width:400px){

h1{

font-size:18px;

}

.nav-btn{

font-size:14px;

padding:14px;

}

.glass-container{

padding:18px 12px;

}

}

</style>
</head>

<body>

<canvas id="hacker-bg"></canvas>

<div class="glass-container">

<button class="signout-btn" id="logoutBtn">Sign Out</button>

<h1>FINANCE CONTROL CENTER</h1>

<div class="nav-container">

<a href="expense.html" class="nav-btn">Expense Dashboard</a>
<a href="dashboard.html" class="nav-btn">Monthly Dashboard</a>
<a href="investment.html" class="nav-btn">Investment Dashboard</a>
<a href="salary.html" class="nav-btn">Salary Dashboard</a>
<a href="loans.html" class="nav-btn">Loans Dashboard</a>
<a href="fd.html" class="nav-btn">FD Dashboard</a>
<a href="land record.html" class="nav-btn">Land Dashboard</a>
<a href="xirr.html" class="nav-btn">XIRR Dashboard</a>
<a href="salary-growth.html" class="nav-btn">Salary Growth</a>
<a href="construction-tracker.html" class="nav-btn">Construction Tracker</a>
  
</div>

</div>

<script type="module">
import { protectPage, logout } from "./auth.js";

protectPage();

document.getElementById("logoutBtn").addEventListener("click", async () => {
await logout();
});
</script>


<script>
const canvas = document.getElementById("hacker-bg");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* PARTICLES */
let particles = [];
for(let i=0; i<140; i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2+1,
    speed: Math.random()*1+0.3
  });
}

/* CYBER LINES */
let lines = [];
for(let i=0; i<50; i++){
  lines.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    len: Math.random()*200+100,
    speed: Math.random()*0.7+0.2
  });
}

/* AI NETWORK NODES */
const NODE_COUNT = 60;
const MAX_CONNECTION_DISTANCE = 150;
let nodes = [];

for(let i=0; i<NODE_COUNT; i++){
  nodes.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    vx: (Math.random()-0.5)*0.3,
    vy: (Math.random()-0.5)*0.3,
    radius: 2 + Math.random()*1.5,
    glowAlpha: Math.random() * 0.6 + 0.4
  });
}

/* Draw loop */
function draw(){
  // Background gradient
  let bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  bg.addColorStop(0, "#03171c");
  bg.addColorStop(1, "#000000");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Cyber lines
  ctx.strokeStyle = "rgba(0,255,255,0.35)";
  ctx.lineWidth = 2;
  lines.forEach(l => {
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(l.x + l.len, l.y);
    ctx.stroke();

    l.x += l.speed;
    if(l.x > canvas.width){
      l.x = -l.len;
      l.y = Math.random()*canvas.height;
    }
  });

  // Floating particles
  particles.forEach(p => {
    let glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 20);
    glow.addColorStop(0, "#00ffff");
    glow.addColorStop(1, "rgba(0,255,255,0)");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();

    p.y += p.speed;
    if(p.y > canvas.height){
      p.y = -10;
      p.x = Math.random()*canvas.width;
    }
  });

  // AI Network nodes and connecting lines
  // First update node positions
  nodes.forEach(n => {
    n.x += n.vx;
    n.y += n.vy;

    // Bounce off edges
    if(n.x < 0 || n.x > canvas.width) n.vx *= -1;
    if(n.y < 0 || n.y > canvas.height) n.vy *= -1;
  });

  // Draw connecting lines with glow
  for(let i=0; i<nodes.length; i++){
    for(let j=i+1; j<nodes.length; j++){
      let a = nodes[i];
      let b = nodes[j];
      let dx = a.x - b.x;
      let dy = a.y - b.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < MAX_CONNECTION_DISTANCE){
        let alpha = (1 - dist/MAX_CONNECTION_DISTANCE) * 0.3;
        ctx.strokeStyle = `rgba(0, 255, 255, ${alpha})`;
        ctx.lineWidth = 1;
        ctx.shadowColor = 'rgba(0,255,255,0.5)';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }
  }

  // Draw nodes with glow and pulse effect
  nodes.forEach(n => {
    // Pulse alpha between 0.4 and 1
    n.glowAlpha += (Math.random() - 0.5) * 0.03;
    if(n.glowAlpha > 1) n.glowAlpha = 1;
    if(n.glowAlpha < 0.4) n.glowAlpha = 0.4;

    let glow = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, 15);
    glow.addColorStop(0, `rgba(0, 255, 255, ${n.glowAlpha})`);
    glow.addColorStop(1, 'rgba(0,255,255,0)');

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius, 0, Math.PI*2);
    ctx.fill();
  });

  // Neon "HACKER" Text
  ctx.font = "bold 120px Arial";
  ctx.textAlign = "center";
  ctx.strokeStyle = "#00eaff";
  ctx.lineWidth = 3;
  ctx.shadowColor = "#00eaff";
  ctx.shadowBlur = 25;
  ctx.strokeText("HACKER", canvas.width / 2, 160);
  ctx.shadowBlur = 0;

  requestAnimationFrame(draw);
}

draw();

</script>
</body>
</html>
