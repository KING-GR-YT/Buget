<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Control Center</title>

<link rel="icon" type="image/png" sizes="32x32" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:black;
overflow:hidden;
color:#00ffff;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

/* BACKGROUND CANVAS */

#hacker-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* GLASS CARD */

.glass-container{

position:relative;

background:rgba(0,255,255,0.05);
backdrop-filter:blur(15px);

border:1px solid rgba(0,255,255,0.3);

padding:50px;
border-radius:20px;

box-shadow:
0 0 40px rgba(0,255,255,0.2),
0 0 80px rgba(0,255,255,0.1);

text-align:center;
width:90%;
max-width:1000px;

animation:glowPulse 4s infinite alternate;

}

/* CYBER GLOW ANIMATION */

@keyframes glowPulse{

from{
box-shadow:
0 0 20px rgba(0,255,255,0.2),
0 0 60px rgba(0,255,255,0.1);
}

to{
box-shadow:
0 0 40px rgba(0,255,255,0.4),
0 0 120px rgba(0,255,255,0.2);
}

}

/* TITLE */

h1{
letter-spacing:4px;
margin-bottom:40px;
font-weight:bold;
text-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff;
}

/* SIGNOUT */

.signout-btn{

position:absolute;
top:20px;
right:20px;

padding:8px 18px;
font-size:13px;
font-weight:bold;

border-radius:8px;

background:rgba(255,0,0,0.1);
border:1px solid rgba(255,0,0,0.5);

color:#ff4d4d;
cursor:pointer;

transition:0.3s;

}

.signout-btn:hover{

background:#ff4d4d;
color:black;

box-shadow:0 0 15px #ff4d4d;

}

/* BUTTON GRID */

.nav-container{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;

}

/* CYBER BUTTON */

.nav-btn{

text-decoration:none;

padding:18px;

font-weight:bold;
letter-spacing:1px;

border-radius:12px;

background:rgba(0,255,255,0.15);
border:1px solid rgba(0,255,255,0.4);

color:#00ffff;

transition:.3s;

backdrop-filter:blur(10px);

}

.nav-btn:hover{

background:#00ffff;
color:black;

box-shadow:
0 0 20px #00ffff,
0 0 40px #00ffff;

transform:translateY(-6px);

}

/* RESPONSIVE */

@media(max-width:900px){

.nav-container{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

.nav-container{
grid-template-columns:1fr;
}

.glass-container{
padding:30px;
}

h1{
font-size:20px;
}

}

</style>
</head>

<body>

<canvas id="hacker-bg"></canvas>

<div class="glass-container">

<button class="signout-btn" id="logoutBtn">Sign Out</button>

<h1>FINANCE CONTROL CENTER</h1>

<div class="nav-container">

<a href="expense.html" class="nav-btn">Expense Dashboard</a>
<a href="dashboard.html" class="nav-btn">Monthly Dashboard</a>
<a href="investment.html" class="nav-btn">Investment Dashboard</a>
<a href="salary.html" class="nav-btn">Salary Dashboard</a>
<a href="loans.html" class="nav-btn">Loans Dashboard</a>
<a href="fd.html" class="nav-btn">FD Dashboard</a>
<a href="land record.html" class="nav-btn">Land Dashboard</a>
<a href="xirr.html" class="nav-btn">XIRR Dashboard</a>

</div>

</div>

<script type="module">
import { protectPage, logout } from "./auth.js";

protectPage();

document.getElementById("logoutBtn").addEventListener("click", async () => {
await logout();
});
</script>


<script>

const canvas = document.getElementById("hacker-bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* PARTICLES */

let particles = [];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
speed:Math.random()*0.5+0.2,
size:Math.random()*2
});
}

/* GRID */

let gridOffset = 0;

function draw(){

/* DARK BACKGROUND */

let gradient = ctx.createLinearGradient(0,0,0,canvas.height);
gradient.addColorStop(0,"#020b10");
gradient.addColorStop(1,"#000000");

ctx.fillStyle = gradient;
ctx.fillRect(0,0,canvas.width,canvas.height);


/* CYBER GRID */

ctx.strokeStyle="rgba(0,255,255,0.06)";
ctx.lineWidth=1;

gridOffset += 0.3;

for(let x=0;x<canvas.width;x+=60){

ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,canvas.height);
ctx.stroke();

}

for(let y=0;y<canvas.height;y+=60){

ctx.beginPath();
ctx.moveTo(0,y+gridOffset);
ctx.lineTo(canvas.width,y+gridOffset);
ctx.stroke();

}


/* PARTICLES */

ctx.fillStyle="#00ffff";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

p.y += p.speed;

if(p.y > canvas.height){

p.y = -10;
p.x = Math.random()*canvas.width;

}

});

requestAnimationFrame(draw);

}

draw();

/* RESIZE */

window.addEventListener("resize",()=>{

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

});

</script>

</body>
</html>
