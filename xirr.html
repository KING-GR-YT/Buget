<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XIRR Calculator</title>
<link rel="icon" type="image/png" sizes="32x32" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --accent:#00f5ff;
    --positive:#22c55e;
    --negative:#ef4444;
    --danger:#dc2626;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
    background:linear-gradient(135deg,#0f172a,#020617);
    font-family:'Inter',sans-serif;
    color:#fff;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.title{
    font-family:'Orbitron',sans-serif;
    font-size:24px;
    color:var(--accent);
}

.create-box{
    background:var(--card);
    padding:18px;
    border-radius:14px;
    display:flex;
    gap:12px;
    align-items:center;
    margin-bottom:30px;
}

.create-box input{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#0f172a;
    color:white;
    font-size:15px;
}

.create-box button{
    background:var(--accent);
    padding:12px 18px;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
    gap:22px;
}

.card{
    background:var(--card);
    padding:20px;
    border-radius:18px;
    box-shadow:0 0 20px rgba(0,255,255,0.05);
}

.card-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

.investment-name{
    font-size:18px;
    font-weight:600;
    color:var(--accent);
}

.delete-investment{
    background:var(--danger);
    padding:6px 10px;
    font-size:12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.form-vertical{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:15px;
}

input, select{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#0f172a;
    color:white;
    font-size:14px;
}

.primary-btn{
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    padding: 10px 14px;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
    cursor: pointer;
}

.primary-btn:hover{
    background: var(--accent);
    color: #0f172a;
    box-shadow: 0 0 15px rgba(0,245,255,0.6);
    transform: translateY(-2px);
}

.primary-btn:active{
    transform: scale(0.96);
}

.cashflows{
    margin-top:10px;
    font-size:14px;
}

.flow{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:6px 0;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.flow-left{
    display:flex;
    flex-direction:column;
}

.positive{color:var(--positive);}
.negative{color:var(--negative);}

.delete-btn{
    background:#ef4444;
    padding:5px 8px;
    font-size:12px;
    border-radius:6px;
    border:none;
}

.xirr-total{
    display:flex;
    justify-content:space-between;
    font-size:16px;
    font-weight:600;
    margin-bottom:10px;
}

.home-link{
    padding:8px 8px;
    border-radius:8px;
    text-decoration:none;
    background:rgba(0,255,255,0.15);
    color:#00ffff;
    border:1px solid rgba(0,255,255,0.4);
    transition:0.3s ease;
    font-weight:300;
    float: right;
}

.home-link:hover{
    background:#00ffff;
    color:#001f1f;
    box-shadow:0 0 10px #00ffff;
}
    
</style>
</head>
<body>

<div class="header">
    <div class="title">XIRR Calculator</div>
    <a href="main.html" class="home-link">🏠 Home</a>    
</div>

<div class="create-box">
    <input type="text" id="invName" placeholder="Enter Investment Name">
    <button onclick="createInvestment()">Create Investment</button>
</div>

<div class="grid" id="investmentList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  projectId: "personal-budget-1cbbe",
  storageBucket: "personal-budget-1cbbe.firebasestorage.app",
  messagingSenderId: "133591748262",
  appId: "1:133591748262:web:2c0846f03f5f56aeb1ee67"
};

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

document.body.style.display = "none";

onAuthStateChanged(auth, (user) => {
  if (!user || user.uid !== ADMIN_UID) {
    window.location.href = "index.html";
  } else {
    document.body.style.display = "block";
  }
});

function getToday(){
    const today = new Date();
    return today.toISOString().split("T")[0];
}

window.createInvestment = async function(){
    const name = document.getElementById("invName").value.trim();
    if(!name) return alert("Enter investment name");
    await addDoc(collection(db,"investments"),{ name });
    document.getElementById("invName").value="";
};

window.deleteInvestment = async function(id){
    const confirmDelete = confirm("Delete entire investment?");
    if(!confirmDelete) return;

    const flows = await getDocs(collection(db,"investments",id,"cashflows"));
    flows.forEach(async(flow)=> await deleteDoc(flow.ref));

    await deleteDoc(doc(db,"investments",id));
};

const listDiv = document.getElementById("investmentList");

onSnapshot(collection(db,"investments"),(snapshot)=>{
    listDiv.innerHTML="";
    snapshot.forEach(docSnap=>{
        renderInvestment(docSnap.id, docSnap.data().name);
    });
});

function renderInvestment(id,name){
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
        <div class="card-header">
            <div class="investment-name">${name}</div>
            <button class="delete-investment"
                onclick="deleteInvestment('${id}')">
                Delete
            </button>
        </div>

        <div class="xirr-total">
            <span>XIRR: <span id="xirr-${id}">0%</span></span>
            <span>Total: ₹<span id="total-${id}">0</span></span>
        </div>

        <div class="form-vertical">
            <select id="type-${id}">
                <option value="invest">💸 Investment</option>
                <option value="return">💰 Return</option>
            </select>

            <input type="number" placeholder="Amount" id="amt-${id}">
            <input type="date" id="date-${id}" value="${getToday()}">
            <button class="primary-btn"
                onclick="addCashflow('${id}')">
                + Add Entry
            </button>
        </div>

        <div class="cashflows" id="flows-${id}"></div>
    `;

    listDiv.appendChild(div);
    loadCashflows(id);
}

window.addCashflow = async function(id){
    const rawAmount = parseFloat(document.getElementById(`amt-${id}`).value);
    const type = document.getElementById(`type-${id}`).value;
    const date = document.getElementById(`date-${id}`).value;
    if(!rawAmount || !date) return alert("Fill fields");

    let amount = type === "invest" ? -Math.abs(rawAmount) : Math.abs(rawAmount);
    await addDoc(collection(db,"investments",id,"cashflows"),{ amount, date, type });
    document.getElementById(`amt-${id}`).value="";
};

window.deleteCashflow = async function(investmentId, cashflowId){
    await deleteDoc(doc(db,"investments",investmentId,"cashflows",cashflowId));
};

function loadCashflows(id){
    const flowDiv=document.getElementById(`flows-${id}`);
    const totalEl=document.getElementById(`total-${id}`);

    onSnapshot(collection(db,"investments",id,"cashflows"),(snapshot)=>{
        let cashflows=[];
        flowDiv.innerHTML="";

        snapshot.forEach(docSnap=>{
            const data=docSnap.data();
            cashflows.push({
                id: docSnap.id,
                amount: data.amount,
                date: new Date(data.date)
            });
        });

        // Sort newest to oldest
        cashflows.sort((a,b)=>b.date-a.date);

        // Display all cashflows (no scroll)
        cashflows.forEach(cf=>{
            flowDiv.innerHTML+=`
                <div class="flow">
                    <div class="flow-left">
                        <span>${cf.date.toISOString().split("T")[0]}</span>
                        <span class="${cf.amount>0?'positive':'negative'}">₹${Math.abs(cf.amount)}</span>
                    </div>
                    <button class="delete-btn"
                        onclick="deleteCashflow('${id}','${cf.id}')">
                        Delete
                    </button>
                </div>
            `;
        });

        // XIRR
        const result=calculateXIRR(cashflows);
        const xirrEl=document.getElementById(`xirr-${id}`);
        if(isNaN(result)){
            xirrEl.innerText="0%";
        } else {
            xirrEl.innerText=(result*100).toFixed(2)+"%";
            xirrEl.style.color=result>=0?"#22c55e":"#ef4444";
        }

        // Total
        const total = cashflows.reduce((sum, cf)=> sum + cf.amount, 0);
        totalEl.innerText = total.toFixed(2);
        totalEl.style.color = total>=0?"#22c55e":"#ef4444";
    });
}

function calculateXIRR(values){
    if(values.length<2) return 0;
    const guess=0.1, tol=1e-6, maxIter=100;
    const dates=values.map(v=>v.date);
    const amounts=values.map(v=>v.amount);
    const minDate=Math.min(...dates);
    function npv(rate){
        return amounts.reduce((acc,amount,i)=>{
            const days=(dates[i]-minDate)/(1000*60*60*24);
            return acc+amount/Math.pow(1+rate,days/365);
        },0);
    }
    let rate=guess;
    for(let i=0;i<maxIter;i++){
        let f=npv(rate);
        let f1=(npv(rate+tol)-f)/tol;
        let newRate=rate-f/f1;
        if(Math.abs(newRate-rate)<tol) return newRate;
        rate=newRate;
    }
    return rate;
}

</script>
</body>
</html>
