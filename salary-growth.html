<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Salary Growth Tracker</title>
  <link rel="icon" type="image/png" sizes="32x32" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #07121f, #02060d);
      color:#00f7ff;
    }

    h1 { text-align:center; text-shadow:0 0 10px #00f7ff; }

    .container {
      
      margin:20px auto;
      display:flex;
      flex-direction:column;
      gap:25px;
      padding:15px;
    }

    .box {
      background: rgba(0,0,0,0.4);
      border-radius:15px;
      padding:15px;
      box-shadow:0 0 20px rgba(0,255,255,0.2);
    }

    .entry-box input, .entry-box button {
      padding:10px; margin:5px; border-radius:8px;
      border:1px solid #00f7ff; background:#02060d; color:#00f7ff;
    }
    .home-link{
        float:right;
        padding:4px;
        border-radius:8px;
        text-decoration:none;
        background:rgba(0,255,255,0.12);
        border:1px solid rgba(0,255,255,0.4);
        color:#00ffff;
    }

    .entry-box button:hover { background:#00f7ff; color:#000; cursor:pointer; }

    table { width:100%; border-collapse: collapse; margin-top:10px; }
    th, td { padding:8px; text-align:center; border-bottom:1px solid rgba(0,255,255,0.2); }

    .stats { display:flex; gap:350px; justify-content:center; flex-wrap:wrap; }

    .card {
      padding:15px; border-radius:50%; text-align:center;
      border:3px solid; box-shadow:0 0 15px; width:120px; height:120px;
      display:flex; flex-direction:column; justify-content:center;
    }

    .cagr { border-color:#00ff88; box-shadow:0 0 15px #00ff88; }
    .latest { border-color:#ffaa00; box-shadow:0 0 15px #ffaa00; }
    .total { border-color:#ff4dff; box-shadow:0 0 15px #ff4dff; }

    canvas {
      width:100% !important; height:220px !important;
      background:#02060d; border-radius:10px; padding:10px;
    }

    /* MOBILE */
    @media(max-width:600px){
      h1 { font-size:18px; }
      .card { width:100px; height:100px; font-size:12px; }
      input { width:90px; }
    }
  </style>
</head>

<body>

<h1>⚡ Salary Growth Tracker
<a href="main.html" class="home-link">🏠 Home</a>
</h1>

<div class="container">

  <div class="box">
    <h3>Summary</h3>
    <div class="stats">
      <div class="card total"><h4>Total</h4><p id="total">0%</p></div>
      <div class="card cagr"><h4>CAGR</h4><p id="cagr">0%</p></div>
      <div class="card latest"><h4>Latest Salary</h4><p id="latest">₹0</p></div>
    </div>
  </div>

  <div class="box">
    <h3>Graph</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="box entry-box">
    <h3>Add Salary</h3>
    <input type="number" id="year" placeholder="Year">
    <input type="number" id="salary" placeholder="Salary">
    <button onclick="addData()">Add</button>

    <table>
      <thead>
        <tr><th>Year</th><th>Salary</th><th>Delete</th></tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  projectId: "personal-budget-1cbbe",
  storageBucket: "personal-budget-1cbbe.firebasestorage.app",
  messagingSenderId: "133591748262",
  appId: "1:133591748262:web:2c0846f03f5f56aeb1ee67"
};

const ADMIN_UID = "7Viwom2PvuOh3l8nOGhIg8rOvj52";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let data=[];
let chart;

// AUTH
onAuthStateChanged(auth,(user)=>{
  if(!user || user.uid!==ADMIN_UID){
    window.location.href="index.html";
  } else {
    loadData();
  }
});

// ADD DATA
window.addData = async function(){
  const year = parseInt(document.getElementById('year').value);
  const salary = parseFloat(document.getElementById('salary').value);
  if(!year || !salary) return alert('Enter valid');

  await addDoc(collection(db,"salary"),{year,salary});

  document.getElementById('year').value='';
  document.getElementById('salary').value='';
}

// DELETE
window.deleteRow = async function(id){
  await deleteDoc(doc(db,"salary",id));
}

// LOAD REALTIME
function loadData(){
  onSnapshot(collection(db,"salary"),(snapshot)=>{
    data=[];
    const tbody=document.getElementById("table");
    tbody.innerHTML="";

    snapshot.forEach(docSnap=>{
      const d=docSnap.data();
      data.push({...d,id:docSnap.id});
    });

    data.sort((a,b)=>a.year-b.year);

    data.forEach(d=>{
      tbody.innerHTML+=`<tr>
        <td>${d.year}</td>
        <td>₹${d.salary}</td>
        <td><button onclick="deleteRow('${d.id}')">X</button></td>
      </tr>`;
    });

    updateStats();
    updateChart();
  });
}

function updateStats(){
  if(data.length<2) return;

  let first=data[0].salary;
  let last=data[data.length-1].salary;
  let n=data.length-1;

  let total=((last-first)/first)*100;
  let cagr=(Math.pow(last/first,1/n)-1)*100;

  document.getElementById('total').innerText=total.toFixed(2)+'%';
  document.getElementById('cagr').innerText=cagr.toFixed(2)+'%';
  document.getElementById('latest').innerText='₹'+last;
}

function updateChart(){
  const ctx=document.getElementById('chart');
  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:'line',
    data:{
      labels:data.map(d=>d.year),
      datasets:[{
        label:'Salary',
        data:data.map(d=>d.salary),
        borderColor:'#00f7ff',
        backgroundColor:'rgba(0,247,255,0.1)',
        fill:true,
        tension:0.4,
        pointRadius:4,
        pointBackgroundColor:'#00f7ff'
      }]
    },
    options:{
      plugins:{
        legend:{ labels:{ color:'#00f7ff', font:{size:12} } }
      },
      scales:{
        x:{
          ticks:{ color:'#00f7ff' },
          grid:{ color:'rgba(0,255,255,0.1)' }
        },
        y:{
          ticks:{ color:'#00f7ff' },
          grid:{ color:'rgba(0,255,255,0.1)' }
        }
      }
    }
  });
}
</script>

</body>
</html>
