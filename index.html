<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Terminal </title>
  <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2027">

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Share Tech Mono', monospace;
}

body{
  min-height:100vh;
  background:#000;
  overflow-x:hidden;   /* allow vertical scroll */
  color:#00ff88;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* Particle canvas */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* Terminal Box */
.terminal{
  position:relative;
  width:100%;
  max-width:420px;
  background:rgba(0,0,0,0.9);
  border:1px solid #00ff88;
  box-shadow:0 0 25px #00ff88;
  padding:25px;
  z-index:1;
  border-radius:8px;
}

/* Mobile optimization */
@media (max-width:480px){
  .terminal{
    padding:20px;
  }

  .terminal h2{
    font-size:15px;
  }

  input{
    font-size:14px;
  }

  button{
    font-size:14px;
    padding:12px;
  }
}

.terminal h2{
  margin-bottom:20px;
  font-size:18px;
  color:#00ff88;
  min-height:24px;
  word-break:break-word;
}

.line{
  margin-bottom:15px;
}

input{
  width:100%;
  background:black;
  border:none;
  border-bottom:1px solid #00ff88;
  color:#00ff88;
  padding:10px 5px;
  outline:none;
}

input:focus{
  box-shadow:0 0 10px #00ff88;
}

.remember{
  margin-top:10px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:20px;
  cursor:pointer;
}

.remember input{
  appearance:none;
  width:20px;
  height:16px;
  border:1px solid #00ff88;
  background:black;
  cursor:pointer;
  position:relative;
}



button{
  margin-top:20px;
  width:100%;
  padding:12px;
  background:black;
  border:1px solid #00ff88;
  color:#00ff88;
  cursor:pointer;
  transition:0.3s;
  font-size:15px;
}

button:hover{
  background:#00ff88;
  color:black;
}

#error{
  margin-top:15px;
  color:#ff3b3b;
  font-size:13px;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="terminal">
  <h2 id="typing"></h2>

  <div class="line">
    <input 
      type="email" 
      id="email" 
      name="terminal_user_9845"
      placeholder="admin@email.com"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    >
  </div>

  <div class="line">
    <input 
      type="password" 
      id="password" 
      name="terminal_pass_9845"
      placeholder="Enter password"
      autocomplete="new-password"
    >
  </div>

  <div class="remember">
    <input type="checkbox" id="remember"> Remember Session
  </div>

  <button onclick="login()">ACCESS SYSTEM</button>

  <div id="error"></div>
</div>


<script type="module">

/* ==============================
   Firebase Setup
============================== */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword, 
  setPersistence,
  browserLocalPersistence,
  browserSessionPersistence 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbEX3WU-ojAyc9VrWagDaIt2_gBnPfcj4",
  authDomain: "personal-budget-1cbbe.firebaseapp.com",
  databaseURL: "https://personal-budget-1cbbe-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "personal-budget-1cbbe",
  storageBucket: "personal-budget-1cbbe.firebasestorage.app",
  messagingSenderId: "133591748262",
  appId: "1:133591748262:web:2c0846f03f5f56aeb1ee67"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ==============================
   Auto Redirect If Already Logged In
============================== */

// Redirect only if page loads and user already logged in
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let initialCheckDone = false;

onAuthStateChanged(auth, (user) => {
  if (!initialCheckDone) {
    initialCheckDone = true;

    if (user) {
      window.location.href = "main.html";
    }
  }
});



/* ==============================
   Login Function
============================== */

window.login = async function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const remember = document.getElementById("remember").checked;
  const errorDiv = document.getElementById("error");
  const button = document.querySelector("button");

  errorDiv.innerText = "";
  button.disabled = true;
  button.innerText = "AUTHENTICATING...";

  try{

    await setPersistence(auth, 
      remember ? browserLocalPersistence : browserSessionPersistence
    );

    await signInWithEmailAndPassword(auth, email, password);

    await terminalSequence([
      ">> Establishing secure connection...",
      ">> Verifying credentials...",
      ">> Access Granted ✔"
    ]);

    accessGrantedEffect();

    setTimeout(() => {
      window.location.href = "main.html";
    }, 1800);

  } catch(err){
    errorDiv.innerText = "ACCESS DENIED ❌";
    button.disabled = false;
    button.innerText = "ACCESS SYSTEM";
  }
};

/* ==============================
   Terminal Animation
============================== */

async function terminalSequence(lines){
  for(const line of lines){
    await printLine(line);
  }
}

function printLine(text){
  return new Promise(resolve => {
    const div = document.createElement("div");
    div.style.marginTop = "8px";
    div.style.color = "#00ff88";
    document.querySelector(".terminal").appendChild(div);

    let i = 0;
    const interval = setInterval(()=>{
      div.innerHTML += text.charAt(i);
      i++;
      if(i >= text.length){
        clearInterval(interval);
        setTimeout(resolve, 500);
      }
    }, 40);
  });
}

function accessGrantedEffect(){
  const flash = document.createElement("div");
  flash.style.position = "fixed";
  flash.style.top = 0;
  flash.style.left = 0;
  flash.style.width = "100%";
  flash.style.height = "100%";
  flash.style.background = "#00ff88";
  flash.style.opacity = "0";
  flash.style.zIndex = "9999";
  flash.style.transition = "0.5s";

  document.body.appendChild(flash);

  setTimeout(()=> flash.style.opacity = "0.4", 50);
  setTimeout(()=> flash.style.opacity = "0", 800);
}

/* ==============================
   Hacker Typing Header
============================== */

const text = ">>> ADMIN TERMINAL ACCESS <<<";
let i = 0;
function typeWriter(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 60);
  }
}
typeWriter();

/* ==============================
   Particle Animation
============================== */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speedY:Math.random()*1
  });
}

function animate(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#00ff88";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();

    p.y += p.speedY;

    if(p.y > canvas.height){
      p.y = 0;
      p.x = Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(animate);
}

animate();
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}); 

</script>
  <!-- PWA Script -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./service-worker.js");
  });
}

/* ==============================
   Enter Key Login
============================== */

document.getElementById("email").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    login();
  }
});

document.getElementById("password").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    login();
  }
});
  
</script>
</body>
</html>
